<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #f2f2f7; --ios-blue: #007aff; --ios-red: #ff3b30; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: #1c1c1e; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #iphone { width: 375px; height: 812px; background: #000; border: 12px solid #333; border-radius: 50px; position: relative; overflow: hidden; }
        #screen { width: 100%; height: 100%; background: #222 url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover; display: none; }
        #island { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #000; border-radius: 20px; z-index: 1000; color: #fff; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        #homescreen { display: grid; grid-template-columns: repeat(4, 1fr); padding: 80px 20px; gap: 20px; }
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .app-label { color: white; font-size: 11px; text-shadow: 0 1px 2px #000; }
        .win { position: absolute; inset: 0; background: var(--ios-bg); z-index: 500; display: none; flex-direction: column; }
        .win-header { padding: 45px 20px 15px; background: #fff; border-bottom: 1px solid #d1d1d6; display: flex; justify-content: space-between; align-items: center; }
        .win-body { flex: 1; overflow-y: auto; padding: 15px; }
        #setup-layer { position: absolute; inset: 0; background: #fff; z-index: 2000; padding: 40px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        select, button { width: 100%; padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 16px; border: 1px solid #ccc; }
        button { background: var(--ios-blue); color: #fff; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island"><span id="isl-content">System Ready</span></div>
    <div id="setup-layer">
        <h1>Logistic OS</h1>
        <p>Wybierz miasto:</p>
        <select id="city-select"><option>Warszawa</option><option>Poznań</option><option>Gdańsk</option></select>
        <button onclick="bootSystem()">START</button>
    </div>
    <div id="screen"><div id="homescreen"></div></div>
</div>

<script>
let DB = { money: 50000, city: "", inventory: [], activeJobs: [], market: [], logs: [], apps: [] };

function bootSystem() {
    DB.city = document.getElementById('city-select').value;
    document.getElementById('setup-layer').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    renderPulpit();
}

function renderPulpit() {
    const hs = document.getElementById('homescreen');
    hs.innerHTML = DB.apps.map(app => `
        <div class="app-wrapper" onclick="openApp('${app.id}')">
            <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
            <div class="app-label">${app.name}</div>
        </div>
    `).join('');
}

function openApp(id) {
    document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
    const target = document.getElementById('win-' + id);
    if(target) target.style.display = 'flex';
    window['render_' + id] ? window['render_' + id]() : null;
}

function closeW() { document.querySelectorAll('.win').forEach(w => w.style.display = 'none'); }

// DOKLEJAJ MODUŁY PONIŻEJ
</script>
</body>
</html>
