<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10 - Rebuild</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* OBUDOWA IPHONE */
        #iphone { width: 375px; height: 812px; background: #000; border: 12px solid #333; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* EKRAN STARTOWY */
        #setup-layer { position: absolute; inset: 0; background: #fff; z-index: 2000; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* EKRAN GRY (PULPIT) */
        #screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover; display: none; position: relative; }
        
        /* DYNAMIC ISLAND */
        #island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 150px; height: 35px; background: #000; border-radius: 20px; z-index: 1000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

        /* UI ELEMENTS */
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; background: #f9f9f9; font-size: 16px; margin-bottom: 15px; }
        #start-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--ios-blue); color: white; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        #start-btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island" style="display:none;"></div>

    <div id="setup-layer">
        <i class="fa-solid fa-map-location-dot" style="font-size: 50px; color: var(--ios-blue); margin-bottom: 15px;"></i>
        <h1>Witaj w Firmie</h1>
        <p>Wybierz miasto, w którym otworzysz swój pierwszy plac:</p>
        
        <select id="city-select">
            </select>
        
        <button id="start-btn" onclick="bootSystem()">ROZPOCZNIJ KARIERĘ</button>
    </div>

    <div id="screen">
        <div id="homescreen">
            </div>
    </div>
</div>

<script>
    /* ==========================================================================
   SANITIZER: USUWANIE STARYCH ŚMIECI
   ========================================================================== */
(function() {
    // 1. Czyścimy pamięć lokalną, żeby stare stany gry nie blokowały nowych modułów
    localStorage.clear();
    sessionStorage.clear();

    // 2. Czyścimy konsolę, żeby widzieć tylko błędy z nowego kodu
    console.clear();
    console.log("%c LOGISTIC OS: Pamięć wyczyszczona. System gotowy na Moduł 1. ", 
                "background: #007aff; color: #fff; font-weight: bold; padding: 5px; border-radius: 5px;");
    
    // 3. Usuwamy stare okna, jeśli jakimś cudem zostały w DOM (przydatne przy szybkim odświeżaniu)
    const oldWins = document.querySelectorAll('.win');
    oldWins.forEach(win => win.remove());
})();
    // LISTA 100 NAJWIĘKSZYCH MIAST POLSKI
    const POLISH_CITIES = [
        "Warszawa", "Kraków", "Łódź", "Wrocław", "Poznań", "Gdańsk", "Szczecin", "Bydgoszcz", "Lublin", "Białystok",
        "Katowice", "Gdynia", "Częstochowa", "Radom", "Toruń", "Sosnowiec", "Rzeszów", "Kielce", "Gliwice", "Olsztyn",
        "Zabrze", "Bielsko-Biała", "Bytom", "Zielona Góra", "Rybnik", "Ruda Śląska", "Opole", "Tychy", "Gorzów Wlkp.", "Elbląg",
        "Płock", "Dąbrowa Górnicza", "Wałbrzych", "Włocławek", "Tarnów", "Chorzów", "Koszalin", "Kalisz", "Legnica", "Grudziądz",
        "Jaworzno", "Słupsk", "Jastrzębie-Zdrój", "Nowy Sącz", "Jelenia Góra", "Siedlce", "Konin", "Piotrków Tryb.", "Inowrocław", "Lubin",
        "Mysłowice", "Piła", "Ostrowiec Św.", "Ostrów Wlkp.", "Siemianowice Śl.", "Stargard", "Pabianice", "Gniezno", "Suwałki", "Głogów",
        "Chełm", "Przemyśl", "Zamość", "Tomaszów Maz.", "Stalowa Wola", "Kędzierzyn-Koźle", "Łomża", "Leszno", "Żory", "Bełchatów",
        "Mielec", "Tarnowskie Góry", "Tczew", "Świdnica", "Piekary Śląskie", "Będzin", "Zgierz", "Biała Podlaska", "Racibórz", "Ełk",
        "Pruszków", "Świętochłowice", "Ostrołęka", "Legionowo", "Zawiercie", "Legionowo", "Tarnobrzeg", "Puławy", "Wodzisław Śl.", "Radomsko",
        "Skarżysko-Kamienna", "Starachowice", "Krosno", "Kołobrzeg", "Dębica", "Kutno", "Nysa", "Ciechanów", "Otwock", "Sieradz"
    ].sort();

    // STAN GRY
    let DB = {
        money: 50000,
        city: "",
        apps: []
    };

    // INICJALIZACJA LISTY
    const select = document.getElementById('city-select');
    POLISH_CITIES.forEach(city => {
        let opt = document.createElement('option');
        opt.value = city;
        opt.innerHTML = city;
        select.appendChild(opt);
    });

    // URUCHOMIENIE
    function bootSystem() {
        DB.city = select.value;
        
        // Ukryj setup, pokaż grę
        document.getElementById('setup-layer').style.display = 'none';
        document.getElementById('screen').style.display = 'block';
        document.getElementById('island').style.display = 'flex';
        
        updateIsland();
        console.log("System odpalony w mieście: " + DB.city);
    }

    function updateIsland() {
        document.getElementById('island').innerHTML = `<i class="fa-solid fa-wallet" style="color:#34c759"></i> &nbsp; ${DB.money.toLocaleString()} PLN`;
    }
    /* ==========================================================================
   MODUŁ 1: SYSTEM OKIEN I OTOMOTO
   ========================================================================== */

// 1. STYLE DLA OKIEN (iOS Style)
const winStyle = document.createElement('style');
winStyle.innerHTML = `
    .win { 
        position: absolute; inset: 0; background: #f2f2f7; z-index: 500; 
        display: none; flex-direction: column; animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .win-header { 
        padding: 45px 20px 15px; background: #fff; border-bottom: 1px solid #ddd; 
        display: flex; justify-content: space-between; align-items: center; 
    }
    .win-body { flex: 1; overflow-y: auto; padding: 15px; }
    
    .car-card { 
        background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 12px; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; 
    }
    .buy-btn { 
        width: 100%; background: #ff5a10; color: #fff; border: none; 
        padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;
    }
    .close-btn { color: var(--ios-blue); background: none; border: none; font-weight: bold; cursor: pointer; }
    
    #homescreen { display: grid; grid-template-columns: repeat(4, 1fr); padding: 80px 20px; gap: 20px; }
`;
document.head.appendChild(winStyle);

// 2. REJESTRACJA APLIKACJI OTOMOTO
DB.apps.push({ id: 'olx', name: 'Otomoto', icon: 'fa-car', bg: '#ff5a10' });

// 3. TWORZENIE OKNA OTOMOTO W HTML
const winOlx = document.createElement('div');
winOlx.id = 'win-olx';
winOlx.className = 'win';
winOlx.innerHTML = `
    <div class="win-header">
        <b style="font-size: 17px;">Otomoto</b>
        <button class="close-btn" onclick="closeApp()">Gotowe</button>
    </div>
    <div class="win-body" id="body-olx"></div>
`;
document.getElementById('iphone').appendChild(winOlx);

// 4. LOGIKA OTWIERANIA I ZAMYKANIA
function openApp(id) {
    document.getElementById('win-' + id).style.display = 'flex';
    if(id === 'olx') renderOLX();
}

function closeApp() {
    document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
}

// 5. RENDEROWANIE LISTY AUT
function renderOLX() {
    const cars = [
        { brand: "Audi A4 B6", price: 12000, loc: "Radom" },
        { brand: "VW Passat B5", price: 7500, loc: "Siedlce" },
        { brand: "BMW E46", price: 18500, loc: "Gdańsk" }
    ];
    
    const body = document.getElementById('body-olx');
    body.innerHTML = `<h3>Polecane ogłoszenia</h3>` + cars.map(c => `
        <div class="car-card">
            <div style="display:flex; justify-content:space-between;">
                <b>${c.brand}</b>
                <span style="color:#ff5a10; font-weight:bold;">${c.price.toLocaleString()} PLN</span>
            </div>
            <p style="font-size:12px; color:#666; margin-top:5px;">Lokalizacja: ${c.loc}</p>
            <button class="buy-btn" onclick="buyCar('${c.brand}', ${c.price})">KUP TERAZ</button>
        </div>
    `).join('');
}

// 6. LOGIKA ZAKUPU
function buyCar(brand, price) {
    if(DB.money >= price) {
        DB.money -= price;
        updateIsland(); // Odśwież kasę na czarnym pasku
        alert("Gratulacje! Kupiono " + brand + ". Auto trafiło na Twój plac.");
    } else {
        alert("Brak środków na koncie!");
    }
}

// WYMUSZENIE ODŚWIEŻENIA PULPITU PO DODANIU APKI
renderIcons();
    /* ==========================================================================
   MODUŁ 2: WHATSAPP I SYSTEM NEGOCJACJI (LOSOWOŚĆ)
   ========================================================================== */

// 1. REJESTRACJA APKI
DB.apps.push({ id: 'whatsapp', name: 'WhatsApp', icon: 'fa-whatsapp', bg: '#25D366' });

// 2. DANE LOSOWE (OSOBOWOŚCI SPRZEDAWCÓW)
const PERSONALITIES = [
    { type: "Służbista", greet: "Dzień dobry, cena jest ostateczna.", discountMax: 0.02 },
    { type: "Handlarz", greet: "Siemano kierowniku, auto igła, płakałem jak sprzedawałem!", discountMax: 0.10 },
    { type: "Prywatny", greet: "Witam, sprzedaję bo kupiłem nowe. Możemy się dogadać.", discountMax: 0.05 }
];

// 3. TWORZENIE OKNA WHATSAPP
const winWA = document.createElement('div');
winWA.id = 'win-whatsapp';
winWA.className = 'win';
winWA.innerHTML = `
    <div class="win-header" style="background:#075e54; color:white;">
        <b id="wa-contact-name">WhatsApp</b>
        <button class="close-btn" style="color:white;" onclick="closeApp()">Cofnij</button>
    </div>
    <div class="win-body" id="body-whatsapp" style="background:#e5ddd5; display:flex; flex-direction:column;">
        <div id="wa-chat-box" style="flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:10px;"></div>
        <div id="wa-input-area" style="padding:10px; background:#fff; display:none; gap:5px;">
            <button onclick="sendMsg('Ile do oddania?')" style="font-size:12px; padding:8px;">Ile do oddania?</button>
            <button onclick="sendMsg('Biorę w tej cenie')" style="font-size:12px; padding:8px;">Biorę!</button>
        </div>
    </div>
`;
document.getElementById('iphone').appendChild(winWA);

// 4. LOGIKA CZATU
let currentDeal = null;

function startChat(carName, price, loc) {
    const perso = PERSONALITIES[Math.floor(Math.random() * PERSONALITIES.length)];
    currentDeal = { carName, price, loc, perso, currentPrice: price, stage: 0 };
    
    document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
    document.getElementById('win-whatsapp').style.display = 'flex';
    document.getElementById('wa-contact-name').innerText = "Sprzedawca: " + carName;
    document.getElementById('wa-input-area').style.display = 'flex';
    
    const chat = document.getElementById('wa-chat-box');
    chat.innerHTML = `<div style="background:#dcf8c6; padding:10px; border-radius:10px; align-self:flex-start; max-width:80%; font-size:14px; box-shadow: 1px 1px 2px rgba(0,0,0,0.1);">
        <b>Sprzedawca:</b> ${perso.greet} Ogłoszenie dotyczy ${carName} za ${price.toLocaleString()} PLN w miejscowości ${loc}.
    </div>`;
}

function sendMsg(text) {
    const chat = document.getElementById('wa-chat-box');
    chat.innerHTML += `<div style="background:#fff; padding:10px; border-radius:10px; align-self:flex-end; max-width:80%; font-size:14px; box-shadow: 1px 1px 2px rgba(0,0,0,0.1);">
        ${text}
    </div>`;

    setTimeout(() => {
        let reply = "";
        if(text.includes('Ile do oddania?')) {
            if(currentDeal.stage === 0) {
                const discount = Math.floor(currentDeal.price * (Math.random() * currentDeal.perso.discountMax));
                currentDeal.currentPrice -= discount;
                currentDeal.stage = 1;
                reply = `No dobra, za ${currentDeal.currentPrice.toLocaleString()} PLN oddam, ale ani grosza mniej!`;
            } else {
                reply = "Przecież już opuściłem! Nie bądź Pan nachalny.";
            }
        } else {
            reply = "To zapraszam na oględziny. Kliknij przycisk zakupu w Otomoto, żeby sfinalizować.";
            // Tutaj odblokowujemy możliwość finalizacji w DB
            DB.money -= currentDeal.currentPrice;
            updateIsland();
            alert(`SFINALIZOWANO! Kupiono ${currentDeal.carName} za ${currentDeal.currentPrice.toLocaleString()} PLN. Kasa pobrana.`);
            closeApp();
        }
        
        chat.innerHTML += `<div style="background:#dcf8c6; padding:10px; border-radius:10px; align-self:flex-start; max-width:80%; font-size:14px;">
            <b>Sprzedawca:</b> ${reply}
        </div>`;
        chat.scrollTop = chat.scrollHeight;
    }, 800);
}

// 5. AKTUALIZACJA OTOMOTO (ZMIANA PRZYCISKU NA "NAPISZ")
function renderOLX() {
    const cars = [
        { brand: "Audi A4 B6", price: 12000, loc: "Radom" },
        { brand: "Passat (Igła)", price: 8900, loc: "Siedlce" },
        { brand: "BMW E46", price: 19500, loc: "Gdańsk" },
        { brand: "Mercedes W211", price: 25000, loc: "Warszawa" }
    ];
    
    const body = document.getElementById('body-olx');
    body.innerHTML = `<h3 style="margin-bottom:10px;">Giełda</h3>` + cars.map(c => `
        <div class="car-card">
            <b>${c.brand}</b> - <span style="color:#ff5a10;">${c.price.toLocaleString()} PLN</span>
            <button class="buy-btn" style="background:#25D366;" onclick="startChat('${c.brand}', ${c.price}, '${c.loc}')">
                <i class="fa-brands fa-whatsapp"></i> NEGOCJUJ NA WA
            </button>
        </div>
    `).join('');
}

// Odśwież ikony
renderIcons();
</script>

</body>
</html>
