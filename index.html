<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10.0 - Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1c1c1e; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* OBUDOWA IPHONE */
        #iphone {
            width: 375px; height: 812px;
            background: #000; border: 12px solid #333; border-radius: 50px;
            position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* EKRAN I TAPETA */
        #screen {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover;
            display: none; position: relative;
        }

        /* DYNAMIC ISLAND */
        #island {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 35px; background: #000; border-radius: 20px;
            z-index: 1000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px;
        }

        /* OKNA SYSTEMOWE - FIX CZYTELNOŚCI */
        .win {
            position: absolute; inset: 0; background: var(--ios-bg);
            z-index: 500; display: none; flex-direction: column;
        }
        .win-header {
            padding: 45px 20px 15px; background: #fff;
            border-bottom: 1px solid #d1d1d6; display: flex;
            justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .win-body {
            flex: 1; overflow-y: auto; padding: 15px;
            word-wrap: break-word; /* Tekst nie wychodzi! */
        }

        /* KARTY HANDLARZA */
        .pl-card {
            background: #fff; border-radius: 18px; padding: 15px;
            margin-bottom: 12px; box-shadow: var(--card-shadow);
            border: 1px solid #e5e5ea; display: flex; flex-direction: column; gap: 8px;
        }
        .badge {
            padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; width: fit-content;
        }
        .igla { background: #d4fadd; color: #1a7f37; }
        .damaged { background: #ffe5e5; color: #d70015; }

        /* PULPIT */
        #homescreen {
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 80px 25px; gap: 20px;
        }
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app-label { color: white; font-size: 11px; margin-top: 6px; }

        /* SETUP */
        #setup-layer {
            position: absolute; inset: 0; background: #fff; z-index: 2000;
            padding: 40px 25px; display: flex; flex-direction: column; justify-content: center;
        }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island"><span id="isl-content">System Ready</span></div>

    <div id="setup-layer">
        <h1 style="font-size: 32px; margin-bottom: 10px;">Logistic <span style="color:var(--ios-blue)">OS 10</span></h1>
        <p style="color: #666;">Zbuduj imperium handlu autami. Wybierz bazę:</p>
        <select id="city-select" style="padding:15px; width:100%; border-radius:12px; border:1px solid #ddd;">
            <option value="Warszawa">Warszawa (Centrum)</option>
            <option value="Poznań">Poznań (Handel)</option>
            <option value="Gdańsk">Gdańsk (Port)</option>
        </select>
        <button onclick="bootSystem()" style="background:var(--ios-blue); color:#fff; border:none; padding:18px; border-radius:15px; margin-top:20px; font-weight:bold; cursor:pointer;">START</button>
    </div>
<div id="win-garage" class="win">
    <div class="win-header">
        <h2 style="margin:0; font-size:18px;">Mój Plac / Garaż</h2>
        <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">Zamknij</button>
    </div>
    <div class="win-body" id="garage-body">
        </div>
</div>
    <div id="win-gov" class="win">
    <div class="win-header">
        <h2 style="margin:0; font-size:18px;">e-Urząd Skarbowy</h2>
        <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">Zamknij</button>
    </div>
    <div id="gov-alert" style="background:var(--ios-red); color:#fff; padding:10px; font-size:12px; text-align:center; display:none;">
        ⚠️ MASZ ZALEGŁOŚCI PODATKOWE!
    </div>
    <div class="win-body" id="gov-body">
        </div>
</div>
    <div id="win-profile" class="win">
    <div class="win-header">
        <h2 style="margin:0; font-size:18px;">Mój Profil Handlarza</h2>
        <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">Zamknij</button>
    </div>
    <div class="win-body" id="profile-body">
        </div>
</div>
    <div id="win-messages" class="win">
    <div class="win-header">
        <h2 style="margin:0; font-size:18px;">Wiadomości</h2>
        <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">Zamknij</button>
    </div>
    <div class="win-body" id="messages-body" style="background:#fff;">
        </div>
</div>
    <div id="win-hr" class="win">
    <div class="win-header">
        <h2 style="margin:0; font-size:18px;">Biuro i Rekrutacja</h2>
        <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">Zamknij</button>
    </div>
    <div class="win-body" id="hr-body">
        </div>
</div>
    <div id="win-darknet" class="win" style="background:#1a1a1a; color:#fff;">
    <div class="win-header" style="background:#222; border-bottom:1px solid #444;">
        <h2 style="margin:0; font-size:18px; color:#ff3b30;">DarkNet Cars</h2>
        <button onclick="closeW()" style="border:none; background:#444; color:#fff; padding:8px 15px; border-radius:10px;">X</button>
    </div>
    <div style="background:#ff3b30; color:#fff; font-size:10px; padding:5px; text-align:center; font-weight:bold;">
        ANONIMOWE POŁĄCZENIE SZYFROWANE... OK
    </div>
    <div class="win-body" id="darknet-body">
        </div>
</div>
    <div id="win-logs" class="win">
    <div class="win-header">
        <h2 style="margin:0; font-size:18px;">Powiadomienia Systemowe</h2>
        <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">Zamknij</button>
    </div>
    <div class="win-body" id="logs-body">
        </div>
</div>
    <div id="screen">
        <div id="homescreen"></div>

        <div id="win-olx" class="win">
            <div class="win-header">
                <h2>Otomoto</h2>
                <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">X</button>
            </div>
            <div class="win-body" id="olx-body"></div>
        </div>

        <div id="win-bank" class="win">
            <div class="win-header">
                <h2>mBank</h2>
                <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">X</button>
            </div>
            <div class="win-body" id="bank-body"></div>
        </div>

        <div id="win-map" class="win">
            <div class="win-header">
                <h2>Mapy GPS</h2>
                <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">X</button>
            </div>
            <div class="win-body" style="padding:0;">
                <div id="map-container" style="width:100%; height:300px; background:#aad3df; position:relative;"></div>
                <div id="fleet-list" style="padding:15px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
/* ==========================================================================
   MODUŁ 0: KERNEL & SYSTEM
   ========================================================================== */
let DB = {
    money: 45000,
    city: "",
    inventory: [],
    activeJobs: [],
    market: [],
    employees: [{ name: "Marek", status: "WOLNY", salary: 3000 }],
    taxDebt: 0
};

function bootSystem() {
    DB.city = document.getElementById('city-select').value;
    document.getElementById('setup-layer').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    refreshMarket();
    renderPulpit();
}

function closeW() {
    document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
}

function openApp(id) {
    closeW();
    const w = document.getElementById('win-' + id);
    if(w) w.style.display = 'flex';
    if(id === 'olx') renderOLX();
    if(id === 'bank') renderBank();
    if(id === 'map') renderMap();
}

function renderPulpit() {
const apps = [
  const apps = [
 const apps = [
    { id: 'olx', name: 'Otomoto', icon: 'fa-car', bg: '#ff5a10' },
    { id: 'bank', name: 'mBank', icon: 'fa-building-columns', bg: '#ff0000' },
    { id: 'map', name: 'Mapy', icon: 'fa-map-location-dot', bg: '#34c759' },
    { id: 'garage', name: 'Garaż', icon: 'fa-warehouse', bg: '#5856d6' },
    { id: 'gov', name: 'e-Urząd', icon: 'fa-landmark', bg: '#8e8e93' },
    { id: 'messages', name: 'SMS', icon: 'fa-comment', bg: '#2ecc71' },
    { id: 'hr', name: 'Biuro', icon: 'fa-users-gear', bg: '#5ac8fa' },
    { id: 'logs', name: 'Powiadomienia', icon: 'fa-bell', bg: '#ff3b30' }
];
    document.getElementById('homescreen').innerHTML = apps.map(app => `
        <div class="app-wrapper" onclick="openApp('${app.id}')">
            <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
            <div class="app-label">${app.name}</div>
        </div>
    `).join('');
}

function save() { localStorage.setItem('logistic_v10', JSON.stringify(DB)); }
/* ==========================================================================
   MODUŁ 2: MAPY, GPS I RUCH LAWET (LOGISTYKA LIVE)
   ========================================================================== */

// 1. KOORDYNATY MIAST DO RYSOWANIA (Procenty ekranu)
const MAP_COORDS = {
    "Warszawa": { x: 70, y: 45 },
    "Poznań": { x: 30, y: 40 },
    "Gdańsk": { x: 50, y: 15 },
    "Kraków": { x: 65, y: 80 },
    "Wrocław": { x: 35, y: 70 }
};

// 2. RENDEROWANIE MAPY GPS
function renderMap() {
    const container = document.getElementById('map-container');
    const fleetList = document.getElementById('fleet-list');
    
    // Czyścimy mapę i rysujemy tło (Drogi)
    container.innerHTML = '<div style="position:absolute; width:100%; height:100%; border:5px solid #fff; border-radius:15px; box-sizing:border-box;"></div>';

    // Rysujemy miasta
    for (let name in MAP_COORDS) {
        const c = MAP_COORDS[name];
        const isBase = (name === DB.city);
        container.innerHTML += `
            <div style="position:absolute; left:${c.x}%; top:${c.y}%; transform:translate(-50%, -50%); z-index:10;">
                <div style="width:12px; height:12px; background:${isBase ? 'var(--ios-blue)' : '#fff'}; border:3px solid #000; border-radius:50%;"></div>
                <span style="font-size:9px; font-weight:900; background:rgba(255,255,255,0.8); padding:1px 3px; border-radius:4px; display:block; margin-top:2px;">${name.toUpperCase()}</span>
            </div>
        `;
    }

    // Rysujemy aktywne trasy i lawety
    DB.activeJobs.forEach((job, index) => {
        const start = MAP_COORDS[job.from] || {x:50, y:50};
        const end = MAP_COORDS[job.to] || {x:50, y:50};
        
        // Obliczanie pozycji lawety na podstawie progresu (0-100)
        const curX = start.x + (end.x - start.x) * (job.prog / 100);
        const curY = start.y + (end.y - start.y) * (job.prog / 100);

        container.innerHTML += `
            <div style="position:absolute; left:${curX}%; top:${curY}%; transform:translate(-50%, -50%); z-index:20; color:var(--ios-red); transition:all 1s linear;">
                <i class="fa-solid fa-truck-moving" style="font-size:18px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));"></i>
                <div style="background:#000; color:#fff; font-size:8px; padding:2px 4px; border-radius:4px; white-space:nowrap; position:absolute; top:-15px;">${job.driver.name}</div>
            </div>
        `;
    });

    // Lista floty pod mapą
    fleetList.innerHTML = `<h3>Aktywne Transporty (${DB.activeJobs.length})</h3>`;
    if(DB.activeJobs.length === 0) {
        fleetList.innerHTML += `<p style="color:#888;">Brak aktywnych transportów. Kup auto w Otomoto.</p>`;
    } else {
        DB.activeJobs.forEach(job => {
            fleetList.innerHTML += `
                <div class="pl-card" style="padding:10px; font-size:13px; border-left: 5px solid var(--ios-blue);">
                    <b>${job.car.m}</b><br>
                    Trasa: ${job.from} ➔ ${job.to}<br>
                    <div style="width:100%; height:6px; background:#eee; border-radius:3px; margin-top:5px;">
                        <div style="width:${job.prog}%; height:100%; background:var(--ios-blue); border-radius:3px; transition:0.5s;"></div>
                    </div>
                </div>
            `;
        });
    }
}

// 3. SILNIK LOGISTYCZNY (Odpalany co sekundę)
setInterval(() => {
    let changed = false;
    DB.activeJobs.forEach((job, index) => {
        job.prog += 2; // Szybkość jazdy (2% na sekundę)
        changed = true;

        if (job.prog >= 100) {
            // Dostawa zakończona
            DB.inventory.push(job.car);
            job.driver.status = "WOLNY";
            DB.activeJobs.splice(index, 1);
            alert("DOSTAWA: " + job.car.m + " dotarł do bazy w " + DB.city + "!");
        }
    });

    if (changed) {
        if(document.getElementById('win-map').style.display === 'flex') renderMap();
        updateIsland();
        save();
    }
}, 1000);

// 4. AKTUALIZACJA DYNAMIC ISLAND (Status GPS)
function updateIsland() {
    const isl = document.getElementById('isl-content');
    if (DB.activeJobs.length > 0) {
        isl.innerHTML = `<i class="fa-solid fa-truck-fast"></i> Transport: ${DB.activeJobs.length} aut`;
    } else {
        isl.innerHTML = `<i class="fa-solid fa-satellite-dish"></i> GPS Gotowy`;
    }
}
    /* ==========================================================================
   MODUŁ 3: GARAŻ, MECHANIK I SPRZEDAŻ
   ========================================================================== */

// 1. RENDEROWANIE PLACU (TWOJE AUTA)
function renderGarage() {
    const body = document.getElementById('garage-body');
    
    if (DB.inventory.length === 0) {
        body.innerHTML = `
            <div style="text-align:center; padding:40px; color:#888;">
                <i class="fa-solid fa-car-rear" style="font-size:40px; margin-bottom:10px;"></i>
                <p>Twój plac jest pusty.<br>Kup coś na Otomoto i poczekaj na dostawę!</p>
            </div>`;
        return;
    }

    body.innerHTML = `
        <div style="background:var(--ios-blue); color:#fff; padding:15px; border-radius:15px; margin-bottom:15px;">
            <small>Twoje auta:</small>
            <h3 style="margin:0;">${DB.inventory.length} sztuk na placu</h3>
        </div>
    `;

    body.innerHTML += DB.inventory.map((car, i) => `
        <div class="pl-card" style="border-left: 5px solid ${car.damaged ? 'var(--ios-red)' : 'var(--ios-green)'};">
            <div style="display:flex; justify-content:space-between;">
                <span class="badge ${car.damaged ? 'damaged' : 'igla'}">${car.damaged ? 'DO NAPRAWY' : 'IGŁA'}</span>
                <b>VIN: ${car.id}</b>
            </div>
            <h3 style="margin:5px 0;">${car.m}</h3>
            
            <div style="background:#f9f9f9; padding:10px; border-radius:10px; font-size:12px; margin:5px 0;">
                ${car.damaged ? '⚠️ Silnik kopci, zawieszenie stuka.' : '✅ Lakier lśni, silnik pracuje równo.'}
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                ${car.damaged ? 
                    `<button onclick="repairCar(${i})" style="padding:12px; border-radius:10px; border:none; background:#ff9500; color:#fff; font-weight:bold;">NAPRAW (2500 zł)</button>` : 
                    `<button disabled style="padding:12px; border-radius:10px; border:none; background:#ccc; color:#fff;">SPRAWNY</button>`
                }
                <button onclick="sellCar(${i})" style="padding:12px; border-radius:10px; border:none; background:var(--ios-green); color:#fff; font-weight:bold;">SPRZEDAJ</button>
            </div>
        </div>
    `).join('');
}

// 2. LOGIKA NAPRAWY
function repairCar(i) {
    const cost = 2500;
    if (DB.money < cost) return alert("Brak środków na mechanika!");

    DB.money -= cost;
    DB.inventory[i].damaged = false;
    DB.inventory[i].desc = "Niemiec płakał jak sprzedawał. Stan: IGŁA!";
    
    alert("Mechanik Mietek wyklepał auto! Teraz jest warte więcej.");
    renderGarage();
    save();
}

// 3. LOGIKA SPRZEDAŻY (ZYSK)
function sellCar(i) {
    const car = DB.inventory[i];
    
    // Obliczanie ceny sprzedaży (marża)
    // Jeśli auto jest uszkodzone, dostajesz mało. Jeśli igła - zarabiasz.
    let sellPrice = car.p;
    if (car.damaged) {
        sellPrice = Math.floor(car.p * 0.8); // Strata 20% na trupie
        alert("Sprzedałeś uszkodzone auto handlarzowi. Zarobek marny...");
    } else {
        sellPrice = Math.floor(car.p * 1.3); // Zysk 30% na igle
        alert("Klient zachwycony stanem IGŁA! Solidny zarobek.");
    }

    DB.money += sellPrice;
    DB.stats.sold += 1;
    
    // Powiadomienie w Dynamic Island
    const isl = document.getElementById('isl-content');
    isl.innerHTML = `<span style="color:var(--ios-green)">+$${sellPrice.toLocaleString()}</span>`;
    setTimeout(updateIsland, 3000);

    DB.inventory.splice(i, 1);
    renderGarage();
    renderBank(); // Odśwież stan konta jeśli otwarte
    save();
}

// 4. AKTUALIZACJA FUNKCJI OTWIERANIA APKI
// (Podmień fragment w openApp z Modułu 0 lub doklej to zabezpieczenie)
const originalOpenApp = openApp;
openApp = function(id) {
    originalOpenApp(id);
    if(id === 'garage') renderGarage();
};
    /* ==========================================================================
   MODUŁ 4: URZĄD SKARBOWY, PCC-3 I SYSTEM MANDATÓW
   ========================================================================== */

// 1. ROZSZERZENIE LOGIKI KUPNA O PODATEK PCC (Dodaj to do buyCar w Module 1)
// Przy każdym zakupie naliczamy 2% podatku PCC-3
const originalBuyCar = buyCar;
buyCar = function(i) {
    const carPrice = DB.market[i].p;
    const tax = Math.floor(carPrice * 0.02); // 2% PCC
    DB.taxDebt += tax;
    originalBuyCar(i);
};

// 2. RENDEROWANIE URZĘDU
function renderGov() {
    const body = document.getElementById('gov-body');
    const alertBar = document.getElementById('gov-alert');
    
    alertBar.style.display = DB.taxDebt > 5000 ? 'block' : 'none';

    body.innerHTML = `
        <div class="pl-card" style="border-top: 4px solid #333;">
            <p style="margin:0; color:#666;">Zaległy podatek PCC-3:</p>
            <h2 style="margin:5px 0; color:${DB.taxDebt > 0 ? 'var(--ios-red)' : 'var(--ios-green)'}">
                ${DB.taxDebt.toLocaleString()} PLN
            </h2>
            <button onclick="payTax()" style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--ios-blue); color:#fff; font-weight:bold; margin-top:10px;">
                OPŁAĆ PODATKI
            </button>
        </div>

        <div class="pl-card">
            <h4>Historia Kontroli ITD:</h4>
            <div id="itd-log" style="font-size:11px; color:#555;">
                Ostatnia kontrola: brak uwag.
            </div>
        </div>
        
        <p style="font-size:10px; color:#999; text-align:center; padding:10px;">
            Pamiętaj: Nieopłacenie podatku powyżej 10,000 PLN skutkuje blokadą konta bankowego!
        </p>
    `;
}

// 3. LOGIKA PŁACENIA PODATKU
function payTax() {
    if (DB.money < DB.taxDebt) return alert("Nie masz tyle kasy na koncie!");
    if (DB.taxDebt <= 0) return alert("Wszystkie podatki opłacone. Jesteś wzorowym obywatelem.");

    DB.money -= DB.taxDebt;
    DB.taxDebt = 0;
    alert("Podatki zapłacone. Możesz spać spokojnie.");
    renderGov();
    save();
}

// 4. LOSOWE ZDARZENIA: MANDATY I KONTROLE (Tick co 30 sek)
setInterval(() => {
    if (DB.activeJobs.length > 0) {
        const r = Math.random();
        
        // 10% szansy na mandat podczas transportu
        if (r < 0.1) {
            const fine = 500 + Math.floor(Math.random() * 1500);
            DB.money -= fine;
            
            // Powiadomienie
            const isl = document.getElementById('isl-content');
            isl.innerHTML = `<span style="color:var(--ios-red)">MANDAT ITD: -${fine} PLN</span>`;
            
            alert("Marek został zatrzymany przez ITD! Przeładowana laweta. Mandat: " + fine + " PLN.");
            save();
            setTimeout(updateIsland, 5000);
        }
    }
    
    // Blokada konta przy dużym długu
    if (DB.taxDebt > 10000 && Math.random() > 0.8) {
        alert("URZĄD SKARBOWY: Twoje konto zostało zajęte! Kara karna: 2000 PLN.");
        DB.money -= 2000;
        save();
    }
}, 30000);

// 2. FUNKCJA OBLICZANIA AKTUALNEJ RANGI
function getMyRank() {
    let currentRank = RANKS[0];
    for (let r of RANKS) {
        if (DB.stats.sold >= r.minSold) currentRank = r;
    }
    return currentRank;
}

// 3. RENDEROWANIE PROFILU
function renderProfile() {
    const body = document.getElementById('profile-body');

    body.innerHTML = `

        </div>

            <h4>Postęp do następnej rangi:</h4>
            <div style="width:100%; height:12px; background:#eee; border-radius:6px; overflow:hidden; margin:10px 0;">

        const names = ["Szwagier", "Handlarz Mirek", "Nieznany", "Paser Leon"];
        const name = names[Math.floor(Math.random() * names.length)];

            time: "Teraz",

        };

// 3. OBSŁUGA KLIKNIĘCIA W WIADOMOŚĆ
function handleMessage(i) {
    const m = DB.messages[i];
    if (m.type === 'deal') {
        const conf = confirm(`${m.from} pisze: "${m.msg}"\n\nAuto: ${m.car.m}\nCena: ${m.car.p} PLN\n\nKupujesz w ciemno?`);
        if (conf) {
            if (DB.money >= m.car.p) {
                const driver = DB.employees.find(e => e.status === "WOLNY");
                if (driver) {
                    DB.money -= m.car.p;
                    driver.status = "W TRASIE";
                    DB.activeJobs.push({
                        car: m.car,
                        driver: driver,
                        prog: 0,
                        from: m.car.loc,
                        to: DB.city
                    });
                    DB.messages.splice(i, 1);
                    alert("Ryzykowny zakup dokonany! Marek jedzie do Radomia.");
                    renderMessages();
                    save();
                } else {
                    alert("Brak wolnych kierowców!");
                }
            } else {
                alert("Nie masz tyle kasy!");
            }
        }
    } else {
        alert(`${m.from} mówi: ${m.msg}`);
    }
}

function hireEmployee(name, salary) {
    if (DB.money < 5000) return alert("Musisz mieć min. 5000 PLN zabezpieczenia, by zatrudnić kogoś nowego!");
    
    DB.employees.push({
        id: Date.now(),
        name: name,
        status: "WOLNY",
        salary: salary,
        mood: 100
    });
    
    alert("Zatrudniono: " + name + "! Teraz możesz kupować więcej aut naraz.");
    renderHR();
    save();
}

// 3. LOGIKA ZWALNIANIA
function fireEmployee(i) {
    if (DB.employees[i].status !== "WOLNY") return alert("Nie możesz zwolnić kierowcy, który jest w trasie!");
    if (confirm("Czy na pewno chcesz zwolnić " + DB.employees[i].name + "?")) {
        DB.employees.splice(i, 1);
        renderHR();
        save();
    }
}

DB.logs = [{ txt: "System Logistic OS 10 uruchomiony.", time: new Date().toLocaleTimeString(), type: "info" }];

// 1. FUNKCJA DODAWANIA LOGU
function addLog(text, type = "info") {
    DB.logs.unshift({ txt: text, time: new Date().toLocaleTimeString(), type: type });
    if(DB.logs.length > 20) DB.logs.pop(); // Max 20 wpisów
    
    // Powiadomienie na Dynamic Island
    const isl = document.getElementById('isl-content');
    const colors = { error: "#ff3b30", success: "#34c759", info: "#007aff" };
    isl.style.color = colors[type] || "#fff";
    isl.innerHTML = text;
    
    setTimeout(updateIsland, 4000);
    save();
}

// 2. RENDEROWANIE OKNA LOGÓW
function renderLogs() {
    const body = document.getElementById('logs-body');
    body.innerHTML = DB.logs.map(log => `
        <div style="padding:10px; border-bottom:1px solid #eee; font-size:12px; border-left: 4px solid ${log.type === 'error' ? 'red' : (log.type === 'success' ? 'green' : 'blue')}">
            <small style="color:#999;">${log.time}</small><br>
            ${log.txt}
        </div>
    `).join('');
}

// 3. SILNIK LOSUJĄCY (Co 45 sekund szansa na event)
setInterval(() => {
    const r = Math.random();
    
    // EVENT 1: Znalezisko w aucie (Szczęście)
    if (r < 0.05 && DB.inventory.length > 0) {
        const bonus = 500 + Math.floor(Math.random() * 1500);
        DB.money += bonus;
        addLog(`Znalazłeś ${bonus} PLN w schowku sprzedanego auta!`, "success");
    }
    
    // EVENT 2: Awaria lawety (Pech)
    else if (r < 0.10 && DB.activeJobs.length > 0) {
        const repairCost = 1200;
        DB.money -= repairCost;
        addLog(`Awaria lawety w trasie! Naprawa kosztowała ${repairCost} PLN.`, "error");
    }
    
    // EVENT 3: Kontrola Skarbowa (Zależne od długu)
    else if (DB.taxDebt > 5000 && r < 0.15) {
        const penalty = Math.floor(DB.taxDebt * 0.2);
        DB.taxDebt += penalty;
        addLog(`Kontrola Skarbowa wykryła błędy! Kara: ${penalty} PLN długu.`, "error");
    }

    // EVENT 4: Spadek cen paliw (Bonus do prędkości)
    else if (r < 0.03) {
        addLog("Paliwo staniało! Kierowcy jadą szybciej (tymczasowo).", "success");
        // Tu można by dodać modyfikator prędkości w DB
    }
    
    renderBank(); // Odśwież kasę jeśli otwarta
    if(document.getElementById('win-logs').style.display === 'flex') renderLogs();
}, 45000);
