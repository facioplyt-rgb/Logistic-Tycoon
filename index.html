<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUCK EMPIRE V11: MAP OVERLORD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #f1c40f; --dark: #000000; --card: #0d0d0d; --green: #2ecc71; --blue: #00d2ff; --red: #ff2e2e; --purple: #9b59b6; --neon: #39ff14; }
        body { font-family: 'Consolas', monospace; background: var(--dark); color: white; margin: 0; overflow: hidden; }

        /* HEADER HUD */
        #header { background: #000; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 3px solid var(--blue); text-align: center; box-shadow: 0 4px 15px rgba(0,210,255,0.3); }
        .stat-val { font-size: 16px; font-weight: bold; color: var(--gold); display: block; }

        /* CB RADIO TERMINAL */
        #cb-system { background: #050505; border-bottom: 1px solid var(--neon); height: 35px; overflow: hidden; position: relative; display: flex; align-items: center; }
        .cb-msg { color: var(--neon); font-size: 14px; position: absolute; white-space: nowrap; animation: scroll 20s linear infinite; text-transform: uppercase; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-300%); } }

        /* MAPA - FULL REPAIR */
        #map { height: 350px; width: 100%; border-bottom: 3px solid #222; z-index: 1; }
        .leaflet-container { background: #000 !important; }

        nav { display: flex; background: #111; z-index: 10; position: relative; }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-tab.active { color: #fff; border-bottom: 4px solid var(--blue); background: #1a1a1a; }

        .screen { display: none; height: calc(100vh - 300px); overflow-y: scroll; padding: 15px; box-sizing: border-box; }
        .screen.active { display: block; }

        /* CARDS */
        .card { background: var(--card); border: 2px solid #1a1a1a; padding: 15px; margin-bottom: 15px; border-radius: 8px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--blue); }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* TRUCK MARKERS */
        .truck-icon-wrap { text-align: center; width: 140px; }
        .truck-img { width: 85px; filter: drop-shadow(0 0 8px var(--blue)); }
        .name-label { background: rgba(0,0,0,0.9); color: var(--neon); font-size: 11px; padding: 3px 6px; border: 1px solid var(--neon); border-radius: 3px; font-weight: bold; display: inline-block; margin-top: -5px; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; margin-top: 10px; }
        .btn-blue { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }

        .prog-container { background: #000; height: 20px; border-radius: 10px; margin: 12px 0; border: 1px solid #333; overflow: hidden; position: relative; }
        .prog-bar { height: 100%; background: linear-gradient(90deg, #00d2ff, #9b59b6); transition: width 0.2s; }
        .prog-text { position: absolute; inset: 0; text-align: center; line-height: 20px; font-size: 11px; font-weight: bold; }

        #event-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100000; display: none; align-items: center; justify-content: center; }
        .event-box { border: 5px solid var(--red); padding: 40px; text-align: center; max-width: 500px; background: #000; }

        #log-panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #000; font-size: 11px; padding: 5px; color: #555; border-top: 2px solid #222; z-index: 99; overflow: hidden; }
    </style>
</head>
<body>

<div id="cb-system"><div id="cb-active-msg" class="cb-msg">>>> MONITOROWANIE GPS AKTYWNE. WSZYSTKIE JEDNOSTKI W TRASIE. <<<</div></div>

<div id="header">
    <div>KAPITAŁ<br><span id="val-cash" class="stat-val">0</span></div>
    <div>BAZA ON<br><span id="val-fuel" class="stat-val">0</span></div>
    <div>PRESTIŻ<br><span id="val-rep" class="stat-val">0</span></div>
    <div>RYNEK ON<br><span id="val-fuel-price" class="stat-val" style="color:var(--green)">0.00</span></div>
</div>

<div id="event-overlay">
    <div class="event-box">
        <h1 id="event-title" style="color:var(--red)">UWAGA!</h1>
        <p id="event-desc" style="font-size: 18px;"></p>
        <p id="event-driver" style="color:var(--gold); font-weight: bold;"></p>
        <button class="btn btn-blue" onclick="Game.Events.close()">PRZYJMIJ DO WIADOMOŚCI</button>
    </div>
</div>

<div id="start-screen" style="position:fixed; inset:0; background:#000; z-index:200000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:var(--blue); font-size: 50px; text-shadow: 0 0 20px var(--blue);">TRUCK EMPIRE V11</h1>
    <p style="color:var(--neon); letter-spacing: 10px;">MAP OVERLORD EDITION</p>
    <div id="load-box" style="display:none; margin-top:30px;"><button class="btn btn-green" style="width:300px; font-size: 20px;" onclick="Game.Persistence.load()">WCZYTAJ IMPERIUM</button></div>
    <div id="new-game-box" style="margin-top:30px; text-align:center;">
        <p>WYBIERZ MIASTO STARTOWE:</p>
        <div id="city-selection" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
    </div>
</div>

<nav>
    <button class="nav-tab active" onclick="Game.UI.switchTab('fleet')">SALON & PALIWO</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('map')">CENTRUM OPERACYJNE</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('hr')">ZARZĄDZANIE KADRAMI</button>
</nav>

<div id="screen-fleet" class="screen active">
    <div class="card" style="border: 2px solid var(--blue)">
        <h3>⛽ ZARZĄDZANIE PALIWEM (HURT)</h3>
        <p>Zbiorniki: <span id="fuel-txt">0</span> / 200,000 L</p>
        <button class="btn btn-blue" onclick="Game.Mechanic.refuel()">KUP PALIWO DO PEŁNA</button>
    </div>
    <div id="market-container"></div>
</div>

<div id="screen-map" class="screen">
    <div id="map"></div>
    <div id="active-missions-container"></div>
    <div class="card">
        <h2 style="color:var(--gold)">💰 GIEŁDA TRANSPORTOWA (LIVE)</h2>
        <div id="freight-container"></div>
    </div>
</div>

<div id="screen-hr" class="screen">
    <div id="driver-container"></div>
</div>

<div id="log-panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const Game = {
    isPaused: false,
    fuelPrice: 5.40,
    tScale: 1.0,
    fNames: ["Jan", "Piotr", "Marek", "Andrzej", "Mariusz", "Robert", "Dariusz", "Sławek", "Krzysiek", "Zbyszek"],
    lNames: ["Nowak", "Kowalski", "Wójcik", "Mazur", "Lewandowski", "Zieliński", "Szymański", "Woźniak", "Kozłowski", "Jankowski"],
    data: {
        cash: 50000, fuel: 25000, maxFuel: 200000, reputation: 0, homeCity: null, trucksOwned: [1, 0, 0],
        drivers: [{ id: 0, name: "Szef (Operator)", currentCity: null, busyUntil: 0, xp: 0, damage: 0 }],
        missions: [],
        cities: {
            "Warszawa": [52.2297, 21.0122], "Kraków": [50.0647, 19.9450], "Gdańsk": [54.3520, 18.6466], 
            "Wrocław": [51.1079, 17.0385], "Poznań": [52.4064, 16.9252], "Szczecin": [53.4289, 14.5530],
            "Lublin": [51.2465, 22.5666], "Katowice": [50.2649, 19.0238], "Białystok": [53.1325, 23.1688]
        },
        models: [
            { name: "RENAULT MASTER (BUS)", price: 15000, img: "https://images.dealer.com/ddc/vehicles/2023/Renault/Master/Commercial%20Chassis/Perspective/White.png", tier: 0 },
            { name: "MAN TGM (SOLO)", price: 75000, img: "https://www.scania.com/content/dam/scanianoe/market/master/products/trucks/p-series/scania-p-series-truck.png", tier: 1 },
            { name: "SCANIA R730 (ZESTAW)", price: 250000, img: "https://www.volvotrucks.pl/content/dam/volvo-trucks/markets/poland/trucks/volvo-fh16/volvo-fh16-white.png", tier: 2 }
        ]
    },

    init() {
        if(localStorage.getItem('truckEmpireV11')) document.getElementById('load-box').style.display = 'block';
        const grid = document.getElementById('city-selection');
        Object.keys(this.data.cities).forEach(c => {
            const b = document.createElement('button'); b.className = 'btn btn-purple'; b.innerText = c;
            b.onclick = () => this.startGame(c); grid.appendChild(b);
        });
        setInterval(() => this.tick(), 6000);
    },

    tick() {
        if(this.isPaused) return;
        this.fuelPrice = (4.50 + Math.random() * 3.5).toFixed(2);
        document.getElementById('val-fuel-price').innerText = this.fuelPrice;
        
        const msgs = [
            {t: "Wypadek na A1! Wszystkie zestawy stoją!", s: 0.1},
            {t: "ITD kontroluje wagę w Katowicach!", s: 0.6},
            {t: "Nocna jazda bez utrudnień. Gaz do dechy!", s: 1.4},
            {t: "Ulewa na Mazurach. Zachowaj ostrożność!", s: 0.7},
            {t: "Czysto u mobilków, szerokości!", s: 1.0}
        ];
        if(Math.random() > 0.6) {
            const m = msgs[Math.floor(Math.random()*msgs.length)];
            document.getElementById('cb-active-msg').innerText = ">>> CB-RADIO: " + m.t + " <<<";
            this.tScale = m.s;
        }
    },

    startGame(city) {
        this.data.homeCity = city;
        this.data.drivers[0].currentCity = city;
        document.getElementById('start-screen').style.display = 'none';
        this.UI.initMap();
        this.Logistics.gen();
        this.loop();
        this.UI.render();
    },

    Persistence: {
        save() { localStorage.setItem('truckEmpireV11', JSON.stringify(Game.data)); },
        load() {
            Game.data = JSON.parse(localStorage.getItem('truckEmpireV11'));
            Game.data.drivers.forEach(d => d.busyUntil = 0);
            document.getElementById('start-screen').style.display = 'none';
            Game.UI.initMap();
            Game.Logistics.gen();
            Game.loop();
            Game.UI.render();
        }
    },

    UI: {
        map: null, markers: {}, lines: {},
        initMap() {
            this.map = L.map('map', { zoomControl: false }).setView([52.1, 19.2], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                maxZoom: 18
            }).addTo(this.map);
            L.control.zoom({ position: 'topright' }).addTo(this.map);
        },
        switchTab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('screen-'+id).classList.add('active');
            if(id === 'map' && this.map) setTimeout(() => this.map.invalidateSize(), 200);
        },
        render() {
            document.getElementById('val-cash').innerText = Math.floor(Game.data.cash) + " PLN";
            document.getElementById('val-fuel').innerText = Math.floor(Game.data.fuel) + " L";
            document.getElementById('val-rep').innerText = Game.data.reputation + " XP";
            document.getElementById('fuel-txt').innerText = Math.floor(Game.data.fuel);
            
            let mH = '';
            Game.data.models.forEach((m, i) => {
                const cost = Math.floor(m.price * Math.pow(1.7, Game.data.trucksOwned[i]));
                mH += `<div class="card"><img src="${m.img}" style="width:110px;"><br><b>${m.name}</b><br>Posiadasz: ${Game.data.trucksOwned[i]}<br><button class="btn btn-green" onclick="Game.Mechanic.buy(${i},${cost})">ZAKUP: ${cost} PLN</button></div>`;
            });
            document.getElementById('market-container').innerHTML = mH;

            let fH = '';
            const best = Game.data.trucksOwned.reduce((m, q, i) => q > 0 ? i : m, 0);
            Game.Logistics.jobs.forEach(j => {
                const can = best >= j.tier;
                fH += `<div class="card" style="border-right: 6px solid ${can?'var(--green)':'var(--red)'}">
                    <b style="color:var(--gold); font-size: 18px;">${j.reward} PLN</b><br>${j.item} (${j.start} ⮕ ${j.dest})<br>
                    <button class="btn ${can?'btn-blue':'btn-dark'}" onclick="Game.Logistics.accept('${j.id}')" ${can?'':'disabled'}>${can?'AKCEPTUJ ZLECENIE':'BRAK ODPOWIEDNIEGO TIRA'}</button>
                </div>`;
            });
            document.getElementById('freight-container').innerHTML = fH;

            let dH = '';
            Game.data.drivers.forEach(d => {
                dH += `<div class="card"><b>👤 ${d.name}</b><br>Lokalizacja: ${d.currentCity}<br>Staź: ${d.xp} pkt. | Kondycja: ${100-d.damage}%</div>`;
            });
            dH += `<button class="btn btn-purple" onclick="Game.HR.hire()">WERBUJ KIEROWCĘ (20,000 PLN)</button>`;
            document.getElementById('driver-container').innerHTML = dH;
        }
    },

    Logistics: {
        jobs: [],
        gen() {
            const cities = Object.keys(Game.data.cities);
            setInterval(() => {
                if(this.jobs.length > 7) this.jobs.shift();
                const s = cities[Math.floor(Math.random()*cities.length)], d = cities[Math.floor(Math.random()*cities.length)];
                if(s !== d) {
                    const t = Math.floor(Math.random()*3);
                    this.jobs.push({ id: Math.random().toString(36).substr(2,5), item: "PRODUKTY T" + (t+1), start: s, dest: d, reward: 15000 + (t*18000), tier: t });
                    Game.UI.render();
                }
            }, 8000);
        },
        async accept(id) {
            const j = this.jobs.find(x => x.id === id);
            let drv = Game.data.drivers.find(d => d.busyUntil < Date.now());
            if(!drv || Game.data.fuel < 3000) return alert("System: Brak wolnego kierowcy lub rezerwy paliwa!");

            // Logika trasy: BAZA -> START -> CEL
            const r1 = await this.route(Game.data.cities[drv.currentCity], Game.data.cities[j.start]);
            const r2 = await this.route(Game.data.cities[j.start], Game.data.cities[j.dest]);
            
            const m = {
                id: j.id, path: [...r1, ...r2], split: r1.length, prog: 0,
                reward: j.reward, dest: j.dest, load: j.start,
                drvId: drv.id, drvName: drv.name, img: Game.data.models[j.tier].img,
                status: 'DOJAZD'
            };

            drv.busyUntil = Date.now() + 10000000;
            Game.data.missions.push(m);
            Game.data.fuel -= 2500;
            
            Game.UI.lines[j.id] = L.polyline(m.path, {color: 'var(--blue)', weight: 4, opacity: 0.6, dashArray: '10, 10'}).addTo(Game.UI.map);
            const icon = L.divIcon({ 
                html: `<div class="truck-icon-wrap"><img src="${m.img}" class="truck-img"><br><div class="name-label">${m.drvName}</div></div>`, 
                className: 'custom-m' 
            });
            Game.UI.markers[j.id] = L.marker(Game.data.cities[drv.currentCity], {icon: icon}).addTo(Game.UI.map);
            
            this.jobs = this.jobs.filter(x => x.id !== id);
            Game.UI.render();
        },
        async route(s, e) {
            const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${s[1]},${s[0]};${e[1]},${e[0]}?overview=full&geometries=geojson`);
            const d = await r.json(); return d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        }
    },

    Mechanic: {
        buy(i, p) { if(Game.data.cash >= p) { Game.data.cash -= p; Game.data.trucksOwned[i]++; Game.UI.render(); Game.Persistence.save(); } },
        refuel() { 
            const cost = (Game.data.maxFuel - Game.data.fuel) * Game.fuelPrice;
            if(Game.data.cash >= cost) { Game.data.cash -= cost; Game.data.fuel = Game.data.maxFuel; Game.UI.render(); }
        }
    },

    HR: {
        hire() { 
            if(Game.data.cash >= 20000) { 
                Game.data.cash -= 20000; 
                const name = Game.fNames[Math.floor(Math.random()*10)] + " " + Game.lNames[Math.floor(Math.random()*10)];
                Game.data.drivers.push({id: Date.now(), name: name, busyUntil: 0, currentCity: Game.data.homeCity, xp: 0, damage: 0}); 
                Game.UI.render(); Game.Persistence.save();
            } 
        }
    },

    Events: {
        trigger() {
            if(Game.data.missions.length === 0) return;
            const m = Game.data.missions[Math.floor(Math.random()*Game.data.missions.length)];
            const drv = Game.data.drivers.find(d => d.id === m.drvId);
            const evs = [
                {t: "AWARIA CHŁODNICY", d: "Ciężarówka uziemiona na godzinę. Koszt serwisu.", c: 9000},
                {t: "KONTROLA TACHO", d: "Kierowca przekroczył czas pracy. Surowy mandat.", c: 6000},
                {t: "ZŁY ZAŁADUNEK", d: "Towar uszkodzony podczas hamowania.", c: 4000}
            ];
            const e = evs[Math.floor(Math.random()*evs.length)];
            Game.isPaused = true;
            document.getElementById('event-title').innerText = e.t;
            document.getElementById('event-desc').innerText = e.d;
            document.getElementById('event-driver').innerText = "KIEROWCA: " + drv.name;
            document.getElementById('event-overlay').style.display = 'flex';
            Game.data.cash -= e.c;
            drv.damage += 15;
            Game.UI.render();
        },
        close() { document.getElementById('event-overlay').style.display = 'none'; Game.isPaused = false; }
    },

    loop() {
        setInterval(() => {
            if(Game.isPaused) return;
            let h = '';
            Game.data.missions = Game.data.missions.filter(m => {
                m.prog += (0.002 * Game.tScale);
                const p = Math.min(1, m.prog);
                const idx = Math.floor(p * (m.path.length - 1));
                
                m.status = idx < m.split ? "PUSTY (DOJAZD)" : "ZAŁADOWANY (KURS)";

                if(p >= 1) {
                    Game.data.cash += Number(m.reward); Game.data.reputation += 200;
                    const d = Game.data.drivers.find(x => x.id === m.drvId);
                    if(d) { d.currentCity = m.dest; d.busyUntil = 0; d.xp += 300; }
                    Game.UI.map.removeLayer(Game.UI.markers[m.id]); Game.UI.map.removeLayer(Game.UI.lines[m.id]);
                    Game.Persistence.save(); Game.UI.render();
                    return false;
                }

                Game.UI.markers[m.id].setLatLng(m.path[idx]);
                h += `<div class="card" onclick="Game.UI.map.setView([${m.path[idx][0]}, ${m.path[idx][1]}], 8)">
                    <span class="status-badge" style="background:${m.status.includes('PUSTY') ? 'var(--purple)':'var(--neon)'}">${m.status}</span>
                    <b>${m.drvName}</b><br><small>${m.load} ⮕ ${m.dest}</small>
                    <div class="prog-container"><div class="prog-bar" style="width:${p*100}%"></div><div class="prog-text">${Math.floor(p*100)}%</div></div>
                </div>`;
                return true;
            });
            document.getElementById('active-missions-container').innerHTML = h;
            if(Math.random() > 0.999) Game.Events.trigger();
        }, 50);
    }
};

window.onload = () => Game.init();
</script>
</body>
</html>
