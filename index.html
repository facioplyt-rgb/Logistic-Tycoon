<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10 - Czysta Instalacja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* IPHONE */
        #iphone { width: 375px; height: 812px; background: #000; border: 12px solid #333; border-radius: 50px; position: relative; overflow: hidden; }
        #screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover; display: none; }
        #island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 160px; height: 35px; background: #000; border-radius: 20px; z-index: 1000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

        /* SETUP */
        #setup-layer { position: absolute; inset: 0; background: #fff; z-index: 2000; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #homescreen { display: grid; grid-template-columns: repeat(4, 1fr); padding: 80px 20px; gap: 20px; }
        
        /* APKI */
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .app-label { color: white; font-size: 11px; text-shadow: 0 1px 2px #000; }

        /* OKNA */
        .win { position: absolute; inset: 0; background: #f2f2f7; z-index: 500; display: none; flex-direction: column; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .win-header { padding: 45px 20px 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .win-body { flex: 1; overflow-y: auto; padding: 15px; }

        /* WHATSAPP STYLE */
        .chat-container { background: #e5ddd5; flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-in { background: #fff; align-self: flex-start; }
        .msg-out { background: #dcf8c6; align-self: flex-end; }
        
        /* PRZYCISKI */
        select, button { width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; border: 1px solid #ccc; margin-top: 10px; }
        .wa-btn { background: #25D366; color: white; border: none; font-weight: bold; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island" style="display:none;"></div>

    <div id="setup-layer">
        <i class="fa-solid fa-broom" style="font-size: 40px; color: var(--ios-blue); margin-bottom: 15px;"></i>
        <h1>Wszystko wyczyszczone</h1>
        <p>System jest gotowy. Wybierz miasto bazy:</p>
        <select id="city-select"></select>
        <button onclick="startApp()" style="background:var(--ios-blue); color:white; font-weight:bold; border:none;">START</button>
    </div>

    <div id="screen">
        <div id="homescreen"></div>
    </div>
</div>

<script>
    // --- CZYSZCZENIE NA DZIEŃ DOBRY ---
    localStorage.clear();
    console.clear();

    const CITIES = ["Warszawa", "Kraków", "Łódź", "Wrocław", "Poznań", "Gdańsk", "Szczecin", "Bydgoszcz", "Lublin", "Białystok"].sort();
    let DB = {
        money: 50000,
        city: "",
        apps: [
            { id: 'olx', name: 'Otomoto', icon: 'fa-car', bg: '#ff5a10' },
            { id: 'whatsapp', name: 'WhatsApp', icon: 'fa-whatsapp', bg: '#25D366' },
            { id: 'bank', name: 'mBank', icon: 'fa-building-columns', bg: '#ff0000' }
        ]
    };

    // Generuj miast
    const sel = document.getElementById('city-select');
    CITIES.forEach(c => sel.innerHTML += `<option>${c}</option>`);

    function startApp() {
        DB.city = sel.value;
        document.getElementById('setup-layer').style.display = 'none';
        document.getElementById('screen').style.display = 'block';
        document.getElementById('island').style.display = 'flex';
        
        updateIsland();
        renderIcons();
        createWindows();
    }

    function updateIsland() {
        document.getElementById('island').innerHTML = `<i class="fa-solid fa-wallet"></i> &nbsp; ${DB.money.toLocaleString()} PLN`;
    }

    function renderIcons() {
        const hs = document.getElementById('homescreen');
        hs.innerHTML = DB.apps.map(app => `
            <div class="app-wrapper" onclick="openApp('${app.id}')">
                <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
                <div class="app-label">${app.name}</div>
            </div>
        `).join('');
    }

    function createWindows() {
        DB.apps.forEach(app => {
            if(!document.getElementById('win-'+app.id)) {
                const w = document.createElement('div');
                w.id = 'win-' + app.id;
                w.className = 'win';
                w.innerHTML = `
                    <div class="win-header">
                        <b>${app.name}</b>
                        <button onclick="closeApp()" style="background:none; border:none; color:var(--ios-blue); font-weight:bold;">Gotowe</button>
                    </div>
                    <div class="win-body" id="body-${app.id}"></div>
                `;
                document.getElementById('iphone').appendChild(w);
            }
        });
    }

    function openApp(id) {
        document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
        document.getElementById('win-' + id).style.display = 'flex';
        if(id === 'olx') renderOLX();
        if(id === 'bank') renderBank();
    }

    function closeApp() { document.querySelectorAll('.win').forEach(w => w.style.display = 'none'); }

    // --- LOGIKA OTOMOTO & WHATSAPP ---
    function renderOLX() {
        const cars = [
            { m: "Audi A4 B6", p: 12500, loc: "Radom" },
            { m: "BMW E46", p: 18900, loc: "Gdynia" },
            { m: "VW Passat", p: 6800, loc: "Siedlce" }
        ];
        document.getElementById('body-olx').innerHTML = `<h3>Giełda</h3>` + cars.map(c => `
            <div style="background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #eee;">
                <b>${c.m}</b> - ${c.p.toLocaleString()} PLN<br>
                <button class="wa-btn" onclick="startChat('${c.m}', ${c.p})">NEGOCJUJ NA WA</button>
            </div>
        `).join('');
    }

    function startChat(name, price) {
        openApp('whatsapp');
        const body = document.getElementById('body-whatsapp');
        body.innerHTML = `
            <div class="chat-container">
                <div class="msg msg-in">Dzień dobry, interesuje mnie ten ${name}. Ile do oddania?</div>
                <div class="msg msg-out">Za ${name} mogę zejść maksymalnie o 500 zł.</div>
            </div>
            <div style="padding:10px; background:#fff;">
                <button onclick="buyCar('${name}', ${price-500})" style="background:#25D366; color:white; font-weight:bold; border:none;">KUPUJĘ ZA ${(price-500).toLocaleString()} PLN</button>
            </div>
        `;
    }

    function buyCar(name, price) {
        if(DB.money >= price) {
            DB.money -= price;
            updateIsland();
            alert("KUPIONO: " + name + "! Kasa pobrana.");
            closeApp();
        } else { alert("Brak kasy!"); }
    }

    function renderBank() {
        document.getElementById('body-bank').innerHTML = `<div style="background:red; color:white; padding:25px; border-radius:15px; text-align:center;">
            <small>Saldo</small><h1>${DB.money.toLocaleString()} PLN</h1></div>`;
    }
</script>
</body>
</html>
