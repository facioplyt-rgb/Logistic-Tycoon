<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10 - Rebuild</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* OBUDOWA IPHONE */
        #iphone { width: 375px; height: 812px; background: #000; border: 12px solid #333; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* EKRAN STARTOWY */
        #setup-layer { position: absolute; inset: 0; background: #fff; z-index: 2000; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* EKRAN GRY (PULPIT) */
        #screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover; display: none; position: relative; }
        
        /* DYNAMIC ISLAND */
        #island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 150px; height: 35px; background: #000; border-radius: 20px; z-index: 1000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

        /* UI ELEMENTS */
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; background: #f9f9f9; font-size: 16px; margin-bottom: 15px; }
        #start-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--ios-blue); color: white; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        #start-btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island" style="display:none;"></div>

    <div id="setup-layer">
        <i class="fa-solid fa-map-location-dot" style="font-size: 50px; color: var(--ios-blue); margin-bottom: 15px;"></i>
        <h1>Witaj w Firmie</h1>
        <p>Wybierz miasto, w którym otworzysz swój pierwszy plac:</p>
        
        <select id="city-select">
            </select>
        
        <button id="start-btn" onclick="bootSystem()">ROZPOCZNIJ KARIERĘ</button>
    </div>

    <div id="screen">
        <div id="homescreen">
            </div>
    </div>
</div>

<script>
    // LISTA 100 NAJWIĘKSZYCH MIAST POLSKI (Sortowana alfabetycznie)
    const POLISH_CITIES = [
        "Warszawa", "Kraków", "Łódź", "Wrocław", "Poznań", "Gdańsk", "Szczecin", "Bydgoszcz", "Lublin", "Białystok",
        "Katowice", "Gdynia", "Częstochowa", "Radom", "Toruń", "Sosnowiec", "Rzeszów", "Kielce", "Gliwice", "Olsztyn",
        "Zabrze", "Bielsko-Biała", "Bytom", "Zielona Góra", "Rybnik", "Ruda Śląska", "Opole", "Tychy", "Gorzów Wlkp.", "Elbląg",
        "Płock", "Dąbrowa Górnicza", "Wałbrzych", "Włocławek", "Tarnów", "Chorzów", "Koszalin", "Kalisz", "Legnica", "Grudziądz",
        "Jaworzno", "Słupsk", "Jastrzębie-Zdrój", "Nowy Sącz", "Jelenia Góra", "Siedlce", "Konin", "Piotrków Tryb.", "Inowrocław", "Lubin",
        "Mysłowice", "Piła", "Ostrowiec Św.", "Ostrów Wlkp.", "Siemianowice Śl.", "Stargard", "Pabianice", "Gniezno", "Suwałki", "Głogów",
        "Chełm", "Przemyśl", "Zamość", "Tomaszów Maz.", "Stalowa Wola", "Kędzierzyn-Koźle", "Łomża", "Leszno", "Żory", "Bełchatów",
        "Mielec", "Tarnowskie Góry", "Tczew", "Świdnica", "Piekary Śląskie", "Będzin", "Zgierz", "Biała Podlaska", "Racibórz", "Ełk",
        "Pruszków", "Świętochłowice", "Ostrołęka", "Legionowo", "Zawiercie", "Legionowo", "Tarnobrzeg", "Puławy", "Wodzisław Śl.", "Radomsko",
        "Skarżysko-Kamienna", "Starachowice", "Krosno", "Kołobrzeg", "Dębica", "Kutno", "Nysa", "Ciechanów", "Otwock", "Sieradz"
    ].sort();

    // STAN GRY
    let DB = {
        money: 50000,
        city: "",
        apps: []
    };

    // INICJALIZACJA LISTY
    const select = document.getElementById('city-select');
    POLISH_CITIES.forEach(city => {
        let opt = document.createElement('option');
        opt.value = city;
        opt.innerHTML = city;
        select.appendChild(opt);
    });

    // URUCHOMIENIE
    function bootSystem() {
        DB.city = select.value;
        
        // Ukryj setup, pokaż grę
        document.getElementById('setup-layer').style.display = 'none';
        document.getElementById('screen').style.display = 'block';
        document.getElementById('island').style.display = 'flex';
        
        updateIsland();
        console.log("System odpalony w mieście: " + DB.city);
    }

    function updateIsland() {
        document.getElementById('island').innerHTML = `<i class="fa-solid fa-wallet" style="color:#34c759"></i> &nbsp; ${DB.money.toLocaleString()} PLN`;
    }
</script>

</body>
</html>
