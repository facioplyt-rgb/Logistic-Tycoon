<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #f2f2f7; --ios-blue: #007aff; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: #1c1c1e; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #iphone { width: 375px; height: 812px; background: #000; border: 12px solid #333; border-radius: 50px; position: relative; overflow: hidden; }
        #screen { width: 100%; height: 100%; background: #222 url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover; display: none; }
        #island { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #000; border-radius: 20px; z-index: 1000; }
        #setup-layer { position: absolute; inset: 0; background: #fff; z-index: 2000; padding: 40px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        #homescreen { display: grid; grid-template-columns: repeat(4, 1fr); padding: 80px 20px; gap: 20px; }
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; margin-bottom: 5px; }
        .app-label { color: white; font-size: 11px; text-shadow: 0 1px 2px #000; }
        button { width: 100%; padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 16px; background: var(--ios-blue); color: #fff; border: none; font-weight: bold; cursor: pointer; }
        select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ccc; margin-top: 10px; }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island"></div>
    <div id="setup-layer">
        <h1 style="font-size: 32px; margin-bottom: 5px;">Logistic <span style="color:var(--ios-blue)">OS 10</span></h1>
        <p style="color: #666; font-size: 14px;">Zbuduj imperium handlu autami. Wybierz bazę:</p>
        <select id="city-select">
            <option value="Warszawa">Warszawa (Centrum)</option>
            <option value="Poznań">Poznań (Handel)</option>
            <option value="Gdańsk">Gdańsk (Port)</option>
        </select>
        <button id="start-btn">START</button>
    </div>
    <div id="screen"><div id="homescreen"></div></div>
</div>

<script>
// DANE STARTOWE
let DB = { 
    money: 50000, 
    city: "", 
    apps: [
        { id: 'olx', name: 'Otomoto', icon: 'fa-car', bg: '#ff5a10' },
        { id: 'bank', name: 'mBank', icon: 'fa-building-columns', bg: '#ff0000' }
    ] 
};

// URUCHAMIANIE
document.getElementById('start-btn').addEventListener('click', function() {
    DB.city = document.getElementById('city-select').value;
    document.getElementById('setup-layer').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    renderPulpit();
});

// GENEROWANIE IKON
function renderPulpit() {
    const hs = document.getElementById('homescreen');
    hs.innerHTML = DB.apps.map(app => `
        <div class="app-wrapper" onclick="alert('Uruchamiam: ' + '${app.name}')">
            <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
            <div class="app-label">${app.name}</div>
        </div>
    `).join('');
}
    /* ==========================================================================
   MODUŁ 2: SYSTEM OKIEN I OTOMOTO (GIEŁDA)
   ========================================================================== */

// 1. DODAJEMY STYLE DLA OKIEN (Dynamicznie)
const style = document.createElement('style');
style.innerHTML = `
    .win { position: absolute; inset: 0; background: #f2f2f7; z-index: 500; display: none; flex-direction: column; }
    .win-header { padding: 45px 20px 15px; background: #fff; border-bottom: 1px solid #d1d1d6; display: flex; justify-content: space-between; align-items: center; }
    .win-header h2 { margin: 0; font-size: 17px; }
    .win-body { flex: 1; overflow-y: auto; padding: 15px; }
    .close-btn { background: #e5e5ea; color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .car-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #ddd; }
    .car-card h3 { margin: 0 0 5px 0; font-size: 16px; }
    .buy-btn { width: 100%; background: #ff5a10; color: #fff; border: none; padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
`;
document.head.appendChild(style);

// 2. TWORZYMY STRUKTURĘ OKIEN W HTML
const winContainer = document.createElement('div');
winContainer.innerHTML = `
    <div id="win-olx" class="win">
        <div class="win-header"><h2>Otomoto</h2><button class="close-btn" onclick="closeW()">Gotowe</button></div>
        <div class="win-body" id="olx-body"></div>
    </div>
    <div id="win-bank" class="win">
        <div class="win-header"><h2>mBank</h2><button class="close-btn" onclick="closeW()">Zamknij</button></div>
        <div class="win-body" id="bank-body"></div>
    </div>
`;
document.getElementById('iphone').appendChild(winContainer);

// 3. LOGIKA OTWIERANIA I RENDEROWANIA
function openApp(id) {
    document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
    document.getElementById('win-' + id).style.display = 'flex';
    if(id === 'olx') renderOLX();
    if(id === 'bank') renderBank();
}

function closeW() { 
    document.querySelectorAll('.win').forEach(w => w.style.display = 'none'); 
}

// 4. GENEROWANIE AUT NA SPRZEDAŻ
function renderOLX() {
    const cars = [
        { m: "Audi A4 B6", p: 12000, loc: "Radom" },
        { m: "VW Passat (Igła)", p: 8500, loc: "Siedlce" },
        { m: "BMW E46 Coupe", p: 19000, loc: "Gdynia" }
    ];
    
    document.getElementById('olx-body').innerHTML = `
        <p style="color: #666; font-size: 12px;">Znaleziono 3 ogłoszenia w Twojej okolicy:</p>
        ${cars.map((c, i) => `
            <div class="car-card">
                <h3>${c.m}</h3>
                <b style="color: #ff5a10;">${c.p.toLocaleString()} PLN</b>
                <div style="font-size: 12px; color: #888;">Lokalizacja: ${c.loc}</div>
                <button class="buy-btn" onclick="alert('Kupiono ${c.m}! Marek już po nie jedzie.')">KUP TERAZ</button>
            </div>
        `).join('')}
    `;
}

function renderBank() {
    document.getElementById('bank-body').innerHTML = `
        <div style="background: #ff0000; color: #fff; padding: 20px; border-radius: 15px;">
            <small>Saldo główne</small>
            <h1 style="margin: 5px 0;">${DB.money.toLocaleString()} PLN</h1>
        </div>
    `;
}

// 5. NADPISUJEMY FUNKCJĘ RENDEROWANIA PULPITU (Żeby ikony reagowały)
function renderPulpit() {
    const hs = document.getElementById('homescreen');
    hs.innerHTML = DB.apps.map(app => `
        <div class="app-wrapper" onclick="openApp('${app.id}')">
            <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
            <div class="app-label">${app.name}</div>
        </div>
    `).join('');
}
</script>
</body>
</html>
