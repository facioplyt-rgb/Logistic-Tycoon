<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #f2f2f7; --ios-blue: #007aff; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: #1c1c1e; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #iphone { width: 375px; height: 812px; background: #000; border: 12px solid #333; border-radius: 50px; position: relative; overflow: hidden; }
        #screen { width: 100%; height: 100%; background: #222 url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover; display: none; }
        #island { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #000; border-radius: 20px; z-index: 1000; }
        #setup-layer { position: absolute; inset: 0; background: #fff; z-index: 2000; padding: 40px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        #homescreen { display: grid; grid-template-columns: repeat(4, 1fr); padding: 80px 20px; gap: 20px; }
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; margin-bottom: 5px; }
        .app-label { color: white; font-size: 11px; text-shadow: 0 1px 2px #000; }
        button { width: 100%; padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 16px; background: var(--ios-blue); color: #fff; border: none; font-weight: bold; cursor: pointer; }
        select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ccc; margin-top: 10px; }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island"></div>
    <div id="setup-layer">
        <h1 style="font-size: 32px; margin-bottom: 5px;">Logistic <span style="color:var(--ios-blue)">OS 10</span></h1>
        <p style="color: #666; font-size: 14px;">Zbuduj imperium handlu autami. Wybierz bazę:</p>
        <select id="city-select">
            <option value="Warszawa">Warszawa (Centrum)</option>
            <option value="Poznań">Poznań (Handel)</option>
            <option value="Gdańsk">Gdańsk (Port)</option>
        </select>
        <button id="start-btn">START</button>
    </div>
    <div id="screen"><div id="homescreen"></div></div>
</div>

<script>
// DANE STARTOWE
let DB = { 
    money: 50000, 
    city: "", 
    apps: [
        { id: 'olx', name: 'Otomoto', icon: 'fa-car', bg: '#ff5a10' },
        { id: 'bank', name: 'mBank', icon: 'fa-building-columns', bg: '#ff0000' }
    ] 
};

// URUCHAMIANIE
document.getElementById('start-btn').addEventListener('click', function() {
    DB.city = document.getElementById('city-select').value;
    document.getElementById('setup-layer').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    renderPulpit();
});

// GENEROWANIE IKON
function renderPulpit() {
    const hs = document.getElementById('homescreen');
    hs.innerHTML = DB.apps.map(app => `
        <div class="app-wrapper" onclick="alert('Uruchamiam: ' + '${app.name}')">
            <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
            <div class="app-label">${app.name}</div>
        </div>
    `).join('');
}
</script>
</body>
</html>
