<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10 - STABLE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; --wa-green: #25D366; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #iphone { width: 375px; height: 812px; background: #000; border: 12px solid #333; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover; display: none; }
        #island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 160px; height: 35px; background: #000; border-radius: 20px; z-index: 1000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; pointer-events: none; }

        #setup-layer { position: absolute; inset: 0; background: #fff; z-index: 2000; padding: 30px; display: flex; flex-direction: column; justify-content: center; }
        #homescreen { display: grid; grid-template-columns: repeat(4, 1fr); padding: 80px 20px; gap: 20px; }
        
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; margin-bottom: 5px; }
        .app-label { color: white; font-size: 11px; text-shadow: 0 1px 2px #000; }

        .win { position: absolute; inset: 0; background: var(--ios-bg); z-index: 500; display: none; flex-direction: column; }
        .win-header { padding: 45px 20px 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .win-body { flex: 1; overflow-y: auto; padding: 15px; }

        .card { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; }
        .btn-ios { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: var(--wa-green); color: white; margin-top: 10px; }
        
        select, .btn-start { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; margin-top: 10px; }
        .btn-start { background: var(--ios-blue); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island" style="display:none;"></div>

    <div id="setup-layer" id="setup">
        <h2 style="text-align:center; margin-bottom:15px;">Wybierz Bazę</h2>
        <select id="city-select"></select>
        <button class="btn-start" onclick="Core.boot()">URUCHOM SYSTEM</button>
    </div>

    <div id="screen">
        <div id="homescreen"></div>
    </div>
</div>

<script>
const Core = {
    money: 50000,
    city: "",
    apps: [],

    boot: function() {
        localStorage.clear();
        this.city = document.getElementById('city-select').value;
        document.getElementById('setup-layer').style.display = 'none';
        document.getElementById('screen').style.display = 'block';
        document.getElementById('island').style.display = 'flex';
        this.updateIsland();
        this.renderPulpit();
    },

    updateIsland: function() {
        document.getElementById('island').innerHTML = this.money.toLocaleString() + " PLN";
    },

    registerApp: function(config) {
        this.apps.push(config);
        const w = document.createElement('div');
        w.id = 'win-' + config.id;
        w.className = 'win';
        w.innerHTML = '<div class="win-header"><b>'+config.name+'</b><button onclick="Core.closeApp()" style="background:none;border:none;color:var(--ios-blue);font-weight:bold;">Gotowe</button></div><div class="win-body" id="body-'+config.id+'"></div>';
        document.getElementById('iphone').appendChild(w);
    },

    renderPulpit: function() {
        let html = '';
        this.apps.forEach(app => {
            html += '<div class="app-wrapper" onclick="Core.openApp(\''+app.id+'\')">';
            html += '<div class="app-icon" style="background:'+app.bg+'"><i class="fa-solid '+app.icon+'"></i></div>';
            html += '<div class="app-label">'+app.name+'</div></div>';
        });
        document.getElementById('homescreen').innerHTML = html;
    },

    openApp: function(id) {
        document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
        document.getElementById('win-' + id).style.display = 'flex';
        const app = this.apps.find(a => a.id === id);
        if(app && app.render) app.render();
    },

    closeApp: function() {
        document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
    }
};

// Miasta
const CITIES = ["Warszawa", "Kraków", "Łódź", "Wrocław", "Poznań", "Gdańsk", "Szczecin", "Bydgoszcz", "Lublin", "Białystok", "Radom", "Siedlce"].sort();
CITIES.forEach(c => {
    document.getElementById('city-select').innerHTML += '<option>'+c+'</option>';
});

/* --- MODUŁ 1: OTOMOTO --- */
Core.registerApp({
    id: 'olx',
    name: 'Otomoto',
    icon: 'fa-car',
    bg: '#ff5a10',
    render: function() {
        const cars = [
            {m: "Audi A4 B6", p: 12500},
            {m: "VW Passat B5", p: 8000},
            {m: "BMW E46", p: 19000}
        ];
        let html = '<h3>Ogłoszenia</h3>';
        cars.forEach(c => {
            html += '<div class="card"><b>'+c.m+'</b><br>'+c.p.toLocaleString()+' PLN';
            html += '<button class="btn-ios" onclick="alert(\'Kupiono!\')">KUP TERAZ</button></div>';
        });
        document.getElementById('body-olx').innerHTML = html;
    }
});
</script>

</body>
</html>
