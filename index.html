<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10.0 - Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1c1c1e; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* OBUDOWA IPHONE */
        #iphone {
            width: 375px; height: 812px;
            background: #000; border: 12px solid #333; border-radius: 50px;
            position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* EKRAN I TAPETA */
        #screen {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover;
            display: none; position: relative;
        }

        /* DYNAMIC ISLAND */
        #island {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 35px; background: #000; border-radius: 20px;
            z-index: 1000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px;
        }

        /* OKNA SYSTEMOWE - FIX CZYTELNOŚCI */
        .win {
            position: absolute; inset: 0; background: var(--ios-bg);
            z-index: 500; display: none; flex-direction: column;
        }
        .win-header {
            padding: 45px 20px 15px; background: #fff;
            border-bottom: 1px solid #d1d1d6; display: flex;
            justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .win-body {
            flex: 1; overflow-y: auto; padding: 15px;
            word-wrap: break-word; /* Tekst nie wychodzi! */
        }

        /* KARTY HANDLARZA */
        .pl-card {
            background: #fff; border-radius: 18px; padding: 15px;
            margin-bottom: 12px; box-shadow: var(--card-shadow);
            border: 1px solid #e5e5ea; display: flex; flex-direction: column; gap: 8px;
        }
        .badge {
            padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; width: fit-content;
        }
        .igla { background: #d4fadd; color: #1a7f37; }
        .damaged { background: #ffe5e5; color: #d70015; }

        /* PULPIT */
        #homescreen {
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 80px 25px; gap: 20px;
        }
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app-label { color: white; font-size: 11px; margin-top: 6px; }

        /* SETUP */
        #setup-layer {
            position: absolute; inset: 0; background: #fff; z-index: 2000;
            padding: 40px 25px; display: flex; flex-direction: column; justify-content: center;
        }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island"><span id="isl-content">System Ready</span></div>

    <div id="setup-layer">
        <h1 style="font-size: 32px; margin-bottom: 10px;">Logistic <span style="color:var(--ios-blue)">OS 10</span></h1>
        <p style="color: #666;">Zbuduj imperium handlu autami. Wybierz bazę:</p>
        <select id="city-select" style="padding:15px; width:100%; border-radius:12px; border:1px solid #ddd;">
            <option value="Warszawa">Warszawa (Centrum)</option>
            <option value="Poznań">Poznań (Handel)</option>
            <option value="Gdańsk">Gdańsk (Port)</option>
        </select>
        <button onclick="bootSystem()" style="background:var(--ios-blue); color:#fff; border:none; padding:18px; border-radius:15px; margin-top:20px; font-weight:bold; cursor:pointer;">START</button>
    </div>

    <div id="screen">
        <div id="homescreen"></div>

        <div id="win-olx" class="win">
            <div class="win-header">
                <h2>Otomoto</h2>
                <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">X</button>
            </div>
            <div class="win-body" id="olx-body"></div>
        </div>

        <div id="win-bank" class="win">
            <div class="win-header">
                <h2>mBank</h2>
                <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">X</button>
            </div>
            <div class="win-body" id="bank-body"></div>
        </div>

        <div id="win-map" class="win">
            <div class="win-header">
                <h2>Mapy GPS</h2>
                <button onclick="closeW()" style="border:none; background:#eee; padding:8px 15px; border-radius:10px;">X</button>
            </div>
            <div class="win-body" style="padding:0;">
                <div id="map-container" style="width:100%; height:300px; background:#aad3df; position:relative;"></div>
                <div id="fleet-list" style="padding:15px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
/* ==========================================================================
   MODUŁ 0: KERNEL & SYSTEM
   ========================================================================== */
let DB = {
    money: 45000,
    city: "",
    inventory: [],
    activeJobs: [],
    market: [],
    employees: [{ name: "Marek", status: "WOLNY", salary: 3000 }],
    taxDebt: 0
};

function bootSystem() {
    DB.city = document.getElementById('city-select').value;
    document.getElementById('setup-layer').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    refreshMarket();
    renderPulpit();
}

function closeW() {
    document.querySelectorAll('.win').forEach(w => w.style.display = 'none');
}

function openApp(id) {
    closeW();
    const w = document.getElementById('win-' + id);
    if(w) w.style.display = 'flex';
    if(id === 'olx') renderOLX();
    if(id === 'bank') renderBank();
    if(id === 'map') renderMap();
}

function renderPulpit() {
    const apps = [
        { id: 'olx', name: 'Otomoto', icon: 'fa-car', bg: '#ff5a10' },
        { id: 'bank', name: 'mBank', icon: 'fa-building-columns', bg: '#ff0000' },
        { id: 'map', name: 'Mapy', icon: 'fa-map-location-dot', bg: '#34c759' }
    ];
    document.getElementById('homescreen').innerHTML = apps.map(app => `
        <div class="app-wrapper" onclick="openApp('${app.id}')">
            <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
            <div class="app-label">${app.name}</div>
        </div>
    `).join('');
}

function save() { localStorage.setItem('logistic_v10', JSON.stringify(DB)); }
/* ==========================================================================
   MODUŁ 2: MAPY, GPS I RUCH LAWET (LOGISTYKA LIVE)
   ========================================================================== */

// 1. KOORDYNATY MIAST DO RYSOWANIA (Procenty ekranu)
const MAP_COORDS = {
    "Warszawa": { x: 70, y: 45 },
    "Poznań": { x: 30, y: 40 },
    "Gdańsk": { x: 50, y: 15 },
    "Kraków": { x: 65, y: 80 },
    "Wrocław": { x: 35, y: 70 }
};

// 2. RENDEROWANIE MAPY GPS
function renderMap() {
    const container = document.getElementById('map-container');
    const fleetList = document.getElementById('fleet-list');
    
    // Czyścimy mapę i rysujemy tło (Drogi)
    container.innerHTML = '<div style="position:absolute; width:100%; height:100%; border:5px solid #fff; border-radius:15px; box-sizing:border-box;"></div>';

    // Rysujemy miasta
    for (let name in MAP_COORDS) {
        const c = MAP_COORDS[name];
        const isBase = (name === DB.city);
        container.innerHTML += `
            <div style="position:absolute; left:${c.x}%; top:${c.y}%; transform:translate(-50%, -50%); z-index:10;">
                <div style="width:12px; height:12px; background:${isBase ? 'var(--ios-blue)' : '#fff'}; border:3px solid #000; border-radius:50%;"></div>
                <span style="font-size:9px; font-weight:900; background:rgba(255,255,255,0.8); padding:1px 3px; border-radius:4px; display:block; margin-top:2px;">${name.toUpperCase()}</span>
            </div>
        `;
    }

    // Rysujemy aktywne trasy i lawety
    DB.activeJobs.forEach((job, index) => {
        const start = MAP_COORDS[job.from] || {x:50, y:50};
        const end = MAP_COORDS[job.to] || {x:50, y:50};
        
        // Obliczanie pozycji lawety na podstawie progresu (0-100)
        const curX = start.x + (end.x - start.x) * (job.prog / 100);
        const curY = start.y + (end.y - start.y) * (job.prog / 100);

        container.innerHTML += `
            <div style="position:absolute; left:${curX}%; top:${curY}%; transform:translate(-50%, -50%); z-index:20; color:var(--ios-red); transition:all 1s linear;">
                <i class="fa-solid fa-truck-moving" style="font-size:18px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));"></i>
                <div style="background:#000; color:#fff; font-size:8px; padding:2px 4px; border-radius:4px; white-space:nowrap; position:absolute; top:-15px;">${job.driver.name}</div>
            </div>
        `;
    });

    // Lista floty pod mapą
    fleetList.innerHTML = `<h3>Aktywne Transporty (${DB.activeJobs.length})</h3>`;
    if(DB.activeJobs.length === 0) {
        fleetList.innerHTML += `<p style="color:#888;">Brak aktywnych transportów. Kup auto w Otomoto.</p>`;
    } else {
        DB.activeJobs.forEach(job => {
            fleetList.innerHTML += `
                <div class="pl-card" style="padding:10px; font-size:13px; border-left: 5px solid var(--ios-blue);">
                    <b>${job.car.m}</b><br>
                    Trasa: ${job.from} ➔ ${job.to}<br>
                    <div style="width:100%; height:6px; background:#eee; border-radius:3px; margin-top:5px;">
                        <div style="width:${job.prog}%; height:100%; background:var(--ios-blue); border-radius:3px; transition:0.5s;"></div>
                    </div>
                </div>
            `;
        });
    }
}

// 3. SILNIK LOGISTYCZNY (Odpalany co sekundę)
setInterval(() => {
    let changed = false;
    DB.activeJobs.forEach((job, index) => {
        job.prog += 2; // Szybkość jazdy (2% na sekundę)
        changed = true;

        if (job.prog >= 100) {
            // Dostawa zakończona
            DB.inventory.push(job.car);
            job.driver.status = "WOLNY";
            DB.activeJobs.splice(index, 1);
            alert("DOSTAWA: " + job.car.m + " dotarł do bazy w " + DB.city + "!");
        }
    });

    if (changed) {
        if(document.getElementById('win-map').style.display === 'flex') renderMap();
        updateIsland();
        save();
    }
}, 1000);

// 4. AKTUALIZACJA DYNAMIC ISLAND (Status GPS)
function updateIsland() {
    const isl = document.getElementById('isl-content');
    if (DB.activeJobs.length > 0) {
        isl.innerHTML = `<i class="fa-solid fa-truck-fast"></i> Transport: ${DB.activeJobs.length} aut`;
    } else {
        isl.innerHTML = `<i class="fa-solid fa-satellite-dish"></i> GPS Gotowy`;
    }
}
</script>
</body>
</html>
