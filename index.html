<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warsaw Transit: OMNI ENGINE</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <style>
        :root {
            --n-blue: #00f3ff; --n-pink: #ff00ff; --n-green: #00ff66;
            --n-yellow: #f3ff00; --n-red: #ff003c; --bg: #050508;
            --glass: rgba(15, 15, 25, 0.95);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Rajdhani', sans-serif; color: #fff; }

        #stage { position: absolute; inset: 0; z-index: 1; cursor: crosshair; }

        /* --- UI OVERLAY --- */
        #ui-wrapper { position: absolute; inset: 0; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; }
        .top-hud { display: flex; justify-content: space-between; pointer-events: none; }
        .glass-panel { 
            background: var(--glass); border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 18px 30px; border-radius: 20px; pointer-events: auto;
            box-shadow: 0 15px 45px rgba(0,0,0,0.9); backdrop-filter: blur(15px);
        }
        .v-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #667; display: block; margin-bottom: 4px; }
        .v-num { font-family: 'Orbitron'; font-size: 30px; font-weight: 900; color: var(--n-blue); }

        /* --- MODULAR DOCK --- */
        .master-dock { 
            align-self: center; background: var(--glass); padding: 15px; border-radius: 40px; 
            display: flex; gap: 15px; pointer-events: auto; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -10px 50px rgba(0,0,0,0.8);
        }
        .m-btn { 
            width: 75px; height: 80px; border-radius: 25px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: rgba(255,255,255,0.02);
            border: 2px solid transparent; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .m-btn.active { border-color: var(--c); background: rgba(255,255,255,0.08); transform: translateY(-12px); box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px var(--c); }
        .m-btn span { font-size: 9px; font-weight: 700; margin-top: 6px; color: #aaa; text-transform: uppercase; }
        .m-btn .material-symbols-outlined { font-size: 32px; color: var(--c); }

        /* --- NOTIFICATION CENTER --- */
        #log-flow { position: absolute; left: 25px; top: 140px; width: 300px; pointer-events: none; }
        .log-entry { 
            background: rgba(0,0,0,0.75); border-left: 4px solid var(--n-blue); padding: 12px 18px; 
            margin-bottom: 8px; border-radius: 0 12px 12px 0; font-size: 14px; font-weight: 600;
            animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; backdrop-filter: blur(5px);
        }
        @keyframes slideIn { from { transform: translateX(-110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* LOADING */
        #preloader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .load-bar { width: 200px; height: 2px; background: #111; margin-top: 20px; overflow: hidden; position: relative; }
        .load-progress { position: absolute; top:0; left:0; height:100%; background: var(--n-blue); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div id="preloader">
    <div style="font-family: 'Orbitron'; font-size: 14px; letter-spacing: 8px; color: var(--n-blue);">OMNI_ENGINE_INITIALIZING</div>
    <div class="load-bar"><div id="load-val" class="load-progress"></div></div>
    <button id="start-trigger" style="display:none; margin-top: 30px; background: none; border: 1px solid var(--n-blue); color: var(--n-blue); padding: 15px 50px; font-family: 'Orbitron'; cursor: pointer; font-size: 12px;">ACCESS SYSTEM</button>
</div>

<div id="ui-wrapper">
    <div class="top-hud">
        <div class="glass-panel">
            <span class="v-lbl">Neural Network Load</span>
            <div id="v-stress" class="v-num">0%</div>
        </div>
        <div class="glass-panel" style="border-color: var(--n-yellow);">
            <span class="v-lbl">Global Credits</span>
            <div id="v-budget" class="v-num" style="color:var(--n-yellow)">5,000</div>
        </div>
    </div>
    
    <div id="log-flow"></div>
    
    <div class="master-dock">
        <div class="m-btn active" data-t="line" data-c="#00f3ff" style="--c:var(--n-blue)">
            <span class="material-symbols-outlined">polyline</span><span>L1</span>
        </div>
        <div class="m-btn" data-t="line" data-c="#ff00ff" style="--c:var(--n-pink)">
            <span class="material-symbols-outlined">polyline</span><span>L2</span>
        </div>
        <div class="m-btn" data-t="unit" style="--c:#fff">
            <span class="material-symbols-outlined">local_shipping</span><span>Deploy</span>
        </div>
        <div class="m-btn" data-t="up" style="--c:var(--n-green)">
            <span class="material-symbols-outlined">vibration</span><span>Evolve</span>
        </div>
    </div>
</div>

<canvas id="stage"></canvas>

<script>
/**
 * MODULE 11: MOBILE_STABILIZER & ALERT_DEBUGGER
 * Wklej na samym początku script!
 */
window.onerror = function(msg, url, line) {
    alert("BŁĄD SYSTEMU: " + msg + "\nLinia: " + line);
    return false;
};

// Failsafe dla braku pamięci na telefonie
const MEMORY_SHIELD = {
    check: () => {
        if (window.performance && window.performance.memory) {
            if (window.performance.memory.usedJSHeapSize > 100 * 1048576) {
                console.warn("High Memory Usage!");
            }
        }
    }
};

/**
 * WARSAW OMNI ENGINE v1.0
 * ---------------------------------------------------------
 * ARCHITEKTURA MODULARNA: Wklejaj kolejne moduły w oznaczone miejsca.
 */

const Omni = (() => {
    // --- MODULE: CORE STATE ---
    const DB = {
        budget: 5000,
        stress: 0,
        mode: 'line',
        activeColor: '#00f3ff',
        camera: { x: window.innerWidth/2, y: window.innerHeight/2, zoom: 0.6, tz: 0.6, lerp: 0.12 },
        stations: [],
        lines: {},
        particles: [],
        lastFrame: 0,
        width: window.innerWidth,
        height: window.innerHeight
    };

    const CONFIG = {
        STATIONS: [
            { id: 0, n: "CENTRUM", x: 0, y: 0, cap: 500 },
            { id: 1, n: "POLITECHNIKA", x: 0, y: 600, cap: 400 },
            { id: 2, n: "DW. ZACHODNI", x: -1100, y: 200, cap: 600 },
            { id: 3, n: "WOLA", x: -900, y: -800, cap: 450 },
            { id: 4, n: "MOKOTÓW", x: 500, y: 1300, cap: 400 },
            { id: 5, n: "PRAGA", x: 1300, y: 100, cap: 550 },
            { id: 6, n: "BEMOWO", x: -1800, y: -400, cap: 350 },
            { id: 7, n: "WILANÓW", x: 900, y: 2200, cap: 400 },
            { id: 8, n: "STADION", x: 1100, y: -600, cap: 500 }
        ]
    };

    // --- MODULE: ENTITY CLASSES ---
    class Station {
        constructor(d) {
            this.id = d.id; this.name = d.n; this.x = d.x; this.y = d.y;
            this.pass = 0; this.cap = d.cap; this.lv = 1; this.p = 0;
        }
        update(dt) {
            this.pass = Math.min(this.cap, this.pass + (0.00005 * dt * this.lv)); 
            this.p += 0.05;
        }
        draw(ctx, zoom) {
            // Culling: Nie rysuj jeśli poza ekranem (z marginesem 200px)
            const sx = this.x * zoom + DB.camera.x;
            const sy = this.y * zoom + DB.camera.y;
            if (sx < -200 || sx > DB.width + 200 || sy < -200 || sy > DB.height + 200) return;

            const stress = this.pass / this.cap;
            const pulse = Math.sin(this.p) * 10;
            
            ctx.save();
            ctx.shadowBlur = 20 + pulse;
            ctx.shadowColor = stress > 0.8 ? '#ff003c' : '#00f3ff';
            
            // Core
            ctx.fillStyle = stress > 0.8 ? '#ff003c' : '#00f3ff';
            ctx.beginPath(); ctx.arc(this.x, this.y, 45, 0, Math.PI*2); ctx.fill();
            
            // Ring
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(this.x, this.y, 55, 0, Math.PI*2); ctx.stroke();
            ctx.restore();

            // Label Logic (Znikające napisy przy zoomie < 0.3)
            if (zoom > 0.25) {
                const alpha = Math.min(1, (zoom - 0.25) * 5);
                ctx.globalAlpha = alpha;
                const fs = Math.max(14, 32 / zoom);
                ctx.font = `900 ${fs}px Orbitron`;
                ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
                ctx.fillText(this.name, this.x, this.y - 100);
                
                ctx.font = `700 ${fs*0.8}px Rajdhani`;
                ctx.fillStyle = stress > 0.8 ? '#ff003c' : '#00ff66';
                ctx.fillText(`${Math.floor(this.pass)} / ${this.cap}`, this.x, this.y + 120);
                ctx.globalAlpha = 1;
            }
        }
    }

    // --- MIEJSCE NA MODUŁ: TRANSPORT_VEHICLES ---
    class Vehicle {
        constructor(line) {
            this.line = line; this.prog = 0; this.leg = 0; this.dir = 1;
            this.load = 0; this.cap = 200; this.speed = 0.0004;
        }
        update(dt) {
            if (this.line.nodes.length < 2) return;
            this.prog += this.speed * dt;
            if (this.prog >= 1) {
                this.prog = 0; this.leg += this.dir;
                const node = this.line.nodes[this.leg];
                if (this.load > 0) { DB.budget += this.load * 45; this.load = 0; }
                const take = Math.min(Math.floor(node.pass), this.cap);
                this.load = take; node.pass -= take;
                if (this.leg >= this.line.nodes.length-1 || this.leg <= 0) this.dir *= -1;
            }
        }
        const rawDt = now - DB.lastFrame;
DB.lastFrame = now;

// Przepuszczamy czas przez moduł Chronos
const dt = ChronosModule.update(rawDt);

if (dt === 0) { 
    // Jeśli pauza, nadal renderujemy, by móc przesuwać kamerę, ale nie update'ujemy logiki
    this.renderFrame(0); 
} else {
    this.renderFrame(dt);
}


    // --- MIEJSCE NA MODUŁ: PARTICLE_SYSTEM ---
    
    // --- MODULE: RENDER ENGINE ---
    const Renderer = {
        init() {
            this.canvas = document.getElementById('stage');
            this.ctx = this.canvas.getContext('2d');
            this.resize();
            window.addEventListener('resize', () => this.resize());
        },
        resize() {
            DB.width = this.canvas.width = window.innerWidth;
            DB.height = this.canvas.height = window.innerHeight;
        },
        draw(now) {
            const dt = now - DB.lastFrame;
            DB.lastFrame = now;
            const ctx = this.ctx;

            // Camera Smoothing
            DB.camera.zoom += (DB.camera.tz - DB.camera.zoom) * DB.camera.lerp;
            
            ctx.setTransform(1,0,0,1,0,0);
            ctx.fillStyle = '#050508'; ctx.fillRect(0,0,DB.width, DB.height);

            ctx.translate(DB.camera.x, DB.camera.y);
            ctx.scale(DB.camera.zoom, DB.camera.zoom);

            // Grid
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.04)'; ctx.lineWidth = 2;
            const step = 500;
            for(let i=-5000; i<=5000; i+=step) {
                ctx.beginPath(); ctx.moveTo(i, -5000); ctx.lineTo(i, 5000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-5000, i); ctx.lineTo(5000, i); ctx.stroke();
            }

            // Lines
            Object.values(DB.lines).forEach(l => {
                if (l.nodes.length < 2) return;
                ctx.strokeStyle = l.color; ctx.lineWidth = 25; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.shadowBlur = 10; ctx.shadowColor = l.color;
                ctx.beginPath(); l.nodes.forEach((n,i) => i===0?ctx.moveTo(n.x, n.y):ctx.lineTo(n.x, n.y));
                ctx.stroke(); ctx.shadowBlur = 0;
                l.units.forEach(u => { u.update(dt); u.draw(ctx); });
            });

            // Stations
            let stressSum = 0;
            DB.stations.forEach(s => { s.update(dt); s.draw(ctx, DB.camera.zoom); stressSum += s.pass/s.cap; });

            // HUD
            document.getElementById('v-budget').innerText = Math.floor(DB.budget).toLocaleString();
            document.getElementById('v-stress').innerText = Math.max(0, Math.floor((stressSum/DB.stations.length)*100)) + "%";

            requestAnimationFrame((t) => this.draw(t));
        }
    };

    // --- MIEJSCE NA MODUŁ: INPUT_HANDLING ---
    const Inputs = {
        setup() {
            let isD = false, lx, ly;
            window.addEventListener('pointerdown', e => { isD = true; lx = e.clientX; ly = e.clientY; });
            window.addEventListener('pointermove', e => {
                if(isD) {
                    DB.camera.x += (e.clientX - lx); DB.camera.y += (e.clientY - ly);
                    lx = e.clientX; ly = e.clientY;
                }
            });
            window.addEventListener('pointerup', e => {
                if(isD && Math.hypot(e.clientX-lx, e.clientY-ly) < 5) this.click(e.clientX, e.clientY);
                isD = false;
            });
            window.addEventListener('wheel', e => {
                const f = e.deltaY > 0 ? 0.85 : 1.15;
                DB.camera.tz = Math.min(Math.max(DB.camera.tz * f, 0.05), 4);
            }, {passive:false});

            document.querySelectorAll('.m-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('.m-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); DB.mode = b.dataset.t;
                    if(b.dataset.c) DB.activeColor = b.dataset.c;
                };
            });
        },
        click(sx, sy) {
            const wx = (sx - DB.camera.x) / DB.camera.zoom;
            const wy = (sy - DB.camera.y) / DB.camera.zoom;
            const hit = DB.stations.find(s => Math.hypot(s.x-wx, s.y-wy) < 70/DB.camera.zoom);

            if(DB.mode === 'line' && hit) {
                const l = DB.lines[DB.activeColor];
                if(l.nodes[l.nodes.length-1] !== hit && DB.budget >= 1000) {
                    DB.budget -= 1000; l.nodes.push(hit);
                    Omni.log("Connected to " + hit.name);
                }
            } else if(DB.mode === 'unit') {
                const l = DB.lines[DB.activeColor];
                if(l.nodes.length >= 2 && DB.budget >= 3000) {
                    DB.budget -= 3000; l.units.push(new Vehicle(l));
                    Omni.log("Deployed Unit on " + l.color);
                }
            }
        }
    };

    return {
        init() {
            Renderer.init();
            Inputs.setup();
            DB.stations = CONFIG.STATIONS.map(s => new Station(s));
            ['#00f3ff', '#ff00ff', '#00ff66', '#f3ff00'].forEach(c => DB.lines[c] = { nodes: [], units: [], color: c });
            
            // Preloader logic
            let p = 0;
            const iv = setInterval(() => {
                p += 10; document.getElementById('load-val').style.width = p + '%';
                if(p>=100) { 
                    clearInterval(iv); 
                    document.getElementById('start-trigger').style.display = 'block';
                }
            }, 100);

            document.getElementById('start-trigger').onclick = () => {
                document.getElementById('preloader').remove();
                requestAnimationFrame((t) => Renderer.draw(t));
            };
        },
        log(m) {
            const f = document.getElementById('log-flow');
            const e = document.createElement('div'); e.className = 'log-entry'; e.innerText = `> ${m}`;
            f.prepend(e); setTimeout(() => e.remove(), 4000);
        }
    };
})();

Omni.init();

// TU BĘDZIEMY WKLEJAĆ KOLEJNE MODUŁY PRZED ZAMKNIĘCIEM TAGU SCRIPT
/**
 * MODULE 1: DYNAMIC_WEATHER_SYSTEM
 * Zarządza atmosferą, cyklem dobowym i opadami.
 */
const WeatherModule = ((EngineState) => {
    const W_STATE = {
        time: 0, // 0-2400 (cykl dobowy)
        isRaining: false,
        rainDrops: [],
        ambientAlpha: 0,
        lastWeatherChange: 0
    };

    class Drop {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * window.innerWidth;
            this.y = -20;
            this.l = Math.random() * 15 + 10;
            this.v = Math.random() * 10 + 15;
        }
        update() {
            this.y += this.v;
            if (this.y > window.innerHeight) this.reset();
        }
    }

    // Inicjalizacja kropel deszczu
    for(let i=0; i<150; i++) W_STATE.rainDrops.push(new Drop());

    const process = (ctx, dt) => {
        W_STATE.time = (W_STATE.time + dt * 0.05) % 2400;
        
        // Obliczanie jasności świata (Noc: 1800-0600, Dzień: 0600-1800)
        if (W_STATE.time > 1800 || W_STATE.time < 600) {
            W_STATE.ambientAlpha = Math.min(0.5, W_STATE.ambientAlpha + 0.001);
        } else {
            W_STATE.ambientAlpha = Math.max(0, W_STATE.ambientAlpha - 0.001);
        }

        // Losowanie deszczu co 30 sekund gry
        if (Date.now() - W_STATE.lastWeatherChange > 30000) {
            W_STATE.isRaining = Math.random() > 0.7;
            W_STATE.lastWeatherChange = Date.now();
            if(W_STATE.isRaining) Omni.log("STORM ALERT: Units slowed by 20%");
        }

        // RENDEROWANIE EFEKTÓW (UI Layer Context - rysujemy na całym ekranie)
        ctx.save();
        ctx.setTransform(1,0,0,1,0,0); // Reset kamery dla filtra pogodowego

        // 1. Filtr Nocny
        if (W_STATE.ambientAlpha > 0) {
            ctx.fillStyle = `rgba(0, 5, 20, ${W_STATE.ambientAlpha})`;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }

        // 2. Deszcz
        if (W_STATE.isRaining) {
            ctx.strokeStyle = 'rgba(174, 194, 224, 0.4)';
            ctx.lineWidth = 1;
            W_STATE.rainDrops.forEach(d => {
                d.update();
                ctx.beginPath();
                ctx.moveTo(d.x, d.y);
                ctx.lineTo(d.x - 2, d.y + d.l);
                ctx.stroke();
            });
            // Wpływ na fizykę silnika (globalne spowolnienie)
            EngineState.stations.forEach(s => s.pass += 0.00001 * dt); 
        }
        ctx.restore();
    };

    return { process, state: W_STATE };
})(Omni ? Omni.INTERNAL_STATE : {}); 

// AKTUALIZACJA GŁÓWNEJ PĘTLI RENDERUJĄCEJ
// Musisz teraz wewnątrz funkcji Renderer.draw() dodać wywołanie:
// WeatherModule.process(ctx, dt);
/**
 * MODULE 2: ADVANCED_ECONOMY_AI
 * System finansowy, podatki i koszty operacyjne.
 */
const EconomyModule = ((EngineState) => {
    const E_STATE = {
        baseTicketPrice: 4.40,
        dailyTaxRate: 0.05,
        lastTaxCollection: 0,
        stats: {
            totalEarned: 5000,
            totalSpent: 0,
            passengersServed: 0
        }
    };

    const calculateFinances = (dt) => {
        if (!EngineState.stations) return;

        // 1. KOSZTY UTRZYMANIA (Maintenance)
        // Każda stacja kosztuje 0.5 kredytu / sekunda
        // Każda jednostka kosztuje 2.0 kredyty / sekunda
        const stationCost = EngineState.stations.length * 0.5 * (dt / 1000);
        let vehicleCount = 0;
        Object.values(EngineState.lines).forEach(l => vehicleCount += l.units.length);
        const vehicleCost = vehicleCount * 2.0 * (dt / 1000);

        const totalOperationalCost = stationCost + vehicleCost;
        EngineState.budget -= totalOperationalCost;
        E_STATE.stats.totalSpent += totalOperationalCost;

        // 2. DYNAMICZNY PRZYCHÓD Z BILETÓW
        // Modyfikujemy bazowy przychód w klasie Vehicle (to dzieje się w głównej pętli, 
        // ale tutaj wyliczamy mnożnik dla całego systemu)
        const networkStress = parseFloat(document.getElementById('v-stress').innerText) / 100;
        E_STATE.currentTicketMultiplier = 1 + (networkStress * 0.5); // Drożej gdy tłoczno

        // 3. SYSTEM PODATKOWY (Co cykl dobowy z WeatherModule)
        if (typeof WeatherModule !== "undefined") {
            const currentTime = WeatherModule.state.time;
            // Pobierz podatek o północy (time ok. 0)
            if (currentTime < 10 && Date.now() - E_STATE.lastTaxCollection > 60000) {
                const tax = EngineState.budget * E_STATE.dailyTaxRate;
                if (tax > 0) {
                    EngineState.budget -= tax;
                    Omni.log(`TAX COLLECTED: -${Math.floor(tax)} credits (5% City Tax)`);
                    E_STATE.lastTaxCollection = Date.now();
                }
            }
        }

        // 4. BANKRUCTWO
        if (EngineState.budget < 0) {
            EngineState.budget = 0;
            Omni.log("CRITICAL: BUDGET EXHAUSTED! Lines suspended.");
            // Tutaj można dodać logikę zatrzymania pojazdów
        }
    };

    // Funkcja pomocnicza do formatowania waluty
    const formatCurrency = (val) => {
        return new Intl.NumberFormat('pl-PL', { style: 'currency', currency: 'PLN' }).format(val).replace('zł', 'CR');
    };

    return { 
        update: calculateFinances, 
        state: E_STATE,
        format: formatCurrency 
    };
})(Omni ? Omni.INTERNAL_STATE : {});

// AKTUALIZACJA GŁÓWNEJ PĘTLI RENDERUJĄCEJ:
// W Renderer.draw() dodaj:
// EconomyModule.update(dt);
/**
 * MODULE 3: PASSENGER_TRANSFER_LOGIC (AI & PATHFINDING)
 * System przesiadek i inteligentnych celów podróży.
 */
const TransferModule = ((EngineState) => {
    const T_STATE = {
        transferEfficiency: 0.85, // Ile % ludzi decyduje się na przesiadkę zamiast rezygnacji
        patienceTimer: 120000,    // 2 minuty czekania na przesiadkę, potem "Neural Stress" rośnie
    };

    // System generowania potrzeb przewozowych
    const generateDemand = (dt) => {
        if (EngineState.stations.length < 2) return;

        EngineState.stations.forEach(origin => {
            // Szansa na pojawienie się pasażera z konkretnym celem
            if (Math.random() < 0.05) {
                const destination = EngineState.stations[Math.floor(Math.random() * EngineState.stations.length)];
                if (origin.id !== destination.id) {
                    // Dodajemy pasażera do struktury "waiting" na stacji
                    if (!origin.queue) origin.queue = [];
                    origin.queue.push({
                        targetId: destination.id,
                        entryTime: Date.now(),
                        status: 'waiting' // waiting, transit, transferring
                    });
                    origin.pass = origin.queue.length;
                }
            }
        });
    };

    // Logika przesiadek dla jednostki transportowej
    const handleExchange = (vehicle, station) => {
        // 1. WYSIADANIE
        // Pasażerowie wysiadają, jeśli: 
        // a) To ich cel podróży 
        // b) Stacja jest węzłem, a ich cel jest dostępny z innej linii tutaj przebiegającej
        if (!vehicle.manifest) vehicle.manifest = [];
        
        const arrivingAtTarget = vehicle.manifest.filter(p => p.targetId === station.id);
        const transferring = vehicle.manifest.filter(p => {
            if (p.targetId === station.id) return false;
            // Sprawdź czy inne linie na tej stacji prowadzą do celu p.targetId
            return isStationNodeForTarget(station, p.targetId, vehicle.line.color);
        });

        // Usuń pasażerów z pojazdu
        vehicle.manifest = vehicle.manifest.filter(p => p.targetId !== station.id && !transferring.includes(p));
        
        // Rozlicz przychód za dowiezionych do celu
        if (arrivingAtTarget.length > 0) {
            const income = arrivingAtTarget.length * EconomyModule.state.baseTicketPrice;
            EngineState.budget += income;
            Omni.log(`COMPLETED: ${arrivingAtTarget.length} pax reached destination.`);
        }

        // Dodaj przesiadkowiczów do kolejki stacji
        transferring.forEach(p => {
            p.status = 'transferring';
            if (!station.queue) station.queue = [];
            station.queue.push(p);
        });

        // 2. WSIADANIE
        // Pasażerowie wsiadają tylko, jeśli linia pojazdu przybliża ich do celu
        if (station.queue) {
            const space = vehicle.cap - vehicle.manifest.length;
            const validBoarders = station.queue.filter(p => canLineReachTarget(vehicle.line, p.targetId)).slice(0, space);
            
            validBoarders.forEach(p => {
                p.status = 'transit';
                vehicle.manifest.push(p);
                // Usuń ze stacji
                const idx = station.queue.indexOf(p);
                station.queue.splice(idx, 1);
            });
        }

        vehicle.load = vehicle.manifest.length;
        station.pass = station.queue ? station.queue.length : 0;
    };

    // Helper: Czy stacja jest węzłem przesiadkowym dla celu?
    const isStationNodeForTarget = (station, targetId, currentLineColor) => {
        let foundAlternative = false;
        Object.keys(EngineState.lines).forEach(color => {
            if (color === currentLineColor) return;
            const line = EngineState.lines[color];
            if (line.nodes.includes(station) && line.nodes.some(n => n.id === targetId)) {
                foundAlternative = true;
            }
        });
        return foundAlternative;
    };

    // Helper: Czy ta linia w ogóle ma tę stację docelową?
    const canLineReachTarget = (line, targetId) => {
        return line.nodes.some(n => n.id === targetId);
    };

    return {
        update: generateDemand,
        exchange: handleExchange,
        state: T_STATE
    };
})(Omni ? Omni.INTERNAL_STATE : {});

/**
 * MODULE 5: PARTICLE_FX_PRO
 * Zaawansowany system cząsteczek i efektów post-procesowych.
 */
const FXModule = ((EngineState) => {
    const P_STATE = {
        pool: [],
        maxParticles: 2000,
        emitters: [],
        layers: {
            background: [],
            foreground: []
        }
    };

    class Particle {
        constructor(x, y, config) {
            this.reset(x, y, config);
        }
        reset(x, y, c) {
            this.x = x; this.y = y;
            this.vx = c.vx || (Math.random() - 0.5) * 5;
            this.vy = c.vy || (Math.random() - 0.5) * 5;
            this.life = 1.0;
            this.decay = c.decay || 0.02;
            this.color = c.color || '#fff';
            this.size = c.size || 3;
            this.grav = c.grav || 0;
            this.glow = c.glow || false;
        }
        update(dt) {
            this.x += this.vx * (dt / 16);
            this.y += this.vy * (dt / 16);
            this.vy += this.grav;
            this.life -= this.decay * (dt / 16);
        }
        draw(ctx) {
            ctx.globalAlpha = this.life;
            if (this.glow) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            }
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }
    }

    const emitBurst = (x, y, color, count = 20) => {
        for (let i = 0; i < count; i++) {
            if (P_STATE.pool.length < P_STATE.maxParticles) {
                P_STATE.pool.push(new Particle(x, y, {
                    color: color,
                    decay: 0.01 + Math.random() * 0.02,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    glow: true
                }));
            }
        }
    };

    const emitTrail = (x, y, color) => {
        if (Math.random() > 0.4) return;
        P_STATE.pool.push(new Particle(x, y, {
            color: color,
            decay: 0.05,
            vx: 0, vy: 0,
            size: 8,
            glow: true
        }));
    };

    const update = (ctx, dt) => {
        for (let i = P_STATE.pool.length - 1; i >= 0; i--) {
            const p = P_STATE.pool[i];
            p.update(dt);
            if (p.life <= 0) {
                P_STATE.pool.splice(i, 1);
            } else {
                p.draw(ctx);
            }
        }
        
        // Ambient Dust Effect (Digital Grid)
        if (Math.random() > 0.9) {
            const rx = (Math.random() * 4000) - 2000;
            const ry = (Math.random() * 4000) - 2000;
            emitBurst(rx, ry, 'rgba(0, 243, 255, 0.1)', 1);
        }
    };

    return { update, emitBurst, emitTrail, state: P_STATE };
})(Omni ? Omni.INTERNAL_STATE : {});

                }
            } else {
                DebugConsole.log("💀 FATAL: Object 'Omni' not found in global scope!", "error");
            }
        }
    };

    // Czekamy 3 sekundy. Jeśli preloader nadal tam jest - uderzamy.
    setTimeout(() => {
        if (document.getElementById('preloader')) {
            forceStart();
        } else {
            console.log("✅ Engine started normally. Kickstart standing by.");
        }
    }, 3000);

    // DODATKOWO: Sprawdźmy czy Canvas w ogóle żyje
    setTimeout(() => {
        const canvas = document.getElementById('stage');
        if (canvas && canvas.width === 0) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            DebugConsole.log("🔧 FIXED: Canvas dimensions were zero.", "warn");
        }
    }, 1000);
})();



</script>
</body>
</html>
