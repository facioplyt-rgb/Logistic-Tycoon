<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUCK EMPIRE V16: TOTAL OVERLORD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --gold: #ffcc00; --bg: #050608; --card: rgba(20, 22, 28, 0.98); 
            --blue: #00a2ff; --neon: #39ff14; --red: #ff3e3e; --purple: #bc13fe;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; margin: 0; overflow: hidden; }

        /* HEADER COMMAND CENTER */
        #header { 
            background: #000; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); 
            border-bottom: 2px solid var(--blue); text-align: center; box-shadow: 0 0 25px rgba(0,162,255,0.4);
            position: relative; z-index: 1000;
        }
        .stat-val { font-size: 18px; font-weight: 800; color: #fff; display: block; text-shadow: 0 0 10px var(--blue); }
        .stat-label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1px; }

        /* CB RADIO - KONTEKSTOWE */
        #cb-bar { background: #000; height: 35px; border-bottom: 1px solid var(--neon); overflow: hidden; position: relative; display: flex; align-items: center; box-shadow: inset 0 0 10px var(--neon); }
        #cb-msg { color: var(--neon); font-family: 'Consolas', monospace; white-space: nowrap; position: absolute; animation: scroll 22s linear infinite; font-size: 14px; }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* MAPA */
        #map { height: 380px; width: 100%; border-bottom: 2px solid #333; filter: contrast(1.1) brightness(0.9); }
        
        nav { display: flex; background: #111; border-bottom: 1px solid #222; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .nav-btn.active { color: var(--blue); border-bottom: 3px solid var(--blue); background: rgba(0,162,255,0.1); }

        /* EKRANY */
        .screen { display: none; height: calc(100vh - 330px); overflow-y: auto; padding: 20px; box-sizing: border-box; background: linear-gradient(180deg, #0a0b0e 0%, #000 100%); }
        .screen.active { display: block; }

        /* KARTY */
        .card { 
            background: var(--card); border: 1px solid #2d3139; padding: 18px; 
            margin-bottom: 15px; border-radius: 12px; position: relative;
            border-left: 4px solid var(--blue); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .badge { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn-main { background: linear-gradient(45deg, var(--blue), #0055ff); color: white; box-shadow: 0 4px 15px rgba(0,162,255,0.3); }
        .btn-repair { background: #222; color: var(--gold); border: 1px solid var(--gold); font-size: 10px; padding: 5px; }

        /* PROGRES */
        .prog-bg { background: #000; height: 14px; border-radius: 7px; margin: 12px 0; overflow: hidden; border: 1px solid #333; position: relative; }
        .prog-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width 0.3s linear; }
        .prog-text { position: absolute; inset: 0; text-align: center; font-size: 10px; line-height: 14px; font-weight: bold; color: #fff; }

        /* TRUCK ICON STYLE */
        .truck-icon-v16 { border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="cb-bar"><div id="cb-msg">>>> SYSTEM V16 ONLINE. MONITOROWANIE FLOTY AKTYWNE...</div></div>

<div id="header">
    <div><span class="stat-label">Kapitał</span><span id="ui-cash" class="stat-val">0 PLN</span></div>
    <div><span class="stat-label">Paliwo Baza</span><span id="ui-fuel" class="stat-val">0 L</span></div>
    <div><span class="stat-label">Prestiż</span><span id="ui-rep" class="stat-val">0 XP</span></div>
    <div><span class="stat-label">ON Rynek</span><span id="ui-price" class="stat-val" style="color:var(--neon)">0.00</span></div>
</div>

<div id="map"></div>

<nav>
    <button class="nav-btn active" onclick="Game.UI.tab('market')">Giełda Ładunków</button>
    <button class="nav-btn" onclick="Game.UI.tab('fleet')">Aktywne Trasy</button>
    <button class="nav-btn" onclick="Game.UI.tab('hr')">Kierowcy i Serwis</button>
</nav>

<div id="sc-market" class="screen active"><div id="market-list"></div></div>
<div id="sc-fleet" class="screen">
    <div class="card" style="border-left-color: var(--neon)">
        <b style="color:var(--neon)">ZARZĄDZANIE PALIWEM (HURTOWNIA)</b>
        <p>Pojemność: <span id="ui-fuel-max">0</span> / 250,000 L</p>
        <button class="btn btn-main" onclick="Game.Actions.refuelBase()">Zatankuj bazę do pełna</button>
    </div>
    <div id="active-missions"></div>
</div>
<div id="sc-hr" class="screen"><div id="driver-list"></div></div>

<div id="log-panel" style="position:fixed; bottom:0; width:100%; height:40px; background:rgba(0,0,0,0.9); font-size:10px; color:#555; padding:5px; border-top:1px solid #222; overflow:hidden;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const Game = {
    state: {
        cash: 55000, fuel: 35000, maxFuel: 250000, rep: 0, fuelPrice: 5.15,
        drivers: [
            { id: 0, name: "Szef (Operator)", city: "Warszawa", busy: false, xp: 0, damage: 0, fatigue: 0 }
        ],
        missions: [],
        cities: {
            "Warszawa": [52.23, 21.01], "Kraków": [50.06, 19.94], "Gdańsk": [54.35, 18.65],
            "Wrocław": [51.11, 17.04], "Poznań": [52.41, 16.92], "Lublin": [51.25, 22.57],
            "Katowice": [50.26, 19.03], "Łódź": [51.75, 19.45], "Rzeszów": [50.04, 22.00],
            "Szczecin": [53.43, 14.55], "Białystok": [53.13, 23.17]
        },
        cargo: [
            { n: "Elektronika (High Value)", p: 60, color: "#bc13fe" },
            { n: "Materiały Budowlane", p: 25, color: "#00a2ff" },
            { n: "Paliwa (ADR)", p: 90, color: "#ff3e3e" },
            { n: "Części Samochodowe", p: 45, color: "#39ff14" },
            { n: "Wyroby Hutnicze", p: 35, color: "#ffcc00" }
        ]
    },

    init() {
        this.UI.initMap();
        this.Logic.generateMarket();
        this.Logic.startLoops();
        this.UI.update();
    },

    Logic: {
        generateMarket() {
            const list = document.getElementById('market-list');
            list.innerHTML = "";
            const cities = Object.keys(Game.state.cities);
            
            for(let i=0; i<6; i++) {
                const s = cities[Math.floor(Math.random()*cities.length)];
                const e = cities.filter(c => c !== s)[Math.floor(Math.random()*(cities.length-1))];
                const type = Game.state.cargo[Math.floor(Math.random()*Game.state.cargo.length)];
                const reward = Math.floor(12000 + Math.random() * 25000);

                list.innerHTML += `
                    <div class="card" style="border-left-color: ${type.color}">
                        <span class="badge" style="background:${type.color}; color:#000">${type.n}</span>
                        <div class="card-title">${reward} PLN</div>
                        <p>${s} ⮕ ${e}</p>
                        <button class="btn btn-main" onclick="Game.Actions.takeJob('${s}', '${e}', ${reward}, '${type.n}')">Akceptuj Fracht</button>
                    </div>`;
            }
        },

        startLoops() {
            setInterval(() => {
                Game.state.fuelPrice = (4.85 + Math.random() * 0.9).toFixed(2);
                this.updateCB();
                Game.UI.update();
            }, 12000);

            setInterval(() => {
                Game.state.missions.forEach((m, i) => {
                    const drv = Game.state.drivers.find(d => d.name === m.driver);
                    // Modyfikator prędkości zależny od uszkodzeń i zmęczenia
                    const speed = 0.002 * (1 - (drv.damage / 200)) * (1 - (drv.fatigue / 300));
                    m.prog += speed;

                    if(m.prog >= 1) {
                        Game.Actions.completeJob(i);
                    } else {
                        const idx = Math.floor(m.prog * (m.path.length - 1));
                        m.marker.setLatLng(m.path[idx]);
                        // Realistyczne zużycie paliwa i zmęczenia w trasie
                        Game.state.fuel -= 0.15;
                        drv.fatigue += 0.01;
                        if(Math.random() > 0.9997) drv.damage += 1;
                    }
                });
                if(Game.state.missions.length > 0) this.updateMissionUI();
            }, 100);
        },

        updateCB() {
            const msgs = [
                "Mobilki, czysto pod Warszawą, szerokości!",
                "Uwaga, krokodyle (ITD) suszą na S8 pod Łodzią!",
                "Wypadek na A4, korek pod Katowicami na 15 minut.",
                "Jak tam dróżka na Gdańsk? - Czysto, śmiało leć!",
                "Stoję pod Rzeszowem, pauza 45min, ktoś na kawę?"
            ];
            document.getElementById('cb-msg').innerText = ">>> CB-RADIO: " + msgs[Math.floor(Math.random()*msgs.length)];
        },

        updateMissionUI() {
            const container = document.getElementById('active-missions');
            let h = '<h3 style="color:var(--blue)">AKTYWNE OPERACJE</h3>';
            Game.state.missions.forEach(m => {
                h += `
                    <div class="card">
                        <span class="badge" style="background:var(--purple)">W TRASIE</span>
                        <b>${m.driver}</b> | ${m.cargo}<br>
                        <small>${m.start} ⮕ ${m.end}</small>
                        <div class="prog-bg">
                            <div class="prog-fill" style="width:${m.prog*100}%"></div>
                            <div class="prog-text">${Math.floor(m.prog*100)}%</div>
                        </div>
                    </div>`;
            });
            container.innerHTML = h;
        }
    },

    Actions: {
        async takeJob(start, end, reward, cargo) {
            const drv = Game.state.drivers.find(d => !d.busy && d.fatigue < 90);
            if(!drv) return alert("Brak gotowych kierowców (wszyscy zajęci lub przemęczeni)!");
            if(Game.state.fuel < 3000) return alert("Krytyczny poziom paliwa w bazie!");

            drv.busy = true;
            Game.state.fuel -= 2000;

            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${Game.state.cities[start][1]},${Game.state.cities[start][0]};${Game.state.cities[end][1]},${Game.state.cities[end][0]}?overview=full&geometries=geojson`);
            const data = await res.json();
            const path = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

            // Dynamiczna ikona (naprawiona!)
            const marker = L.marker(path[0], {
                icon: L.divIcon({ 
                    className: 'truck-icon-v16', 
                    html: `<div style="background:var(--blue); width:14px; height:14px; border:2px solid #fff; box-shadow:0 0 10px var(--blue);"></div>`
                })
            }).addTo(Game.UI.map);

            const line = L.polyline(path, { color: 'var(--blue)', weight: 4, opacity: 0.6, dashArray: '5, 10' }).addTo(Game.UI.map);

            Game.state.missions.push({ id: Date.now(), start, end, reward, cargo, path, marker, line, prog: 0, driver: drv.name });
            Game.UI.update();
        },

        completeJob(index) {
            const m = Game.state.missions[index];
            Game.state.cash += m.reward;
            Game.state.rep += 200;
            Game.UI.map.removeLayer(m.marker);
            Game.UI.map.removeLayer(m.line);
            
            const drv = Game.state.drivers.find(d => d.name === m.driver);
            drv.busy = false; drv.city = m.end; drv.xp += 300;
            
            Game.state.missions.splice(index, 1);
            Game.Logic.generateMarket();
            Game.UI.update();
        },

        repair(id) {
            const d = Game.state.drivers.find(x => x.id === id);
            const cost = d.damage * 500;
            if(Game.state.cash >= cost) {
                Game.state.cash -= cost; d.damage = 0; Game.UI.update();
            }
        },

        rest(id) {
            const d = Game.state.drivers.find(x => x.id === id);
            if(!d.busy) { d.fatigue = 0; alert("Kierowca odpoczął."); Game.UI.update(); }
        },

        refuelBase() {
            const needed = Game.state.maxFuel - Game.state.fuel;
            const cost = Math.floor(needed * Game.state.fuelPrice);
            if(Game.state.cash >= cost) {
                Game.state.cash -= cost; Game.state.fuel = Game.state.maxFuel; Game.UI.update();
            }
        }
    },

    UI: {
        map: null,
        initMap() {
            this.map = L.map('map', { zoomControl: false }).setView([52.1, 19.2], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.map);
        },
        tab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sc-' + id).classList.add('active');
            event.target.classList.add('active');
        },
        update() {
            document.getElementById('ui-cash').innerText = Math.floor(Game.state.cash) + " PLN";
            document.getElementById('ui-fuel').innerText = Math.floor(Game.state.fuel) + " L";
            document.getElementById('ui-rep').innerText = Game.state.rep + " XP";
            document.getElementById('ui-price').innerText = Game.state.fuelPrice;
            document.getElementById('ui-fuel-max').innerText = Math.floor(Game.state.fuel);
            
            let h = '<h3 style="color:var(--gold)">PERSONEL I SERWIS</h3>';
            Game.state.drivers.forEach(d => {
                h += `
                    <div class="card" style="border-left-color: ${d.fatigue > 70 ? 'var(--red)' : 'var(--blue)'}">
                        <b>👤 ${d.name}</b> [${d.city}]<br>
                        <small>PD: ${d.xp} | Zmęczenie: ${Math.floor(d.fatigue)}% | Uszkodzenia: ${d.damage}%</small>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button class="btn btn-repair" onclick="Game.Actions.repair(${d.id})">NAPRAW (${d.damage*500} PLN)</button>
                            <button class="btn btn-repair" onclick="Game.Actions.rest(${d.id})">WYŚLIJ NA PAUZĘ</button>
                        </div>
                    </div>`;
            });
            document.getElementById('driver-list').innerHTML = h;
        }
    }
};

window.onload = () => Game.init();
</script>
</body>
</html>
