<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUCK EMPIRE: MEGA EXPANSION</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #f1c40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; --orange: #e67e22; --purple: #9b59b6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        /* SYSTEM KOMUNIKATÓW X */
        #event-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .event-card { background: #111; border: 4px solid var(--gold); padding: 30px; border-radius: 20px; text-align: center; position: relative; max-width: 450px; box-shadow: 0 0 60px var(--gold); }
        .close-event { position: absolute; top: -20px; right: -20px; background: var(--red); color: white; border: 3px solid white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 24px; z-index: 20001; }

        /* CB RADIO */
        #cb-radio { background: #222; color: var(--green); padding: 5px; font-family: monospace; font-size: 12px; border-bottom: 1px solid var(--green); height: 20px; overflow: hidden; white-space: nowrap; }
        .cb-text { display: inline-block; animation: scroll-left 15s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* UI */
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #header { background: #000; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 2px solid #cc0000; text-align: center; font-size: 11px; }
        .stat-val { font-size: 13px; font-weight: bold; color: var(--gold); display: block; }
        nav { display: flex; background: #1a1a1a; }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; font-size: 10px; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-tab.active { color: white; border-bottom-color: #cc0000; background: #222; }
        .screen { display: none; height: calc(100vh - 160px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .screen.active { display: block; }
        .card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        #map { height: 220px; width: 100%; border-radius: 8px; margin-bottom: 10px; border: 2px solid #444; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        #log-panel { position: fixed; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.95); font-size: 10px; padding: 10px; border-top: 2px solid #cc0000; z-index: 1000; pointer-events: none; }
        .truck-icon-map { font-size: 28px; filter: drop-shadow(0 0 5px black); }
        .progress-bar-container { background: #000; height: 10px; border-radius: 5px; margin-top: 8px; border: 1px solid #333; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="cb-radio"><div class="cb-text" id="cb-content">Mobilki, jak dróżka na Warszawę? Czysto, szerokości!</div></div>

<div id="event-overlay">
    <div class="event-card">
        <button class="close-event" onclick="Game.Events.close()">X</button>
        <h2 id="event-title" style="color:var(--gold)">📢 KOMUNIKAT</h2>
        <p id="event-desc" style="font-size: 18px; margin: 20px 0;"></p>
        <div id="event-driver" style="background: var(--blue); padding: 10px; border-radius: 5px; font-weight: bold;"></div>
    </div>
</div>

<div id="start-screen">
    <h1 style="color:var(--gold)">TRUCK EMPIRE V5.0</h1>
    <div id="load-box" style="display:none; margin-bottom: 20px;">
        <button class="btn" style="background:var(--green); padding: 20px;" onclick="Game.Persistence.load()">KONTYNUUJ KARIERĘ</button>
    </div>
    <div id="new-game-box">
        <p>Wybierz miasto na pierwszą bazę:</p>
        <div class="city-grid" id="city-selection"></div>
    </div>
</div>

<div id="header">
    <div>KASA<br><span id="val-cash" class="stat-val">0</span></div>
    <div>PALIWO<br><span id="val-fuel" class="stat-val">0</span></div>
    <div>REP<br><span id="val-rep" class="stat-val">0</span></div>
    <div>CENA ON<br><span id="val-fuel-price" class="stat-val" style="color:var(--orange)">5.85</span></div>
</div>

<nav>
    <button class="nav-tab active" onclick="Game.UI.switchTab('fleet')">FLOTA / ON</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('map')">GIEŁDA / GPS</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('hr')">KADRY</button>
</nav>

<div id="screen-fleet" class="screen active">
    <div class="card" style="border-left: 5px solid var(--orange)">
        <h4>⛽ Giełda Paliw</h4>
        <p>Baza: <span id="fuel-txt">0</span> / 5000 L</p>
        <button class="btn" style="background:var(--orange)" onclick="Game.Mechanic.refuel()">KUP PALIWO (TERAZ!)</button>
    </div>
    <div id="market-container"></div>
</div>

<div id="screen-map" class="screen">
    <div id="map"></div>
    <div id="active-missions-container"></div>
    <div class="card" style="background: #000;">
        <h3 style="color:var(--blue)">📦 Giełda Ładunków</h3>
        <div id="freight-container"></div>
    </div>
</div>

<div id="screen-hr" class="screen">
    <div id="driver-container"></div>
</div>

<div id="log-panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const Game = {
    isPaused: false,
    fuelPrice: 5.85,
    data: {
        cash: 12000, fuel: 1000, maxFuel: 5000, reputation: 0,
        homeCity: null, trucksOwned: [1, 0, 0],
        drivers: [{ id: 0, name: "Szef", currentCity: null, busyUntil: 0 }],
        missions: [],
        cities: {
            "Warszawa": [52.23, 21.01], "Kraków": [50.06, 19.94], "Gdańsk": [54.35, 18.64],
            "Wrocław": [51.10, 17.03], "Poznań": [52.40, 16.92], "Szczecin": [53.42, 14.55],
            "Lublin": [51.24, 22.56], "Białystok": [53.13, 23.16]
        },
        models: [
            { name: "Bus", price: 4000, img: "🚚", tier: 0 },
            { name: "Solo", price: 26000, img: "🚛", tier: 1 },
            { name: "TIR", price: 90000, img: "🚜", tier: 2 }
        ]
    },

    init() {
        if(localStorage.getItem('truckEmpireSaveV5')) document.getElementById('load-box').style.display = 'block';
        const grid = document.getElementById('city-selection');
        Object.keys(this.data.cities).forEach(c => {
            const b = document.createElement('button'); b.className = 'city-btn'; b.innerText = c;
            b.onclick = () => this.startGame(c); grid.appendChild(b);
        });
        setInterval(() => {
            this.fuelPrice = (5.50 + Math.random() * 0.8).toFixed(2);
            document.getElementById('val-fuel-price').innerText = this.fuelPrice;
        }, 5000);
    },

    startGame(city) {
        this.data.homeCity = city;
        this.data.drivers[0].currentCity = city;
        document.getElementById('start-screen').style.display = 'none';
        this.UI.initMap();
        this.Logistics.generateJobs();
        this.loop();
        this.UI.renderAll();
    },

    Persistence: {
        save() {
            const save = { cash: Game.data.cash, fuel: Game.data.fuel, rep: Game.data.reputation, home: Game.data.homeCity, trucks: Game.data.trucksOwned, drivers: Game.data.drivers };
            localStorage.setItem('truckEmpireSaveV5', JSON.stringify(save));
        },
        load() {
            const saved = JSON.parse(localStorage.getItem('truckEmpireSaveV5'));
            Object.assign(Game.data, saved);
            Game.data.drivers.forEach(d => d.busyUntil = 0); // Reset po wczytaniu
            this.startGameFromSave();
        },
        startGameFromSave() {
            document.getElementById('start-screen').style.display = 'none';
            Game.UI.initMap();
            Game.Logistics.generateJobs();
            Game.loop();
            Game.UI.renderAll();
        }
    },

    Events: {
        pool: [
            { t: "🚔 MANDAT", d: "Przekroczenie prędkości! 500 PLN kary.", fine: 500 },
            { t: "🚧 WYPADEK", d: "Droga zablokowana. Kierowca musi czekać.", fine: 0 },
            { t: "⛽ AWARIA", d: "Pęknięty przewód hamulcowy. Serwis w trasie.", fine: 1200 },
            { t: "🍔 GRATIS", d: "Kierowca znalazł 100 zł na parkingu!", fine: -100 }
        ],
        trigger() {
            if(Game.data.missions.length === 0) return;
            const m = Game.data.missions[Math.floor(Math.random()*Game.data.missions.length)];
            const ev = this.pool[Math.floor(Math.random()*this.pool.length)];
            Game.isPaused = true;
            document.getElementById('event-title').innerText = ev.t;
            document.getElementById('event-desc').innerText = ev.d;
            document.getElementById('event-driver').innerText = "Kierowca: " + m.drvName;
            document.getElementById('event-overlay').style.display = 'flex';
            if(ev.fine) Game.data.cash -= ev.fine;
        },
        close() { document.getElementById('event-overlay').style.display = 'none'; Game.isPaused = false; }
    },

    UI: {
        map: null, markers: {}, lines: {},
        initMap() {
            this.map = L.map('map').setView([52.1, 19.2], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
        },
        switchTab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('screen-'+id).classList.add('active');
            if(event) event.target.classList.add('active');
            if(id === 'map' && this.map) setTimeout(() => this.map.invalidateSize(), 200);
        },
        renderAll() {
            document.getElementById('val-cash').innerText = Math.floor(Game.data.cash) + " PLN";
            document.getElementById('val-fuel').innerText = Math.floor(Game.data.fuel) + " L";
            document.getElementById('val-rep').innerText = Game.data.reputation;
            document.getElementById('fuel-txt').innerText = Math.floor(Game.data.fuel);
            this.renderMarket(); this.renderFreight(); this.renderDrivers();
        },
        renderMarket() {
            let h = '<h3>Garaż</h3>';
            Game.data.models.forEach((m, i) => {
                const p = Math.floor(m.price * Math.pow(1.3, Game.data.trucksOwned[i]));
                h += `<div class="card">${m.img} <b>${m.name}</b> (${Game.data.trucksOwned[i]})<br><button class="btn" style="background:var(--green)" onclick="Game.Mechanic.buyTruck(${i},${p})">KUP: ${p} PLN</button></div>`;
            });
            document.getElementById('market-container').innerHTML = h;
        },
        renderFreight() {
            let h = '';
            const best = Game.data.trucksOwned.reduce((m, q, i) => q > 0 ? i : m, 0);
            Game.Logistics.availableJobs.forEach(j => {
                const can = best >= j.tier;
                h += `<div class="card" style="border-left:5px solid var(--blue)"><b>${j.item} (${j.weight}t)</b><br>📍 ${j.start} → ${j.dest} | 💰 ${j.reward} PLN<br><button class="btn" style="background:${can?'var(--blue)':'#222'}" onclick="Game.Logistics.acceptJob('${j.id}')" ${can?'':'disabled'}>PRZYJMIJ</button></div>`;
            });
            document.getElementById('freight-container').innerHTML = h || "Brak zleceń. Czekaj...";
        },
        renderDrivers() {
            let h = '<h3>Załoga</h3>';
            Game.data.drivers.forEach(d => {
                h += `<div class="card"><b>👤 ${d.name}</b><br>Miasto: ${d.currentCity}<br>Status: ${d.busyUntil > Date.now()?'W TRASIE':'W BAZIE'}</div>`;
            });
            h += `<button class="btn" style="background:var(--purple)" onclick="Game.HR.hire()">REKRUTUJ (5000 PLN)</button>`;
            document.getElementById('driver-container').innerHTML = h;
        },
        addLog(m) { const l = document.getElementById('log-panel'); l.innerHTML = `<div>${m}</div>` + l.innerHTML; }
    },

    Logistics: {
        availableJobs: [],
        generateJobs() {
            const cities = Object.keys(Game.data.cities);
            setInterval(() => {
                if(this.availableJobs.length > 10) this.availableJobs.shift();
                const s = cities[Math.floor(Math.random()*cities.length)];
                const d = cities[Math.floor(Math.random()*cities.length)];
                if(s !== d) {
                    const t = Math.floor(Math.random()*3);
                    this.availableJobs.push({ id: Math.random().toString(36).substr(2,4), item: "Towar", start: s, dest: d, weight: (t*5+2), reward: 2000+(t*4000), tier: t });
                    Game.UI.renderFreight();
                }
            }, 8000);
        },
        async acceptJob(id) {
            const j = this.availableJobs.find(x => x.id === id);
            // KLUCZOWA POPRAWKA: Szukamy wolnego kierowcy i blokujemy go
            let drv = Game.data.drivers.find(d => d.busyUntil < Date.now() && d.currentCity === j.start);
            if(!drv) drv = Game.data.drivers.find(d => d.busyUntil < Date.now());
            
            if(!drv) return alert("Brak wolnych kierowców!");
            if(Game.data.fuel < 200) return alert("Brak paliwa w bazie!");

            const r1 = await this.getRoute(Game.data.cities[drv.currentCity], Game.data.cities[j.start]);
            const r2 = await this.getRoute(Game.data.cities[j.start], Game.data.cities[j.dest]);
            const path = [...r1, ...r2];
            
            const m = {
                id: j.id, path: path, pIdx: r1.length, 
                start: Date.now(), dur: path.length * 100, // TURBO
                reward: j.reward, dest: j.dest, drvId: drv.id, drvName: drv.name, status: 'dojazd', icon: Game.data.models[j.tier].img
            };

            drv.busyUntil = Date.now() + m.dur;
            Game.data.missions.push(m);
            Game.data.fuel -= 150;
            Game.UI.lines[j.id] = L.polyline(path, {color: 'cyan', weight: 2}).addTo(Game.UI.map);
            const tIcon = L.divIcon({ html: `<div class="truck-icon-map">${m.icon}</div>`, className: 'c' });
            Game.UI.markers[j.id] = L.marker(Game.data.cities[drv.currentCity], {icon: tIcon}).addTo(Game.UI.map);
            this.availableJobs = this.availableJobs.filter(x => x.id !== id);
            Game.UI.renderAll();
            Game.Persistence.save();
        },
        async getRoute(s, e) {
            const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${s[1]},${s[0]};${e[1]},${e[0]}?overview=full&geometries=geojson`);
            const d = await r.json(); return d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        }
    },

    Mechanic: {
        buyTruck(i, p) { if(Game.data.cash >= p) { Game.data.cash -= p; Game.data.trucksOwned[i]++; Game.UI.renderAll(); Game.Persistence.save(); } },
        refuel() { 
            const amount = Game.data.maxFuel - Game.data.fuel;
            const cost = amount * Game.fuelPrice;
            if(Game.data.cash >= cost) { Game.data.cash -= cost; Game.data.fuel = Game.data.maxFuel; Game.UI.renderAll(); }
        }
    },

    HR: {
        hire() { 
            if(Game.data.cash >= 5000) { 
                Game.data.cash -= 5000; 
                const newId = Game.data.drivers.length;
                Game.data.drivers.push({id: newId, name: "Kierowca "+newId, busyUntil: 0, currentCity: Game.data.homeCity}); 
                Game.UI.renderAll(); Game.Persistence.save();
            } 
        }
    },

    loop() {
        setInterval(() => {
            if(Game.isPaused) return;
            const now = Date.now();
            let html = '<h3>📡 GPS LIVE</h3>';
            Game.data.missions = Game.data.missions.filter(m => {
                const prog = Math.min(1, (now - m.start) / m.dur);
                const idx = Math.floor(prog * (m.path.length - 1));
                if(prog >= 1) {
                    Game.data.cash += Number(m.reward); Game.data.reputation += 10;
                    const d = Game.data.drivers.find(x => x.id === m.drvId);
                    if(d) d.currentCity = m.dest;
                    Game.UI.map.removeLayer(Game.UI.markers[m.id]); Game.UI.map.removeLayer(Game.UI.lines[m.id]);
                    Game.UI.addLog(`💰 ${m.drvName} dowieźli towar!`);
                    Game.Persistence.save();
                    return false;
                }
                Game.UI.markers[m.id].setLatLng(m.path[idx]);
                html += `<div class="card">${m.icon} <b>${m.drvName}</b> ➡ ${m.dest}
                    <div class="progress-bar-container"><div class="progress-fill" style="width:${prog*100}%"></div></div>
                </div>`;
                return true;
            });
            document.getElementById('active-missions-container').innerHTML = html;
            if(Math.random() > 0.999) Game.Events.trigger();
        }, 100);
    }
};

window.onload = () => Game.init();
</script>
</body>
</html>
