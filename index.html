<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUCK EMPIRE: PERSISTENT WORLD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #f1c40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; --orange: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        /* SYSTEM KOMUNIKATÓW X */
        #event-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .event-card { background: #222; border: 3px solid var(--gold); padding: 30px; border-radius: 15px; text-align: center; position: relative; max-width: 400px; }
        .close-event { position: absolute; top: -15px; right: -15px; background: var(--red); color: white; border: 2px solid white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 20px; }

        /* EKRAN STARTOWY / WCZYTYWANIA */
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .save-box { margin-bottom: 20px; padding: 20px; border: 1px dashed var(--gold); border-radius: 10px; }

        /* UI */
        #header { background: #000; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 2px solid #cc0000; text-align: center; font-size: 11px; }
        .stat-val { font-size: 13px; font-weight: bold; color: var(--gold); display: block; }
        nav { display: flex; background: #1a1a1a; }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; font-size: 10px; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-tab.active { color: white; border-bottom-color: #cc0000; background: #222; }
        .screen { display: none; height: calc(100vh - 140px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .screen.active { display: block; }
        .card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        #map { height: 220px; width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #444; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; text-transform: uppercase; }
        #log-panel { position: fixed; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.95); font-size: 10px; padding: 10px; border-top: 2px solid #cc0000; z-index: 1000; pointer-events: none; overflow: hidden; }
        .truck-icon-map { font-size: 26px; }
    </style>
</head>
<body>

<div id="event-overlay">
    <div class="event-card">
        <button class="close-event" onclick="Game.Events.close()">X</button>
        <h2 id="event-title" style="color:var(--gold)">📢 KOMUNIKAT</h2>
        <p id="event-desc"></p>
        <p id="event-driver" style="font-weight: bold; color: var(--blue);"></p>
    </div>
</div>

<div id="start-screen">
    <h1 style="color:var(--gold)">TRUCK EMPIRE 4.0</h1>
    <div id="load-box" class="save-box" style="display:none;">
        <p>Wykryto zapis Twojej firmy!</p>
        <button class="btn" style="background:var(--green)" onclick="Game.Persistence.load()">KONTYNUUJ KARIERĘ</button>
        <button onclick="Game.Persistence.clear()" style="background:none; color:red; border:none; cursor:pointer; margin-top:10px;">Usuń zapis i zacznij od nowa</button>
    </div>
    <div id="new-game-box">
        <p>Wybierz miasto na pierwszą bazę:</p>
        <div class="city-grid" id="city-selection"></div>
    </div>
</div>

<div id="header">
    <div>KASA<br><span id="val-cash" class="stat-val">0</span></div>
    <div>PALIWO<br><span id="val-fuel" class="stat-val">0</span></div>
    <div>REP (XP)<br><span id="val-rep" class="stat-val">0</span></div>
    <div>BAZA<br><span id="val-home" class="stat-val">-</span></div>
</div>

<nav>
    <button class="nav-tab active" onclick="Game.UI.switchTab('fleet')">FLOTA</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('map')">GIEŁDA/GPS</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('hr')">KADRY</button>
</nav>

<div id="screen-fleet" class="screen active">
    <div class="card" style="border-left: 5px solid var(--orange)">
        <h4>⛽ Magazyn Paliwa</h4>
        <p>Stan: <span id="fuel-txt">0</span> / 2500 L</p>
        <button class="btn" style="background:var(--orange)" onclick="Game.Mechanic.refuel()">Tankuj Bazę</button>
    </div>
    <div id="market-container"></div>
</div>

<div id="screen-map" class="screen">
    <div id="map"></div>
    <div id="active-missions-container"></div>
    <div class="card">
        <h3 style="color:var(--blue)">📦 Giełda Towarowa</h3>
        <button onclick="Game.Logistics.generateJobs()" class="btn" style="background:#222; margin-bottom:10px;">ODŚWIEŻ GIEŁDĘ</button>
        <div id="freight-container"></div>
    </div>
</div>

<div id="screen-hr" class="screen">
    <div id="driver-container"></div>
</div>

<div id="log-panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const Game = {
    isPaused: false,
    data: {
        cash: 10000, fuel: 2000, reputation: 0,
        homeCity: null, trucksOwned: [1, 0, 0],
        drivers: [{ name: "Szef", currentCity: null, busyUntil: 0 }],
        missions: [],
        cities: {
            "Warszawa": [52.23, 21.01], "Kraków": [50.06, 19.94], "Gdańsk": [54.35, 18.64],
            "Wrocław": [51.10, 17.03], "Poznań": [52.40, 16.92], "Szczecin": [53.42, 14.55],
            "Lublin": [51.24, 22.56], "Białystok": [53.13, 23.16]
        },
        models: [
            { name: "Bus (3.5t)", price: 4000, img: "🚚", tier: 0 },
            { name: "Solo (12t)", price: 26000, img: "🚛", tier: 1 },
            { name: "TIR (24t)", price: 85000, img: "🚜", tier: 2 }
        ]
    },

    init() {
        if(localStorage.getItem('truckEmpireSave')) {
            document.getElementById('load-box').style.display = 'block';
        }
        const grid = document.getElementById('city-selection');
        Object.keys(this.data.cities).forEach(c => {
            const b = document.createElement('button'); b.className = 'city-btn'; b.innerText = c;
            b.onclick = () => this.startGame(c); grid.appendChild(b);
        });
    },

    startGame(city) {
        this.data.homeCity = city;
        this.data.drivers[0].currentCity = city;
        document.getElementById('start-screen').style.display = 'none';
        this.UI.initMap();
        this.Logistics.generateJobs();
        this.loop();
        this.UI.renderAll();
    },

    Persistence: {
        save() {
            const saveObj = {
                cash: Game.data.cash, fuel: Game.data.fuel, rep: Game.data.reputation,
                home: Game.data.homeCity, trucks: Game.data.trucksOwned,
                drivers: Game.data.drivers.map(d => ({...d, busyUntil: 0})) // Resetujemy czas pracy przy zapisie dla bezpieczeństwa
            };
            localStorage.setItem('truckEmpireSave', JSON.stringify(saveObj));
        },
        load() {
            const saved = JSON.parse(localStorage.getItem('truckEmpireSave'));
            Game.data.cash = saved.cash; Game.data.fuel = saved.fuel;
            Game.data.reputation = saved.rep; Game.data.homeCity = saved.home;
            Game.data.trucksOwned = saved.trucks; Game.data.drivers = saved.drivers;
            this.startGameFromSave();
        },
        startGameFromSave() {
            document.getElementById('start-screen').style.display = 'none';
            Game.UI.initMap();
            Game.Logistics.generateJobs();
            Game.loop();
            Game.UI.renderAll();
        },
        clear() { localStorage.removeItem('truckEmpireSave'); location.reload(); }
    },

    Events: {
        pool: [
            { t: "👮 KONTROLA DROGOWA", d: "ITD sprawdza dokumenty. Kierowca musi stać.", fine: 200 },
            { t: "🚧 KOREK", d: "Zator na drodze krajowej. Spore opóźnienie.", fine: 0 },
            { t: "🔧 OSTRZEŻENIE", d: "Komputer pokładowy zgłasza błąd. Przymusowy postój.", fine: 400 }
        ],
        trigger() {
            if(Game.data.missions.length === 0) return;
            const m = Game.data.missions[Math.floor(Math.random()*Game.data.missions.length)];
            const ev = this.pool[Math.floor(Math.random()*this.pool.length)];
            Game.isPaused = true;
            document.getElementById('event-title').innerText = ev.t;
            document.getElementById('event-desc').innerText = ev.d;
            document.getElementById('event-driver').innerText = "Dotyczy: " + m.drv.name;
            document.getElementById('event-overlay').style.display = 'flex';
            if(ev.fine) Game.data.cash -= ev.fine;
        },
        close() { document.getElementById('event-overlay').style.display = 'none'; Game.isPaused = false; }
    },

    UI: {
        map: null, markers: {}, lines: {},
        initMap() {
            this.map = L.map('map').setView([52.1, 19.2], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
        },
        switchTab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('screen-'+id).classList.add('active');
            if(event) event.target.classList.add('active');
            if(id === 'map' && this.map) setTimeout(() => this.map.invalidateSize(), 200);
        },
        renderAll() {
            document.getElementById('val-cash').innerText = Math.floor(Game.data.cash) + " PLN";
            document.getElementById('val-fuel').innerText = Math.floor(Game.data.fuel) + " L";
            document.getElementById('val-rep').innerText = Game.data.reputation + " XP";
            document.getElementById('val-home').innerText = Game.data.homeCity;
            document.getElementById('fuel-txt').innerText = Math.floor(Game.data.fuel);
            this.renderMarket(); this.renderFreight(); this.renderDrivers();
        },
        renderMarket() {
            let h = '<h3>🛒 Salon Pojazdów</h3>';
            Game.data.models.forEach((m, i) => {
                const p = Math.floor(m.price * Math.pow(1.3, Game.data.trucksOwned[i]));
                h += `<div class="card"><b>${m.img} ${m.name}</b> (${Game.data.trucksOwned[i]} szt.)<br><button class="btn" style="background:var(--green)" onclick="Game.Mechanic.buyTruck(${i},${p})">KUP: ${p} PLN</button></div>`;
            });
            document.getElementById('market-container').innerHTML = h;
        },
        renderFreight() {
            let h = '';
            const best = Game.data.trucksOwned.reduce((m, q, i) => q > 0 ? i : m, 0);
            Game.Logistics.availableJobs.forEach(j => {
                const can = best >= j.tier;
                const isLocal = Game.data.drivers.some(d => d.currentCity === j.start && d.busyUntil < Date.now());
                h += `<div class="card" style="border-left:5px solid ${isLocal?'var(--green)':'var(--blue)'}">
                    <b>📦 ${j.item} (${j.weight}t)</b><br>📍 ${j.start} → ${j.dest} | 💰 ${j.reward} PLN<br>
                    <button class="btn" style="background:${can?'var(--blue)':'#222'}" onclick="Game.Logistics.acceptJob('${j.id}')" ${can?'':'disabled'}>PRZYJMIJ</button>
                </div>`;
            });
            document.getElementById('freight-container').innerHTML = h;
        },
        renderDrivers() {
            let h = '<h3>👥 Kierowcy</h3>';
            Game.data.drivers.forEach(d => {
                h += `<div class="card"><b>👤 ${d.name}</b><br>Lokalizacja: ${d.currentCity}<br>Status: ${d.busyUntil > Date.now()?'W TRASIE':'W BAZIE'}</div>`;
            });
            h += `<button class="btn" style="background:var(--gold); color:black" onclick="Game.HR.hire()">ZATRUDNIJ (5000 PLN)</button>`;
            document.getElementById('driver-container').innerHTML = h;
        },
        addLog(m) { const l = document.getElementById('log-panel'); l.innerHTML = `<div>${m}</div>` + l.innerHTML; }
    },

    Logistics: {
        availableJobs: [],
        generateJobs() {
            this.availableJobs = [];
            const cities = Object.keys(Game.data.cities);
            Game.data.drivers.forEach(d => {
                for(let i=0; i<2; i++) {
                    let dC = cities[Math.floor(Math.random()*cities.length)];
                    while(dC === d.currentCity) dC = cities[Math.floor(Math.random()*cities.length)];
                    this.availableJobs.push({ id: Math.random().toString(36).substr(2,4), item: "Towar", start: d.currentCity, dest: dC, weight: 2.5, reward: 2500, tier: 0 });
                }
            });
            Game.UI.renderAll();
        },
        async acceptJob(id) {
            const j = this.availableJobs.find(x => x.id === id);
            let drv = Game.data.drivers.find(d => d.busyUntil < Date.now() && d.currentCity === j.start);
            if(!drv) drv = Game.data.drivers.find(d => d.busyUntil < Date.now());
            if(!drv || Game.data.fuel < 200) return alert("Błąd zasobów!");

            const r1 = await this.getRoute(Game.data.cities[drv.currentCity], Game.data.cities[j.start]);
            const r2 = await this.getRoute(Game.data.cities[j.start], Game.data.cities[j.dest]);
            const path = [...r1, ...r2];
            
            const m = {
                id: j.id, path: path, pIdx: r1.length, 
                start: Date.now(), dur: path.length * 100, // TURBO
                reward: j.reward, dest: j.dest, drv: drv, status: 'dojazd', icon: Game.data.models[j.tier].img
            };

            drv.busyUntil = Date.now() + m.dur;
            Game.data.missions.push(m);
            Game.data.fuel -= 150;
            Game.UI.lines[j.id] = L.polyline(path, {color: 'cyan', weight: 2}).addTo(Game.UI.map);
            const tIcon = L.divIcon({ html: `<div class="truck-icon-map">${m.icon}</div>`, className: 'c' });
            Game.UI.markers[j.id] = L.marker(Game.data.cities[drv.currentCity], {icon: tIcon}).addTo(Game.UI.map);
            this.availableJobs = this.availableJobs.filter(x => x.id !== id);
            Game.UI.renderAll();
        },
        async getRoute(s, e) {
            const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${s[1]},${s[0]};${e[1]},${e[0]}?overview=full&geometries=geojson`);
            const d = await r.json(); return d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        }
    },

    Mechanic: {
        buyTruck(i, p) { if(Game.data.cash >= p) { Game.data.cash -= p; Game.data.trucksOwned[i]++; Game.UI.renderAll(); Game.Persistence.save(); } },
        refuel() { const cost = (Game.data.maxFuel-Game.data.fuel)*5.85; if(Game.data.cash >= cost) { Game.data.cash -= cost; Game.data.fuel = Game.data.maxFuel; Game.UI.renderAll(); } }
    },

    HR: {
        hire() { if(Game.data.cash >= 5000) { Game.data.cash -= 5000; Game.data.drivers.push({name: "Kierowca "+Game.data.drivers.length, busyUntil: 0, currentCity: Game.data.homeCity}); Game.UI.renderAll(); Game.Persistence.save(); } }
    },

    loop() {
        setInterval(() => {
            if(Game.isPaused) return;
            const now = Date.now();
            let html = '<h3>📡 GPS LIVE</h3>';
            Game.data.missions = Game.data.missions.filter(m => {
                const prog = Math.min(1, (now - m.start) / m.dur);
                const idx = Math.floor(prog * (m.path.length - 1));
                if(prog >= 1) {
                    Game.data.cash += Number(m.reward); Game.data.reputation += 5;
                    m.drv.currentCity = m.dest;
                    Game.UI.map.removeLayer(Game.UI.markers[m.id]); Game.UI.map.removeLayer(Game.UI.lines[m.id]);
                    Game.UI.addLog(`Zakończono: ${m.drv.name} w ${m.dest}`);
                    Game.Persistence.save();
                    return false;
                }
                Game.UI.markers[m.id].setLatLng(m.path[idx]);
                html += `<div class="card">${m.icon} <b>${m.drv.name}</b> ➡ ${m.dest} (${Math.floor(prog*100)}%)</div>`;
                return true;
            });
            document.getElementById('active-missions-container').innerHTML = html;
            if(Math.random() > 0.998) Game.Events.trigger();
        }, 80);
    }
};

window.onload = () => Game.init();
</script>
</body>
</html>
