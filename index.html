<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLAND LOGISTICS SIMULATOR V19</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon: #00f2ff; --warn: #ffcc00; --danger: #ff0055; --safe: #39ff14;
            --bg: #0a0b0d; --surface: #14161a; --border: #262a30;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* HUD & STATS */
        #hud { 
            height: 60px; background: #000; display: flex; align-items: center; 
            justify-content: space-around; border-bottom: 2px solid var(--neon); 
        }
        .stat { text-align: center; }
        .stat span { display: block; font-size: 10px; color: var(--neon); text-transform: uppercase; }
        .stat b { font-size: 16px; }

        /* MAPA */
        #map-container { height: 350px; width: 100%; position: relative; border-bottom: 1px solid var(--border); }
        #map { height: 100%; width: 100%; background: #111; }

        /* NAWIGACJA */
        #tabs { display: flex; height: 50px; background: var(--surface); }
        .tab-btn { 
            flex: 1; border: none; background: none; color: #555; font-weight: bold; 
            cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s;
        }
        .tab-btn.active { color: var(--neon); border-bottom-color: var(--neon); background: #1a1d24; }

        /* SCREENS */
        #view { height: calc(100vh - 460px); overflow-y: auto; padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* CARDS */
        .card { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 8px; padding: 12px; margin-bottom: 10px; 
        }
        .btn { 
            width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-main { background: var(--neon); color: #000; }
        .btn-disabled { background: #333; color: #666; cursor: not-allowed; }

        .tag { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat"><span id="lbl-cash">Gotówka</span><b id="val-cash">50 000</b></div>
    <div class="stat"><span>Paliwo</span><b id="val-fuel">5000</b></div>
    <div class="stat"><span>Flota</span><b id="val-fleet">0/0</b></div>
</div>

<div id="map-container"><div id="map"></div></div>

<nav id="tabs">
    <button class="tab-btn active" onclick="App.UI.tab('market')">Giełda</button>
    <button class="tab-btn" onclick="App.UI.tab('company')">Firma</button>
    <button class="tab-btn" onclick="App.UI.tab('fleet')">Trasy</button>
</nav>

<div id="view">
    <div id="sc-market" class="screen active"></div>
    <div id="sc-company" class="screen"></div> <div id="sc-fleet" class="screen"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const App = {
    state: {
        cash: 50000,
        fuel: 5000,
        cities: {
            "Warszawa": [52.23, 21.01], "Poznań": [52.41, 16.92], "Wrocław": [51.11, 17.04],
            "Gdańsk": [54.35, 18.65], "Kraków": [50.06, 19.94], "Łódź": [51.75, 19.45]
        },
        drivers: [], // { id, name, busy: bool }
        trucks: [],  // { id, model, busy: bool, condition: 100 }
        missions: []
    },

    UI: {
        map: null,
        init() {
            this.map = L.map('map', { zoomControl: false }).setView([52.1, 19.2], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.map);
            this.updateHUD();
        },
        tab(id) {
            document.querySelectorAll('.screen, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('sc-' + id).classList.add('active');
            event.target.classList.add('active');
            // Wywołaj renderowanie specyficzne dla zakładki
            if(id === 'garage') App.Garage.render();
            if(id === 'market') App.Market.render();
        },
        updateHUD() {
            document.getElementById('val-cash').innerText = Math.floor(App.state.cash).toLocaleString() + " PLN";
            document.getElementById('val-fuel').innerText = Math.floor(App.state.fuel).toLocaleString() + " L";
            document.getElementById('val-fleet').innerText = `${App.state.trucks.length}/${App.state.drivers.length}`;
        }
    }
};

window.onload = () => App.UI.init();
/* --- MODUŁ 1: ASSETS & RECRUITMENT --- */
App.Garage = {
    truckModels: [
        { model: "Star 200 (Używany)", price: 25000, tank: 400, consumption: 25, img: "🚛" },
        { model: "Scania R450", price: 85000, tank: 1200, consumption: 30, img: "🚛" },
        { model: "Volvo FH16", price: 110000, tank: 1400, consumption: 32, img: "🚛" }
    ],

    candidates: [
        { name: "Andrzej Nowak", wage: 2500, skill: 1 },
        { name: "Mariusz " + "Pudzian", wage: 4500, skill: 2 },
        { name: "Janusz " + "Transportu", wage: 1800, skill: 0.8 }
    ],

    render() {
        const container = document.getElementById('sc-garage');
        container.innerHTML = `
            <h3 style="color:var(--neon)">SALON CIĘŻARÓWEK</h3>
            <div id="truck-market" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;"></div>
            
            <h3 style="color:var(--neon); margin-top:20px;">BIURO KIEROWCÓW</h3>
            <div id="driver-market"></div>

            <h3 style="color:var(--safe); margin-top:20px;">TWOJE ZASOBY</h3>
            <div id="owned-assets"></div>
        `;

        this.renderTruckMarket();
        this.renderDriverMarket();
        this.renderOwned();
    },

    renderTruckMarket() {
        const mkt = document.getElementById('truck-market');
        this.truckModels.forEach(t => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.minWidth = '160px';
            card.innerHTML = `
                <div style="font-size:30px">${t.img}</div>
                <b>${t.model}</b><br>
                <small>${t.price.toLocaleString()} PLN</small>
                <button class="btn btn-main" style="padding:5px; font-size:10px;" 
                    onclick="App.Garage.buyTruck('${t.model}', ${t.price}, ${t.tank})">KUP</button>
            `;
            mkt.appendChild(card);
        });
    },

    renderDriverMarket() {
        const mkt = document.getElementById('driver-market');
        this.candidates.forEach(c => {
            mkt.innerHTML += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${c.name}</b><br><small>Oczekiwania: ${c.wage} PLN</small></div>
                    <button class="btn btn-main" style="width:auto; padding:5px 15px;" 
                        onclick="App.Garage.hireDriver('${c.name}', ${c.wage})">ZATRUDNIJ</button>
                </div>
            `;
        });
    },

    renderOwned() {
        const own = document.getElementById('owned-assets');
        let html = "<div style='font-size:12px; color:#888;'>POJAZDY:</div>";
        App.state.trucks.forEach(t => {
            html += `<span class="tag" style="background:${t.busy ? '#444' : 'var(--safe)'}; color:#000">
                ${t.model} [${t.busy ? 'W TRASIE' : 'WOLNY'}]</span> `;
        });
        html += "<div style='font-size:12px; color:#888; margin-top:10px;'>KIEROWCY:</div>";
        App.state.drivers.forEach(d => {
            html += `<span class="tag" style="background:${d.busy ? '#444' : 'var(--neon)'}; color:#000">
                ${d.name} [${d.busy ? 'W TRASIE' : 'WOLNY'}]</span> `;
        });
        own.innerHTML = html;
    },

    buyTruck(model, price, tank) {
        if(App.state.cash >= price) {
            App.state.cash -= price;
            App.state.trucks.push({ id: Date.now() + Math.random(), model: model, busy: false, fuel: tank, condition: 100 });
            App.UI.updateHUD();
            this.render();
        } else { alert("Za mało gotówki!"); }
    },

    hireDriver(name, wage) {
        if(App.state.cash >= wage) {
            App.state.cash -= wage; // Opłata wstępna/Szkolenie
            App.state.drivers.push({ id: Date.now() + Math.random(), name: name, busy: false });
            App.UI.updateHUD();
            this.render();
        } else { alert("Brak środków na rekrutację!"); }
    }
};
/* --- MODUŁ 2: MARKET & MISSION LOGIC --- */
App.Market = {
    jobs: [],

    // 1. GENEROWANIE NOWYCH OFERT
    generateJobs() {
        this.jobs = [];
        const cities = Object.keys(App.state.cities);
        const cargo = [
            { n: "Materiały budowlane", p: 1.2, c: "#39ff14" },
            { n: "Elektronika", p: 2.5, c: "#00f2ff" },
            { n: "Żywność (Chłodnia)", p: 1.8, c: "#ffcc00" },
            { n: "Paliwo ADR", p: 3.2, c: "#ff0055" }
        ];

        for(let i=0; i<5; i++) {
            const from = cities[Math.floor(Math.random()*cities.length)];
            const to = cities.filter(c => c !== from)[Math.floor(Math.random()*(cities.length-1))];
            const type = cargo[Math.floor(Math.random()*cargo.length)];
            const dist = 200 + Math.floor(Math.random()*600);
            this.jobs.push({
                id: i, from, to, cargo: type.n, color: type.c,
                reward: Math.floor(dist * type.p * 10)
            });
        }
    },

    // 2. RENDEROWANIE GIEŁDY Z WYBOREM ZASOBÓW
    render() {
        if(this.jobs.length === 0) this.generateJobs();
        const container = document.getElementById('sc-market');
        
        // Sprawdzamy dostępność
        const freeTrucks = App.state.trucks.filter(t => !t.busy);
        const freeDrivers = App.state.drivers.filter(d => !d.busy);

        let html = `<h3 style="color:var(--neon)">GIEŁDA ŁADUNKÓW</h3>`;
        
        if(freeTrucks.length === 0 || freeDrivers.length === 0) {
            html += `<div class="card" style="border: 1px solid var(--danger); color: var(--danger); font-size: 12px;">
                ⚠️ BRAK WOLNYCH ZASOBÓW! Kup auto lub zatrudnij kierowcę w Garażu.
            </div>`;
        }

        this.jobs.forEach(j => {
            html += `
                <div class="card" style="border-left: 4px solid ${j.color}">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${j.cargo}</b>
                        <b style="color:var(--safe)">${j.reward.toLocaleString()} PLN</b>
                    </div>
                    <div style="margin: 8px 0; font-size:13px;">Trasa: ${j.from} ⮕ ${j.to}</div>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
                        <select id="sel-truck-${j.id}" style="background:#000; color:#fff; border:1px solid #444; font-size:11px;">
                            ${freeTrucks.map(t => `<option value="${t.id}">${t.model}</option>`).join('') || '<option>Brak aut</option>'}
                        </select>
                        <select id="sel-driver-${j.id}" style="background:#000; color:#fff; border:1px solid #444; font-size:11px;">
                            ${freeDrivers.map(d => `<option value="${d.id}">${d.name}</option>`).join('') || '<option>Brak osób</option>'}
                        </select>
                    </div>

                    <button class="btn ${freeTrucks.length > 0 && freeDrivers.length > 0 ? 'btn-main' : 'btn-disabled'}" 
                        onclick="App.Market.startMission(${j.id})" 
                        ${freeTrucks.length > 0 && freeDrivers.length > 0 ? '' : 'disabled'}>
                        WYŚLIJ TRANSPORT
                    </button>
                </div>
            `;
        });
        container.innerHTML = html;
    },

    // 3. START MISJI (Fizyczne blokowanie ID)
    async startMission(jobId) {
        const job = this.jobs.find(j => j.id === jobId);
        const truckId = document.getElementById(`sel-truck-${jobId}`).value;
        const driverId = document.getElementById(`sel-driver-${jobId}`).value;

        const truck = App.state.trucks.find(t => t.id == truckId);
        const driver = App.state.drivers.find(d => d.id == driverId);

        if(!truck || !driver) return;

        // Blokujemy zasoby
        truck.busy = true;
        driver.busy = true;

        // Trasa OSRM
        const start = App.state.cities[job.from];
        const end = App.state.cities[job.to];

        try {
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
            const data = await res.json();
            const path = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

            const mission = {
                id: Date.now(),
                truck, driver, job, path,
                progress: 0,
                line: L.polyline(path, { color: job.color, weight: 3, opacity: 0.5 }).addTo(App.UI.map),
                marker: L.marker(path[0], {
                    icon: L.divIcon({
                        className: 'truck-m',
                        html: `<div style="background:${job.color}; width:12px; height:12px; border-radius:2px; border:1px solid #fff;"></div>`
                    })
                }).addTo(App.UI.map)
            };

            App.state.missions.push(mission);
            this.jobs = this.jobs.filter(j => j.id !== jobId); // Usuń zlecenie z giełdy
            App.UI.updateHUD();
            App.UI.tab('fleet');
        } catch(e) {
            alert("Błąd GPS. Sprawdź połączenie.");
            truck.busy = false;
            driver.busy = false;
        }
    }
};

// DOPISANIE SILNIKA RUCHU DO CORE
App.Engine = {
    tick() {
        App.state.missions.forEach((m, idx) => {
            m.progress += 0.005; // Prędkość bazowa
            
            if(m.progress >= 1) {
                this.finish(idx);
            } else {
                const pos = Math.floor(m.progress * (m.path.length - 1));
                m.marker.setLatLng(m.path[pos]);
            }
        });
        if(App.state.missions.length > 0) this.renderFleet();
    },

    finish(idx) {
        const m = App.state.missions[idx];
        App.state.cash += m.job.reward;
        m.truck.busy = false;
        m.driver.busy = false;
        App.UI.map.removeLayer(m.line);
        App.UI.map.removeLayer(m.marker);
        App.state.missions.splice(idx, 1);
        App.UI.updateHUD();
        App.Market.generateJobs();
    },

    renderFleet() {
        const container = document.getElementById('sc-fleet');
        let html = `<h3 style="color:var(--neon)">AKTYWNE TRANSPORTY</h3>`;
        App.state.missions.forEach(m => {
            const p = Math.floor(m.progress * 100);
            html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span><b>${m.truck.model}</b> | ${m.driver.name}</span>
                        <span>${p}%</span>
                    </div>
                    <div style="background:#000; height:6px; margin-top:8px; border-radius:3px; overflow:hidden;">
                        <div style="width:${p}%; height:100%; background:${m.job.color};"></div>
                    </div>
                    <div style="font-size:10px; color:#666; margin-top:5px;">Cel: ${m.job.to}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
};

// Start pętli silnika
setInterval(() => App.Engine.tick(), 200);
/* --- MODUŁ 3: FUEL & MAINTENANCE --- */
App.Service = {
    fuelPrice: 5.85, // Cena za litr ON w hurcie

    // 1. ROZBUDOWA STATYSTYK W HUD (NADpisanie)
    updateHUD() {
        App.UI.updateHUD(); // Wywołanie bazowe
        // Dodatkowe info o paliwie w bazie można dodać tutaj
    },

    // 2. LOGIKA ZUŻYCIA (Wywoływana w pętli silnika)
    processWear(mission) {
        const truck = mission.truck;
        
        // Spajanie paliwa (0.1L na tick)
        if (App.state.fuel > 0) {
            App.state.fuel -= 0.15;
        } else {
            // Jeśli zabraknie paliwa w bazie, misja drastycznie zwalnia (zakup na stacji drożej)
            mission.progress += 0.0005; 
            App.state.cash -= 2; // Kara za tankowanie na trasie
        }

        // Zużycie techniczne (losowe drobne uszkodzenia)
        if (Math.random() > 0.99) {
            truck.condition -= 0.5;
        }

        // Awaria silnika
        if (truck.condition <= 0) {
            truck.condition = 0;
            mission.active = false; // Zatrzymanie misji
        }
    },

    // 3. RENDEROWANIE PANELU ZARZĄDZANIA W GARAŻU
    renderMaintenance() {
        const container = document.getElementById('sc-garage');
        
        // Dodajemy sekcję paliwa na górze garażu
        const fuelCard = document.createElement('div');
        fuelCard.className = 'card';
        fuelCard.style.borderTop = "4px solid var(--safe)";
        const refillCost = Math.floor(5000 * this.fuelPrice); // Koszt tankowania 5000L
        
        fuelCard.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>HURTOWNIA PALIW</b>
                <span style="color:var(--safe)">${Math.floor(App.state.fuel)} L</span>
            </div>
            <button class="btn btn-main" style="background:var(--safe); color:#000;" 
                onclick="App.Service.buyFuel(5000)">DOSTAWKA 5000L (${refillCost} PLN)</button>
        `;
        container.prepend(fuelCard);

        // Dodajemy opcję naprawy przy posiadanych autach
        const assetList = document.getElementById('owned-assets');
        let repairHtml = "<div style='font-size:12px; color:#888; margin-top:15px;'>STAN TECHNICZNY I SERWIS:</div>";
        
        App.state.trucks.forEach(t => {
            const cost = Math.floor((100 - t.condition) * 250);
            repairHtml += `
                <div class="card" style="font-size:11px; margin-top:5px;">
                    <b>${t.model}</b>: ${t.condition.toFixed(1)}% 
                    <button class="btn" style="width:auto; float:right; padding:2px 10px; margin:0;" 
                        onclick="App.Service.repairTruck(${t.id}, ${cost})" ${t.busy ? 'disabled' : ''}>
                        NAPRAW (${cost} PLN)
                    </button>
                    <div style="clear:both"></div>
                </div>`;
        });
        assetList.innerHTML += repairHtml;
    },

    buyFuel(amount) {
        const cost = Math.floor(amount * this.fuelPrice);
        if (App.state.cash >= cost) {
            App.state.cash -= cost;
            App.state.fuel += amount;
            App.UI.updateHUD();
            App.Garage.render();
        } else { alert("Brak funduszy na paliwo!"); }
    },

    repairTruck(id, cost) {
        if (App.state.cash >= cost) {
            const truck = App.state.trucks.find(t => t.id === id);
            App.state.cash -= cost;
            truck.condition = 100;
            App.UI.updateHUD();
            App.Garage.render();
        } else { alert("Nie stać Cię na mechanika!"); }
    }
};

// 4. INTEGRACJA Z SILNIKIEM (NADpisanie Engine.tick)
const oldTick = App.Engine.tick;
App.Engine.tick = function() {
    App.state.missions.forEach(m => {
        if (m.truck.condition > 0) {
            App.Service.processWear(m);
        }
    });
    oldTick.apply(App.Engine);
};

// 5. INTEGRACJA Z RENDEROWANIEM GARAŻU
const oldGarageRender = App.Garage.render;
App.Garage.render = function() {
    oldGarageRender.apply(App.Garage);
    App.Service.renderMaintenance();
};
/* --- MODUŁ 4: WEATHER & ROAD EVENTS --- */
App.World = {
    weather: { n: "Słonecznie", m: 1.0, c: "#ffcc00" },
    
    // 1. SYSTEM POGODOWY
    updateWeather() {
        const types = [
            { n: "Słonecznie", m: 1.0, c: "#ffcc00" },
            { n: "Ulewa", m: 0.7, c: "#00a2ff" },
            { n: "Mgła", m: 0.5, c: "#aaa" },
            { n: "Śnieżyca", m: 0.4, c: "#fff" }
        ];
        
        if (Math.random() > 0.8) {
            this.weather = types[Math.floor(Math.random() * types.length)];
            this.notify(`ZMIANA POGODY: ${this.weather.n.toUpperCase()}`, this.weather.c);
            // Efekt wizualny na mapie
            document.getElementById('map').style.boxShadow = `inset 0 0 80px ${this.weather.c}22`;
        }
    },

    // 2. INCYDENTY LOSOWE
    checkEvent(mission) {
        const roll = Math.random();

        // Kontrola ITD (Inspekcja Transportu Drogowego)
        if (roll > 0.9993) {
            let fine = 0;
            if (mission.truck.condition < 50) {
                fine = 3000;
                this.notify(`MANDAT ITD: 3000 PLN - Zły stan techniczny pojazdu!`, "var(--danger)");
                App.state.cash -= fine;
                App.UI.updateHUD();
            } else {
                this.notify("KONTROLA ITD: Wszystko w normie, szerokiej drogi!", "var(--safe)");
            }
            mission.progress -= 0.02; // Zatrzymanie na kontrolę
        }

        // Korek drogowy
        else if (roll > 0.998) {
            this.notify(`KOREK: ${mission.driver.name} utknął w zatorze!`, "var(--warn)");
            mission.progress -= 0.01;
        }
    },

    notify(msg, color) {
        // Wykorzystujemy system powiadomień na pasku HUD lub konsoli (uproszczony alert/log)
        console.log(`%c ${msg}`, `color: ${color}; font-weight: bold;`);
        // Opcjonalnie: można tu dodać element DOM dla powiadomień
    }
};

// 3. INTEGRACJA Z SILNIKIEM (NADPISANIE)
const engineTickWithWorld = App.Engine.tick;
App.Engine.tick = function() {
    App.state.missions.forEach(m => {
        // Wpływ pogody na prędkość
        const weatherPenalty = App.World.weather.m;
        // Sprawdzanie zdarzeń
        App.World.checkEvent(m);
        
        // Modyfikacja prędkości (bazowo 0.005 z Modułu 2)
        // Jeśli pogoda jest zła, progres jest wolniejszy
        const baseSpeed = 0.005;
        m.progress += (baseSpeed * weatherPenalty) - baseSpeed; 
    });
    
    engineTickWithWorld.apply(App.Engine);
};

// Start pętli pogodowej co 30 sekund
setInterval(() => App.World.updateWeather(), 30000);
/* --- MODUŁ 5: TRAILERS & SPECIALIZATION --- */
App.Trailers = {
    types: [
        { id: 'curtain', n: "Plandeka (Standard)", price: 30000, target: "Materiały budowlane", bonus: 1.0 },

    const reqTrailer = App.Trailers.types.find(t => t.target === job.cargo);
    
    // Blokujemy naczepę

App.Bank = {
    loanAmount: 0,
    dailyInterest: 0.015, // 1.5% odsetek przy każdym rozliczeniu
    maxLoan: 250000,

    // 1. RENDEROWANIE PANELU BANKOWEGO W GARAŻU
    render() {
        const container = document.getElementById('sc-garage');
        
        let html = `
            <h3 style="color:#ff00ff; margin-top:20px;">BANK LOGISTYCZNY</h3>
            <div class="card" style="border-left: 4px solid #ff00ff">
                <div style="display:flex; justify-content:space-between;">
                    <span>Aktualne zadłużenie:</span>
                    <b style="color:var(--danger)">${Math.floor(this.loanAmount).toLocaleString()} PLN</b>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <button class="btn" style="background:#330033; color:#ff00ff; border:1px solid #ff00ff; font-size:10px;" 
                        onclick="App.Bank.takeLoan(50000)" ${this.loanAmount + 50000 > this.maxLoan ? 'disabled' : ''}>
                        WEŹ 50 000 PLN
                    </button>
                    <button class="btn" style="background:#003300; color:var(--safe); border:1px solid var(--safe); font-size:10px;" 
                        onclick="App.Bank.repayLoan(10000)" ${this.loanAmount <= 0 ? 'disabled' : ''}>
                        SPŁAĆ 10 000 PLN
                    </button>
                </div>
                <p style="font-size:9px; color:#666; margin-top:8px;">* Odsetki są automatycznie pobierane z każdego zysku za zlecenie.</p>
            </div>
        `;

        const bankSection = document.createElement('div');
        bankSection.innerHTML = html;
        container.appendChild(bankSection);
    },

    // 2. LOGIKA KREDYTOWA
    takeLoan(amount) {
        if (this.loanAmount + amount <= this.maxLoan) {
            this.loanAmount += amount;
            App.state.cash += amount;
            App.UI.updateHUD();
            App.Garage.render();
            console.log(`%c [BANK] Przyznano kredyt: ${amount} PLN`, "color: #ff00ff; font-weight: bold;");
        } else {
            alert("Osiągnąłeś limit kredytowy!");
        }
    },

    repayLoan(amount) {
        if (App.state.cash >= amount && this.loanAmount > 0) {
            App.state.cash -= amount;
            this.loanAmount -= amount;
            if (this.loanAmount < 0) this.loanAmount = 0;
            App.UI.updateHUD();
            App.Garage.render();
        }
    },

    // 3. AUTOMATYCZNE POBIERANIE RATY (HOOK DO ZYSKÓW)
    applyInterest(reward) {
        if (this.loanAmount > 0) {
            const interest = Math.floor(reward * 0.10); // Bank zabiera 10% każdego zysku na poczet spłaty
            const interestOnly = Math.floor(interest * 0.2); // Część to czyste odsetki dla banku
            
            this.loanAmount -= (interest - interestOnly);
            if (this.loanAmount < 0) this.loanAmount = 0;
            
            console.log(`%c [BANK] Automatyczna spłata raty: -${interest} PLN`, "color: #ff00ff;");
            return reward - interest;
        }
        return reward;
    }
};

const engineFinishWithBank = App.Engine.finish;
App.Engine.finish = function(idx) {
    const m = App.state.missions[idx];
    
    // Zanim dodasz gotówkę, bank pobiera ratę
    const finalReward = App.Bank.applyInterest(m.job.reward);
    
    // Oryginalna logika (podmieniamy nagrodę w locie)
    const originalReward = m.job.reward;
    m.job.reward = finalReward;
    
    engineFinishWithBank.apply(App.Engine, [idx]);
    
    // Przywracamy dla porządku (choć obiekt i tak zaraz zniknie)
    m.job.reward = originalReward;
};

App.Garage.buyGeneratedTruck = function(id) {

    if(App.state.cash >= offer.price) {
        App.state.cash -= offer.price;
        App.state.trucks.push({...offer});
        this.truckOffers = this.truckOffers.filter(t => t.id !== id);
        App.UI.updateHUD();
        this.render();
    }
};

App.Garage.hireGeneratedDriver = function(id) {
    const cand = this.candidates.find(c => c.id === id);
    if(App.state.cash >= cand.wage) {
        App.state.cash -= cand.wage;
        App.state.drivers.push({...cand});
        this.candidates = this.candidates.filter(c => c.id !== id);
        App.UI.updateHUD();
        this.render();
    }
};

App.Market.startMission = async function(jobId) {
    // 1. Znalezienie przycisku w sposób bezpieczny
    const btn = document.querySelector(`button[onclick="App.Market.startMission('${jobId}')"]`) || 
                document.querySelector(`button[onclick="App.Market.startMission(${jobId})"]`);
    
    if(btn) {
        btn.disabled = true;
        btn.innerText = "ŁĄCZENIE GPS...";
    }

    const job = this.jobs.find(j => j.id === jobId);
    
    // 2. Pobranie ID z selectów (dodajemy zabezpieczenie na brak elementu)
    const truckSelect = document.getElementById(`sel-truck-${jobId}`);
    const driverSelect = document.getElementById(`sel-driver-${jobId}`);
    
    if(!truckSelect || !driverSelect) {
        App.Notifications.show("Błąd interfejsu! Spróbuj odświeżyć Giełdę.", "error");
        if(btn) btn.disabled = false;
        return;
    }

    const truckId = truckSelect.value;
    const driverId = driverSelect.value;

    const truck = App.state.trucks.find(t => t.id == truckId);
    const driver = App.state.drivers.find(d => d.id == driverId);

    if(!truck || !driver) {
        App.Notifications.show("Wybierz auto i kierowcę!", "warn");
        if(btn) btn.disabled = false;
        return;
    }

    // 3. Sprawdzenie naczepy (dla zleceń specjalistycznych)
    const reqTrailerType = App.Trailers.types.find(t => t.target === job.cargo);
    let assignedTrailer = null;
    
    if(reqTrailerType) {
        assignedTrailer = App.Trailers.owned.find(o => o.typeId === reqTrailerType.id && !o.busy);
        if(!assignedTrailer) {
            App.Notifications.show("Brak wolnej naczepy typu: " + reqTrailerType.n, "error");
            if(btn) btn.disabled = false;
            return;
        }
    }

    // 4. Pobieranie trasy OSRM
    const start = App.state.cities[job.from];
    const end = App.state.cities[job.to];

    try {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
        const data = await res.json();
        
        if(!data.routes || data.routes.length === 0) throw new Error("Błąd trasy");
        
        const path = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

        // BLOKADA ZASOBÓW
        truck.busy = true;
        driver.busy = true;
        if(assignedTrailer) assignedTrailer.busy = true;

        const mission = {
            id: Date.now(),
            truck, driver, job, path,
            trailer: assignedTrailer,
            progress: 0,
            line: L.polyline(path, { color: job.color, weight: 4, opacity: 0.6 }).addTo(App.UI.map),
            marker: L.marker(path[0], {
                icon: L.divIcon({
                    className: 'truck-m',
                    html: `<div style="background:${job.color}; width:16px; height:16px; border-radius:3px; border:2px solid #fff; box-shadow: 0 0 10px ${job.color};"></div>`
                })
            }).addTo(App.UI.map).bindPopup(`<b>${truck.model}</b><br>${job.from} -> ${job.to}`)
        };

        App.state.missions.push(mission);
        this.jobs = this.jobs.filter(j => j.id !== jobId);
        
        App.Notifications.show(`RUSZYŁ: ${truck.model} do ${job.to}`, "success");
        App.UI.updateHUD();
        App.UI.tab('fleet'); // Przełącz na widok tras
        
    } catch(e) {
        console.error(e);
        App.Notifications.show("GPS NIE ODPOWIADA - Spróbuj za chwilę", "error");
        if(btn) {
            btn.disabled = false;
            btn.innerText = "WYŚLIJ PONOWNIE";
        }
    }
};

                    <button class="btn" style="background:#003300; color:var(--safe); border:1px solid var(--safe);"

                </div>
            </div>
            
            <div class="card" style="margin-top:10px; font-size:11px; color:#888;">
                <p>ℹ️ <b>Zasada spłaty:</b> Bank automatycznie pobiera 10% kwoty z każdego ukończonego frachtu, dopóki dług nie zostanie spłacony.</p>
            </div>
        `;
    },

    takeLoan(amount) {
        if (this.loanAmount + amount <= this.maxLoan) {
            this.loanAmount += amount;
            App.state.cash += amount;
            App.Notifications.show(`Bank przelał ${amount} PLN na konto`, 'bank');
            App.UI.updateHUD();
            App.Company.subTab('bank'); // Odśwież widok
        } else {
            App.Notifications.show("Osiągnięto limit kredytowy!", "error");
        }
    },

    repayLoan(amount) {
        if (App.state.cash >= amount && this.loanAmount > 0) {
            App.state.cash -= amount;
            this.loanAmount -= amount;
            if(this.loanAmount < 0) this.loanAmount = 0;
            App.Notifications.show(`Ręczna spłata: -${amount} PLN`, 'bank');
            App.UI.updateHUD();
            App.Company.subTab('bank');
        }
    }
};

    html += `<h3 style="color:var(--neon); margin-top:20px;">KADRA KIEROWCÓW</h3>`;
    if (App.state.drivers.length === 0) {
        html += `<div class="card" style="color:#666;">Brak zatrudnionych kierowców.</div>`;
    } else {
        App.state.drivers.forEach(d => {
            html += `
                <div class="card" style="margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b>${d.name}</b><br>
                        <small style="color:#888;">Efektywność: ${Math.floor(d.skill*100)}%</small>
                    </div>
                    <span class="tag" style="background:${d.busy ? '#444' : 'var(--neon)'}; color:#000; font-size:9px;">
                        ${d.busy ? 'W TRASIE' : 'W BAZIE'}
                    </span>
                </div>`;
        });
    }
    container.innerHTML = html;
};

// 2. NAPRAWA SALONU I REKRUTACJI (Zintegrowany Market)
App.Company.renderUnifiedMarket = function(container) {
    if(!App.Garage.truckOffers) App.Generators.refreshMarkets();
    if(!App.Trailers.types[0].currentPrice) App.Trailers.generatePrices();

    let html = `<h3 style="color:var(--neon); margin-top:0;">SALON POJAZDÓW</h3>
                <div style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;">`;
    
    App.Garage.truckOffers.forEach(t => {
        html += `
            <div class="card" style="min-width:150px; flex-shrink:0;">
                <b style="font-size:13px;">${t.model}</b><br>
                <small style="color:#888;">Stan: ${t.condition}%</small><br>
                <b style="color:var(--safe)">${t.price.toLocaleString()} PLN</b><br>
                <button class="btn btn-main" style="margin-top:8px;" onclick="App.Garage.buyGeneratedTruck('${t.id}')">KUP</button>
            </div>`;
    });
    html += `</div>`;

    html += `<h3 style="color:var(--warn); margin-top:20px;">NACZEPY</h3>
             <div style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;">`;
    App.Trailers.types.forEach(t => {
        html += `
            <div class="card" style="min-width:140px; flex-shrink:0; border-bottom: 2px solid var(--warn);">
                <b style="font-size:12px;">${t.n}</b><br>
                <b style="color:var(--safe)">${t.currentPrice.toLocaleString()} PLN</b><br>
                <button class="btn btn-main" style="background:var(--warn); color:black; margin-top:8px;" onclick="App.Trailers.buy('${t.id}')">KUP</button>
            </div>`;
    });
    html += `</div>`;

    html += `<h3 style="color:var(--neon); margin-top:20px;">BIURO REKRUTACJI</h3>`;
    App.Garage.candidates.forEach(c => {
        html += `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <div>
                    <b>${c.name}</b><br>
                    <small>Skill: ${Math.floor(c.skill*100)}% | Koszt: ${c.wage} PLN</small>
                </div>
                <button class="btn btn-main" style="width:auto; padding:5px 15px;" onclick="App.Garage.hireGeneratedDriver('${c.id}')">ZATRUDNIJ</button>
            </div>`;
    });

    container.innerHTML = html;
};

// 3. FIX DLA FUNKCJI NAPRAWY (Obsługa obiektów i ID)
App.Service.repairTruck = function(id, cost) {
    if (App.state.cash >= cost) {
        const truck = App.state.trucks.find(t => t.id === id);
        if (truck) {
            App.state.cash -= cost;
            truck.condition = 100;
            App.Notifications.show(`Pojazd ${truck.model} został naprawiony!`, "success");
            App.UI.updateHUD();
            App.Company.subTab('assets'); // Odśwież widok taboru
        }
    } else {
        App.Notifications.show("Brak gotówki na naprawę!", "error");
    }
};

// 1. UNIWERSALNY PRZEŁĄCZNIK (Nadpisuje wszystko inne)
App.Company.subTab = function(view) {
    console.log("Próba wyrenderowania widoku:", view);
    
    const content = document.getElementById('company-content');
    if (!content) {
        console.error("KRYTYCZNY BŁĄD: Brak elementu 'company-content' w HTML!");
        return;
    }

    content.innerHTML = `<div style="padding:20px; color:#555;">Ładowanie danych firmy...</div>`;

    try {
        switch(view) {
            case 'stats':
                this.renderStats(content);
                break;
            case 'assets':
                this.renderAssets(content);
                break;
            case 'market':
                this.renderUnifiedMarket(content);
                break;
            case 'bank':
                this.renderBank(content);
                break;
            default:
                content.innerHTML = "Nieznany widok.";
        }
    } catch (err) {
        console.error("Błąd podczas renderowania zakładki " + view + ":", err);
        content.innerHTML = `<div class="card" style="border:1px solid red;">
            <b style="color:red;">BŁĄD RENDEROWANIA</b><br>
            <small>${err.message}</small><br>
            <p>Sprawdź konsolę (F12) po szczegóły.</p>
        </div>`;
    }
};

// 3. PODPIĘCIE POD GŁÓWNĄ NAWIGACJĘ
const finalTabSwitch = App.UI.tab;
App.UI.tab = function(id) {
    // Standardowe przełączanie ekranów
    document.querySelectorAll('.screen, .tab-btn').forEach(el => el.classList.remove('active'));
    const target = document.getElementById('sc-' + id);
    if(target) target.classList.add('active');
    
    // Specyficzna akcja dla firmy
    if(id === 'company') {
        App.Company.initStructure();
    }
    
    // Wizualne zaznaczenie przycisku w menu głównym
    const btn = document.querySelector(`.tab-btn[onclick*="'${id}'"]`);
    if(btn) btn.classList.add('active');
};

    /* --- MODUŁ 16: TOTAL MISSION REPAIR --- */

App.Market.startMission = async function(jobId) {
    console.log("Próba startu misji dla ID:", jobId);
    
    // 1. Znalezienie elementów UI
    const truckSelect = document.getElementById(`sel-truck-${jobId}`);
    const driverSelect = document.getElementById(`sel-driver-${jobId}`);
    const btn = event.target; // Przycisk, który został kliknięty

    if (!truckSelect || !driverSelect) {
        console.error("Nie znaleziono list wyboru dla tego zlecenia!");
        App.Notifications.show("Błąd techniczny giełdy", "error");
        return;
    }

    const truckId = truckSelect.value;
    const driverId = driverSelect.value;

    // 2. Pobranie obiektów z bazy
    const truck = App.state.trucks.find(t => t.id === truckId);
    const driver = App.state.drivers.find(d => d.id === driverId);
    const job = this.jobs.find(j => j.id === jobId);

    if (!truck || !driver || !job) {
        App.Notifications.show("Wybierz kierowcę i auto!", "warn");
        return;
    }

    // 3. Sprawdzenie naczepy (jeśli wymagana)
    const reqTrailer = App.Trailers.types.find(t => t.target === job.cargo);
    let trailerObj = null;
    if (reqTrailer) {
        trailerObj = App.Trailers.owned.find(o => o.typeId === reqTrailer.id && !o.busy);
        if (!trailerObj) {
            App.Notifications.show(`Wymagana naczepa: ${reqTrailer.n}`, "error");
            return;
        }
    }

    // 4. Blokada przycisku i pobieranie trasy
    btn.disabled = true;
    btn.innerText = "PLANOWANIE...";

    try {
        const start = App.state.cities[job.from];
        const end = App.state.cities[job.to];
        
        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
        const data = await response.json();

        if (!data.routes || data.routes.length === 0) throw new Error("Brak trasy");

        const path = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

        // 5. Sukces - Blokowanie zasobów i start
        truck.busy = true;
        driver.busy = true;
        if (trailerObj) trailerObj.busy = true;

        const mission = {
            id: Date.now(),
            truck, driver, job, path,
            trailer: trailerObj,
            progress: 0,
            line: L.polyline(path, { color: job.color, weight: 4, opacity: 0.6 }).addTo(App.UI.map),
            marker: L.marker(path[0], {
                icon: L.divIcon({
                    className: 'truck-m',
                    html: `<div style="background:${job.color}; width:16px; height:16px; border-radius:3px; border:2px solid #fff; box-shadow: 0 0 10px ${job.color};"></div>`
                })
            }).addTo(App.UI.map)
        };

        App.state.missions.push(mission);
        
        // Usunięcie zlecenia z giełdy
        this.jobs = this.jobs.filter(j => j.id !== jobId);
        
        App.Notifications.show("Szerokiej drogi!", "success");
        App.UI.updateHUD();
        App.UI.tab('fleet'); // Przełącz na mapę/trasy

    } catch (err) {
        console.error("Błąd GPS:", err);
        App.Notifications.show("Błąd połączenia z GPS", "error");
        btn.disabled = false;
        btn.innerText = "WYŚLIJ TRANSPORT";
    }
};
