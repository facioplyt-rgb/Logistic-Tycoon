<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistic OS 10.0 - Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- SYSTEMOWE RESETOWANIE I ZMIENNE --- */
        :root {
            --ios-bg: #f2f2f7;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1c1c1e; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- OBUDOWA IPHONE (RESPONSYWNA) --- */
        #iphone {
            width: 375px; height: 812px;
            background: #000; border: 12px solid #333; border-radius: 50px;
            position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* --- EKRAN GŁÓWNY I TAPETA --- */
        #screen {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000') center/cover;
            display: none; position: relative;
        }

        /* --- DYNAMIC ISLAND (FIXED) --- */
        #island {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 35px; background: #000; border-radius: 20px;
            z-index: 1000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px;
        }
        #island.active { width: 300px; height: 70px; }

        /* --- SYSTEM OKIEN (Z NAPRAWIONYM SCROLLEM) --- */
        .win {
            position: absolute; inset: 0; background: var(--ios-bg);
            z-index: 500; display: none; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }

        .win-header {
            padding: 45px 20px 15px; background: #fff;
            border-bottom: 1px solid #d1d1d6; display: flex;
            justify-content: space-between; align-items: center; flex-shrink: 0;
        }

        .win-body {
            flex: 1; overflow-y: auto; padding: 15px;
            word-wrap: break-word; /* To naprawia wychodzenie tekstu! */
        }

        /* --- KARTY OGŁOSZEŃ (IGŁA SYSTEM) --- */
        .pl-card {
            background: #fff; border-radius: 18px; padding: 15px;
            margin-bottom: 12px; box-shadow: var(--card-shadow);
            border: 1px solid #e5e5ea; display: flex; flex-direction: column; gap: 8px;
        }

        .badge {
            padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; width: fit-content;
        }
        .igla { background: #d4fadd; color: #1a7f37; }
        .damaged { background: #ffe5e5; color: #d70015; }

        /* --- PULPIT (IKONY) --- */
        #homescreen {
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 80px 25px; gap: 20px;
        }
        .app-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app-label { color: white; font-size: 11px; margin-top: 6px; font-weight: 500; }

        /* --- ANIMACJE --- */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* --- SETUP / TUTORIAL LAYER --- */
        #setup-layer {
            position: absolute; inset: 0; background: #fff; z-index: 2000;
            padding: 40px 25px; display: flex; flex-direction: column; justify-content: center;
        }
    </style>
</head>
<body>

<div id="iphone">
    <div id="island" id="island-main">
        <span id="isl-content">System Ready</span>
    </div>

    <div id="setup-layer" id="setup">
        <h1 style="font-size: 32px; margin-bottom: 10px;">Logistic <span style="color:var(--ios-blue)">OS 10</span></h1>
        <p style="color: #666; line-height: 1.5;">Witaj w symulatorze handlarza. Zarządzaj flotą, kupuj auta typu <b style="color:green">IGŁA</b> i unikaj mandatów.</p>
        
        <label style="margin-top:20px; font-weight:bold;">Wybierz miasto startowe:</label>
        <select id="city-select" style="padding:15px; border-radius:10px; margin-top:10px;">
            <option value="Warszawa">Warszawa (Centrum)</option>
            <option value="Poznań">Poznań (Logistyka)</option>
            <option value="Gdańsk">Gdańsk (Port)</option>
        </select>

        <button onclick="bootSystem()" style="background:var(--ios-blue); color:#fff; border:none; padding:18px; border-radius:15px; margin-top:30px; font-weight:bold; cursor:pointer;">ROZPOCZNIJ KARIERĘ</button>
    </div>

    <div id="screen">
        <div id="homescreen">
            </div>
    </div>
</div>

<script>
/* ==========================================================================
   MODUŁ 1: KERNEL & DATABASE
   ========================================================================== */

let DB = {
    money: 50000,
    city: "",
    inventory: [],
    activeJobs: [],
    employees: [
        { id: 1, name: "Marek", status: "WOLNY", salary: 3000, mood: 100 }
    ],
    market: [],
    stats: { sold: 0, points: 0 }
};

function bootSystem() {
    DB.city = document.getElementById('city-select').value;
    document.getElementById('setup-layer').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    renderPulpit();
    save();
}

function save() { localStorage.setItem('logistic_os_v10', JSON.stringify(DB)); }

function renderPulpit() {
    const apps = [
        { id: 'olx', name: 'Otomoto', icon: 'fa-car', bg: 'linear-gradient(#ff5a10, #ffb000)' },
        { id: 'bank', name: 'mBank', icon: 'fa-building-columns', bg: '#ff0000' },
        { id: 'cargo', name: 'Cargo.pl', icon: 'fa-box', bg: '#003399' },
        { id: 'map', name: 'Mapy', icon: 'fa-map-location-dot', bg: '#34c759' }
    ];
    
    const hs = document.getElementById('homescreen');
    hs.innerHTML = apps.map(app => `
        <div class="app-wrapper" onclick="openApp('${app.id}')">
            <div class="app-icon" style="background:${app.bg}"><i class="fa-solid ${app.icon}"></i></div>
            <div class="app-label">${app.name}</div>
        </div>
    `).join('');
}

// Funkcja otwierania okien (Placeholder)
function openApp(id) {
    alert("Aplikacja " + id + " zostanie dodana w kolejnym module!");
}
</script>

</body>
</html>
