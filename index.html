<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUCK EMPIRE V9: SUPREMACY</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #f1c40f; --dark: #010101; --card: #0a0a0a; --green: #2ecc71; --blue: #00d2ff; --red: #ff2e2e; --purple: #be2edd; --neon: #39ff14; --alert: #ff9f43; }
        body { font-family: 'Trebuchet MS', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }

        /* HUD */
        #header { background: #000; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 4px solid var(--purple); text-align: center; }
        .stat-val { font-size: 16px; font-weight: bold; color: var(--gold); display: block; }

        /* CB RADIO Z WPŁYWEM NA GRĘ */
        #cb-system { background: #050505; border-bottom: 2px solid var(--neon); padding: 10px; height: 35px; overflow: hidden; position: relative; }
        .cb-active-msg { color: var(--neon); font-family: monospace; font-size: 14px; position: absolute; white-space: nowrap; animation: cb-scroll 20s linear infinite; }
        @keyframes cb-scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-200%); } }

        /* MAPA */
        #map { height: 300px; width: 100%; filter: brightness(0.6) contrast(1.2) saturate(0.8); }
        
        /* UI TABS */
        nav { display: flex; background: #111; border-top: 1px solid #333; }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-tab.active { color: white; background: var(--card); border-bottom: 4px solid var(--blue); }

        .screen { display: none; height: calc(100vh - 250px); overflow-y: scroll; padding: 15px; padding-bottom: 80px; }
        .screen.active { display: block; }

        /* CARDS */
        .card { background: var(--card); border: 2px solid #1a1a1a; padding: 15px; margin-bottom: 15px; border-radius: 12px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        /* IKONY I GRAFIKA */
        .truck-icon-container { position: relative; text-align: center; width: 120px; }
        .truck-icon-img { width: 90px; height: auto; filter: drop-shadow(0 0 10px rgba(0,210,255,0.4)); }
        .driver-tag { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; font-size: 10px; border: 1px solid var(--blue); white-space: nowrap; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; margin-top: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }

        /* PROGRESS BARS */
        .prog-container { background: #000; height: 18px; border-radius: 9px; margin: 10px 0; border: 1px solid #222; overflow: hidden; position: relative; }
        .prog-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); width: 0%; transition: width 0.1s linear; }
        .prog-text { position: absolute; inset: 0; text-align: center; line-height: 18px; font-size: 10px; font-weight: bold; }

        /* EVENT X */
        #event-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .event-window { background: #000; border: 4px solid var(--red); padding: 40px; text-align: center; max-width: 500px; box-shadow: 0 0 50px var(--red); }
        .close-btn { background: var(--red); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 30px; cursor: pointer; margin-top: 20px; }

        #log-panel { position: fixed; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.9); font-size: 11px; padding: 5px; color: #888; border-top: 1px solid #333; pointer-events: none; }
    </style>
</head>
<body>

<div id="cb-system"><div id="cb-active-msg" class="cb-active-msg">KANAŁ 19: Łączenie z satelitą...</div></div>

<div id="header">
    <div>SALDO<br><span id="val-cash" class="stat-val">0</span></div>
    <div>MAGAZYN ON<br><span id="val-fuel" class="stat-val">0</span></div>
    <div>PRESTIŻ<br><span id="val-rep" class="stat-val">0</span></div>
    <div>GIEŁDA ON<br><span id="val-fuel-price" class="stat-val" style="color:var(--green)">0.00</span></div>
</div>

<div id="event-overlay">
    <div class="event-window">
        <h1 id="event-title">KOMUNIKAT</h1>
        <p id="event-desc"></p>
        <div id="event-driver" style="font-weight: bold; color: var(--gold); margin: 15px 0;"></div>
        <button class="close-btn" onclick="Game.Events.close()">X</button>
    </div>
</div>

<div id="start-screen" style="position:fixed; inset:0; background:black; z-index:200000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:var(--blue); font-size: 50px;">TRUCK EMPIRE V9</h1>
    <p style="color:var(--purple)">LOGISTICS SUPREMACY</p>
    <div id="load-box" style="display:none; margin-bottom: 20px;"><button class="btn" style="background:var(--green); width:250px;" onclick="Game.Persistence.load()">WCZYTAJ ZAPIS</button></div>
    <div id="new-game-box" style="text-align:center;">
        <p>Wybierz kwaterę główną:</p>
        <div id="city-selection" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
    </div>
</div>

<nav>
    <button class="nav-tab active" onclick="Game.UI.switchTab('fleet')">GARAŻ</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('map')">GIEŁDA/MAPA</button>
    <button class="nav-tab" onclick="Game.UI.switchTab('hr')">ZESPÓŁ</button>
</nav>

<div id="screen-fleet" class="screen active">
    <div class="card" style="border: 2px solid var(--blue)">
        <h3>⛽ ZARZĄDZANIE PALIWEM</h3>
        <p>Pojemność: <span id="fuel-txt">0</span> / 100,000 L</p>
        <button class="btn" style="background:var(--blue)" onclick="Game.Mechanic.refuel()">KUP PALIWO DO PEŁNA</button>
    </div>
    <div id="market-container"></div>
</div>

<div id="screen-map" class="screen">
    <div id="map"></div>
    <div id="active-missions-container"></div>
    <div class="card"><h2 style="color:var(--neon)">📦 GIEŁDA ŁADUNKÓW</h2><div id="freight-container"></div></div>
</div>

<div id="screen-hr" class="screen"><div id="driver-container"></div></div>

<div id="log-panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const Game = {
    isPaused: false,
    fuelPrice: 5.20,
    timeScale: 1.0, // Wpływ CB na prędkość
    firstNames: ["Andrzej", "Mariusz", "Dariusz", "Sławomir", "Piotr", "Janusz", "Zbigniew", "Robert", "Krzysztof", "Marek"],
    lastNames: ["Nowak", "Kowalski", "Wiśniewski", "Wójcik", "Mazur", "Lewandowski", "Zieliński", "Szymański", "Woźniak", "Dąbrowski"],
    data: {
        cash: 30000, fuel: 15000, maxFuel: 100000, reputation: 0, homeCity: null, trucksOwned: [1, 0, 0],
        drivers: [{ id: 0, name: "Szef Wszystkich Szefów", currentCity: null, busyUntil: 0, xp: 0, skills: {eco:1, speed:1, luck:1} }],
        missions: [],
        cities: {
            "Warszawa": [52.23, 21.01], "Kraków": [50.06, 19.94], "Gdańsk": [54.35, 18.64], "Wrocław": [51.10, 17.03],
            "Poznań": [52.40, 16.92], "Szczecin": [53.42, 14.55], "Lublin": [51.24, 22.56], "Białystok": [53.13, 23.16]
        },
        models: [
            { name: "MASTER BUS", price: 10000, img: "https://images.dealer.com/ddc/vehicles/2023/Renault/Master/Commercial%20Chassis/Perspective/White.png", tier: 0 },
            { name: "MAN TGX SOLO", price: 55000, img: "https://www.scania.com/content/dam/scanianoe/market/master/products/trucks/p-series/scania-p-series-truck.png", tier: 1 },
            { name: "SCANIA V8 TIR", price: 180000, img: "https://www.volvotrucks.pl/content/dam/volvo-trucks/markets/poland/trucks/volvo-fh16/volvo-fh16-white.png", tier: 2 }
        ]
    },

    init() {
        if(localStorage.getItem('truckEmpireSaveV9')) document.getElementById('load-box').style.display = 'block';
        const grid = document.getElementById('city-selection');
        Object.keys(this.data.cities).forEach(c => {
            const b = document.createElement('button'); b.className = 'btn'; b.style.background='#222'; b.innerText = c;
            b.onclick = () => this.startGame(c); grid.appendChild(b);
        });
        setInterval(() => this.updateMarket(), 5000);
        this.CB.loop();
    },

    updateMarket() {
        if(this.isPaused) return;
        this.fuelPrice = (4.20 + Math.random() * 3.5).toFixed(2);
        document.getElementById('val-fuel-price').innerText = this.fuelPrice;
    },

    CB: {
        msgs: [
            { txt: "KROKODYLE NA S8! WSZYSCY ZWALNIAJĄ!", effect: "slow" },
            { txt: "CZYSTA DRÓŻKA, MOŻNA DEPTAĆ!", effect: "fast" },
            { txt: "ULEWA POD ŁODZIĄ, ŚLISKO!", effect: "slow" },
            { txt: "WYPADEK NA A1, KOREK NA 5 KM!", effect: "crawl" },
            { txt: "MOBILKI, SZEROKOŚCI!", effect: "normal" }
        ],
        loop() {
            setInterval(() => {
                if(Game.isPaused) return;
                const m = this.msgs[Math.floor(Math.random()*this.msgs.length)];
                document.getElementById('cb-active-msg').innerText = ">>> CB-RADIO: " + m.txt + " <<<";
                if(m.effect === "slow") Game.timeScale = 0.5;
                else if(m.effect === "fast") Game.timeScale = 1.8;
                else if(m.effect === "crawl") Game.timeScale = 0.2;
                else Game.timeScale = 1.0;
            }, 10000);
        }
    },

    startGame(city) {
        this.data.homeCity = city;
        this.data.drivers[0].currentCity = city;
        document.getElementById('start-screen').style.display = 'none';
        this.UI.initMap();
        this.Logistics.generateJobs();
        this.loop();
        this.UI.renderAll();
    },

    Persistence: {
        save() { localStorage.setItem('truckEmpireSaveV9', JSON.stringify(Game.data)); },
        load() {
            const saved = JSON.parse(localStorage.getItem('truckEmpireSaveV9'));
            Object.assign(Game.data, saved);
            Game.data.drivers.forEach(d => d.busyUntil = 0);
            document.getElementById('start-screen').style.display = 'none';
            Game.UI.initMap();
            Game.Logistics.generateJobs();
            Game.loop();
            Game.UI.renderAll();
        }
    },

    Events: {
        trigger() {
            if(Game.data.missions.length === 0) return;
            const m = Game.data.missions[Math.floor(Math.random()*Game.data.missions.length)];
            const drv = Game.data.drivers.find(d => d.id === m.drvId);
            const evs = [
                { t: "PRZEBITA OPONA", d: "Kosztowna wymiana na poboczu.", f: 2000 },
                { t: "KONTROLA TACHO", d: "Kierowca przekroczył czas pracy. Mandat!", f: 5000 },
                { t: "NAGRODA ZA STYL", d: "Ecodriving doceniony przez klienta.", f: -3000 }
            ];
            const e = evs[Math.floor(Math.random()*evs.length)];
            Game.isPaused = true;
            document.getElementById('event-title').innerText = e.t;
            document.getElementById('event-desc').innerText = e.d;
            document.getElementById('event-driver').innerText = drv.name;
            document.getElementById('event-overlay').style.display = 'flex';
            Game.data.cash -= e.f;
            Game.UI.renderAll();
        },
        close() { document.getElementById('event-overlay').style.display = 'none'; Game.isPaused = false; }
    },

    UI: {
        map: null, markers: {}, lines: {},
        initMap() {
            this.map = L.map('map').setView([52.1, 19.2], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.map);
        },
        switchTab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('screen-'+id).classList.add('active');
            if(id === 'map' && this.map) setTimeout(() => this.map.invalidateSize(), 200);
        },
        renderAll() {
            document.getElementById('val-cash').innerText = Math.floor(Game.data.cash) + " PLN";
            document.getElementById('val-fuel').innerText = Math.floor(Game.data.fuel) + " L";
            document.getElementById('val-rep').innerText = Game.data.reputation + " PTS";
            document.getElementById('fuel-txt').innerText = Math.floor(Game.data.fuel);
            this.renderMarket(); this.renderFreight(); this.renderDrivers();
        },
        renderMarket() {
            let h = '';
            Game.data.models.forEach((m, i) => {
                const p = Math.floor(m.price * Math.pow(1.5, Game.data.trucksOwned[i]));
                h += `<div class="card"><img src="${m.img}" style="width:100px;"><br><b>${m.name}</b><br>Posiadasz: ${Game.data.trucksOwned[i]}<br><button class="btn" style="background:var(--green)" onclick="Game.Mechanic.buyTruck(${i},${p})">KUP: ${p} PLN</button></div>`;
            });
            document.getElementById('market-container').innerHTML = h;
        },
        renderFreight() {
            let h = '';
            const best = Game.data.trucksOwned.reduce((m, q, i) => q > 0 ? i : m, 0);
            Game.Logistics.availableJobs.forEach(j => {
                const can = best >= j.tier;
                h += `<div class="card" style="border-left: 5px solid var(--blue)">
                    <span style="color:var(--neon)">+${j.reward} PLN</span><br>
                    <b>${j.item}</b> (${j.start} ⮕ ${j.dest})<br>
                    <button class="btn" style="background:${can?'var(--blue)':'#222'}" onclick="Game.Logistics.acceptJob('${j.id}')" ${can?'':'disabled'}>PRZYJMIJ</button>
                </div>`;
            });
            document.getElementById('freight-container').innerHTML = h;
        },
        renderDrivers() {
            let h = '';
            Game.data.drivers.forEach(d => {
                h += `<div class="card"><b>👤 ${d.name}</b><br>Baza: ${d.currentCity}<br>XP: ${d.xp}</div>`;
            });
            h += `<button class="btn" style="background:var(--purple)" onclick="Game.HR.hire()">REKRUTUJ (12000 PLN)</button>`;
            document.getElementById('driver-container').innerHTML = h;
        }
    },

    Logistics: {
        availableJobs: [],
        generateJobs() {
            const cities = Object.keys(Game.data.cities);
            setInterval(() => {
                if(this.availableJobs.length > 8) this.availableJobs.shift();
                const s = cities[Math.floor(Math.random()*cities.length)];
                const d = cities[Math.floor(Math.random()*cities.length)];
                if(s !== d) {
                    const t = Math.floor(Math.random()*3);
                    this.availableJobs.push({ id: Math.random().toString(36).substr(2,5), item: "TOWAR TIER " + (t+1), start: s, dest: d, reward: 10000 + (t*12000), tier: t });
                    Game.UI.renderFreight();
                }
            }, 6000);
        },
        async acceptJob(id) {
            const j = this.availableJobs.find(x => x.id === id);
            let drv = Game.data.drivers.find(d => d.busyUntil < Date.now());
            if(!drv || Game.data.fuel < 2000) return alert("Brak kierowcy lub paliwa (min. 2000L)!");

            // LOGIKA: DOJAZD -> ZAŁADUNEK -> CEL
            const r1 = await this.getRoute(Game.data.cities[drv.currentCity], Game.data.cities[j.start]);
            const r2 = await this.getRoute(Game.data.cities[j.start], Game.data.cities[j.dest]);
            
            const m = {
                id: j.id, path: [...r1, ...r2], 
                split: r1.length, // Gdzie kończy się dojazd
                start: Date.now(), 
                baseDur: (r1.length + r2.length) * 40,
                reward: j.reward, dest: j.dest, load: j.start,
                drvId: drv.id, drvName: drv.name, img: Game.data.models[j.tier].img,
                status: 'DOJAZD', progress: 0
            };

            drv.busyUntil = Date.now() + 999999; // Blokada
            Game.data.missions.push(m);
            Game.data.fuel -= 1500;
            
            Game.UI.lines[j.id] = L.polyline(m.path, {color: 'orange', weight: 3, dashArray: '5, 10'}).addTo(Game.UI.map);
            const tIcon = L.divIcon({ 
                html: `<div class="truck-icon-container"><img src="${m.img}" class="truck-icon-img"><div class="driver-tag">${m.drvName}</div></div>`, 
                className: 'c' 
            });
            Game.UI.markers[j.id] = L.marker(Game.data.cities[drv.currentCity], {icon: tIcon}).addTo(Game.UI.map);
            
            this.availableJobs = this.availableJobs.filter(x => x.id !== id);
            Game.UI.renderAll();
        },
        async getRoute(s, e) {
            const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${s[1]},${s[0]};${e[1]},${e[0]}?overview=full&geometries=geojson`);
            const d = await r.json(); return d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        }
    },

    Mechanic: {
        buyTruck(i, p) { if(Game.data.cash >= p) { Game.data.cash -= p; Game.data.trucksOwned[i]++; Game.UI.renderAll(); Game.Persistence.save(); } },
        refuel() { 
            const cost = (Game.data.maxFuel - Game.data.fuel) * Game.fuelPrice;
            if(Game.data.cash >= cost) { Game.data.cash -= cost; Game.data.fuel = Game.data.maxFuel; Game.UI.renderAll(); }
        }
    },

    HR: {
        hire() { 
            if(Game.data.cash >= 12000) { 
                Game.data.cash -= 12000; 
                const name = Game.firstNames[Math.floor(Math.random()*10)] + " " + Game.lastNames[Math.floor(Math.random()*10)];
                Game.data.drivers.push({id: Date.now(), name: name, busyUntil: 0, currentCity: Game.data.homeCity, xp: 0}); 
                Game.UI.renderAll();
            } 
        }
    },

    loop() {
        setInterval(() => {
            if(Game.isPaused) return;
            const now = Date.now();
            let html = '';
            Game.data.missions = Game.data.missions.filter(m => {
                // Postęp uwzględnia TimeScale (CB Radio)
                m.progress += (0.002 * Game.timeScale); 
                const prog = Math.min(1, m.progress);
                const idx = Math.floor(prog * (m.path.length - 1));
                
                // Zmiana statusu
                if(idx < m.split) m.status = "PUSTY (DOJAZD)";
                else m.status = "ZAŁADOWANY";

                if(prog >= 1) {
                    Game.data.cash += Number(m.reward); Game.data.reputation += 100;
                    const d = Game.data.drivers.find(x => x.id === m.drvId);
                    if(d) { d.currentCity = m.dest; d.busyUntil = 0; d.xp += 200; }
                    Game.UI.map.removeLayer(Game.UI.markers[m.id]); Game.UI.map.removeLayer(Game.UI.lines[m.id]);
                    Game.Persistence.save(); Game.UI.renderAll();
                    return false;
                }

                Game.UI.markers[m.id].setLatLng(m.path[idx]);
                const sCol = m.status === "ZAŁADOWANY" ? 'var(--neon)' : 'var(--alert)';
                html += `<div class="card">
                    <span class="status-badge" style="background:${sCol}">${m.status}</span>
                    <b>${m.drvName}</b><br><small>${m.load} ⮕ ${m.dest}</small>
                    <div class="prog-container"><div class="prog-bar" style="width:${prog*100}%"></div><div class="prog-text">${Math.floor(prog*100)}%</div></div>
                </div>`;
                return true;
            });
            document.getElementById('active-missions-container').innerHTML = html;
            if(Math.random() > 0.999) Game.Events.trigger();
        }, 50);
    }
};

window.onload = () => Game.init();
</script>
</body>
</html>
